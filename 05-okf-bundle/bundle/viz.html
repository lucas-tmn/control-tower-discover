\n---\n\n## Related\n\n- [Current Forecast](/datasets/tables/FactCurrentForecast.md)\n- [Current Forecast Snapshot Daily](/datasets/tables/CurFcstSnapshotDaily.md)\n- [Fiscal Calendar](/datasets/tables/DimDate.md)\n- [Product Master](/datasets/tables/DimProduct.md)\n- [Warehouse Master](/datasets/tables/DimWarehouse.md)\n- [Resultant Forecast](/glossary/resultant_forecast.md)\n- [Promo Lift](/glossary/promo_lift.md)", "datasets/tables/CurFcstSnapshotDaily": "## Purpose\n\nDaily current forecast snapshot table used as an interim source while the gold-level [Current Forecast](/datasets/tables/FactCurrentForecast.md) table is not deployed.\n\nThis table stores the current forecast at the **item x warehouse x fiscal month** grain. It keeps monthly resultant forecast, promotional lift, and total forecast quantities from the latest available snapshot date.\n\nUse [Weekly Current Forecast](/datasets/queries/weekly_current_forecast.md) when analysis needs the weekly item-warehouse forecast shape documented by [Current Forecast](/datasets/tables/FactCurrentForecast.md).\n\n---\n\n## Grain\n\nEach row represents one **item x warehouse x fiscal month** combination for the latest available snapshot date.\n\n`ItemSKU` x `WarehouseID` x `FiscalMonthYear` should be unique for a single `SnapshotDate`.\n\n---\n\n## Schema\n\nAll forecast quantities are in **units**.\n\n### Grain / Keys\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ItemSKU` | VARCHAR(20) | FK to [Product Master](/datasets/tables/DimProduct.md) (`DimProduct[ItemSKU]`) |\n| `WarehouseID` | VARCHAR(10) | FK to [Warehouse Master](/datasets/tables/DimWarehouse.md) (`DimWarehouse[WarehouseID]`) |\n| `FiscalMonthLastDate` | DATE | Last date of the fiscal month represented by the row |\n| `FiscalMonthYear` | VARCHAR | Fiscal month-year period identifier used to align monthly forecast values to the fiscal calendar |\n\n### Forecast Quantities\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ResultantForecast` | INT | Final monthly forecast quantity after planner overrides have been applied on top of the statistical model; see [Resultant Forecast](/glossary/resultant_forecast.md) |\n| `PromoLift` | INT | Monthly promotional lift quantity; incremental demand from planned promotions; see [Promo Lift](/glossary/promo_lift.md) |\n| `TotalForecast` | INT | Combined monthly demand signal: `ResultantForecast + PromoLift` |\n\n### Metadata\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `SnapshotDate` | DATE | Date the forecast snapshot was captured; the base query filters to the latest available snapshot date |\n\n---\n\n## Snapshot Strategy\n\nThe base query filters `CurFcstSnapshotDaily` to the maximum available `SnapshotDate`, so the documented extract returns only the latest current forecast snapshot.\n\nHistorical daily snapshots may exist in the source table, but the default current-forecast usage should select the latest snapshot unless the analysis explicitly requires forecast drift or plan-drop history.\n\n---\n\n## Monthly vs. Weekly Forecast\n\n`CurFcstSnapshotDaily` is monthly. It does not contain one row per fiscal week.\n\nThe weekly current forecast shape is produced by [Weekly Current Forecast](/datasets/queries/weekly_current_forecast.md), which maps monthly forecast periods to fiscal week-ending dates and divides monthly quantities by the number of fiscal weeks in each month. This matches the normalization caveat documented in [Current Forecast](/datasets/tables/FactCurrentForecast.md).\n\n---\n\n## Base Query\n\nThis query returns the latest available current forecast snapshot from `CurFcstSnapshotDaily`.\n\n```sql\nSELECT RTRIM([CFS].[ItemSku]  ) AS [ItemSKU]\n      ,RTRIM([CFS].[Warehouse]) AS [WarehouseID]\n      ,[CFS].[FiscalMonthLastDate]\n      ,[CFS].[FiscalMonthYear]\n      ,[CFS].[ResultantForecast]\n      ,[CFS].[PromoLift]\n      ,[CFS].[TotalForecast]\n      ,CONVERT(DATE,[CFS].[SnapshotDate]) AS [SnapshotDate]\n  FROM [SupplyChain_Enh].[CurFcstSnapshotDaily] AS CFS\n  WHERE CONVERT(DATE, [CFS].[SnapshotDate]) = (SELECT CONVERT(DATE, MAX([SnapshotDate])) FROM [SupplyChain_Enh].[CurFcstSnapshotDaily])\n```\n\n---\n\n## Related\n\n- [Current Forecast](/datasets/tables/FactCurrentForecast.md)\n- [Weekly Current Forecast](/datasets/queries/weekly_current_forecast.md)\n- [Product Master](/datasets/tables/DimProduct.md)\n- [Warehouse Master](/datasets/tables/DimWarehouse.md)\n- [Fiscal Calendar](/datasets/tables/DimDate.md)\n- [Resultant Forecast](/glossary/resultant_forecast.md)\n- [Promo Lift](/glossary/promo_lift.md)", "datasets/tables/demand_forecast": "> **Deprecated.** This document was a placeholder for the demand forecast concept. It has been superseded by [Current Forecast](/datasets/tables/FactCurrentForecast.md), which documents the actual Fabric implementation (`FactCurrentForecast`) with confirmed schema, grain, and source system details.\n\n## Overview\n\nThis dataset contains the output of Logility's demand planning engine. It represents the planned demand signal used by supply planning, procurement, and inventory management processes.\n\nLogility runs on a [FILL IN: weekly/daily] cadence and produces forecasts for a [FILL IN: N-week/month] planning horizon. When a planned purchase order or manufacturing order is firmed in Logility, it is pushed to the ERP and the forecast is updated accordingly.\n\n## Grain\n\nOne row per **item \u00d7 planning period**.\n\n- Planning period is [FILL IN: weekly / monthly].\n- Multiple forecast versions may exist for the same item \u00d7 period. Always use the most recent `forecast_version` unless explicitly comparing versions.\n\n## Schema\n\n| Column | Type | Description |\n| --- | --- | --- |\n| `item_id` | VARCHAR | Foreign key to [Product Master](/datasets/tables/DimProduct.md) (`ItemSKU`) |\n| `period_start_date` | DATE | First date of the planning period |\n| `forecast_qty` | DECIMAL | Forecasted demand quantity in planning UOM |\n| `forecast_version` | VARCHAR | Version identifier for the planning run |\n| `version_date` | DATE | Date the forecast version was generated |\n| `uom` | VARCHAR | Unit of measure for forecast_qty |\n\n> **Note**: Column names above are illustrative. Confirm against the actual warehouse schema and update this document before setting `status: active`.\n\n## Key Joins\n\n- Join to [Product Master](/datasets/tables/DimProduct.md) on `item_id` = `ItemSKU` for product attributes and planning parameters.\n- Join to [sales_orders](/datasets/tables/sales_orders.md) on `item_id` + period alignment for forecast vs. actual comparison.\n\n## Known Considerations\n\n- Forecast for new products in early launch may be based on analogous item history or management input, not statistical modeling. Treat accuracy expectations accordingly.\n- [FILL IN: any known data quality issues, e.g., lag between Logility run and DW load, handling of discontinued items, etc.]", "datasets/tables/DimCustomer": "## Purpose\n\nCentral customer dimension for supply chain planning and demand analysis. Consolidates customer account and ship-to location attributes to enable demand forecasting, order fulfillment analysis, and forecast accuracy reporting. Provides ship-to level detail for multi-location customers to capture location-specific subscription and demand patterns.\n\nUsed as the customer entity in:\n\n- Demand forecasting models\n- Order fulfillment analysis\n- Forecast accuracy reporting\n- Demand pattern segmentation\n\n---\n\n## Grain\n\nEach row represents a unique **account and ship-to location combination** (`AccountAndShipToNumber`).\n\n---\n\n## Schema\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `AccountAndShipToNumber` | VARCHAR(20) | Composite key identifying the unique account-ship-to combination for multi-location demand tracking |\n| `AccountNumber` | VARCHAR(10) | Account-level identifier; used as foreign key in fact tables |\n| `AccountName` | VARCHAR(200) | Customer name / account name for display and filtering |\n| `ShipToNumber` | VARCHAR(10) | Ship-to location code identifying the receiving location |\n| `ShipToName` | VARCHAR(200) | Ship-to location name or address label |\n| `CustomerGroup` | VARCHAR(100) | Customer grouping classification for demand segmentation (e.g., AFICONS, regional distributor class) |\n| `CustomerSegment` | VARCHAR(100) | Market or channel segment (e.g., wholesale, retail, direct) for hierarchical reporting |\n| `ReportingBusinessType` | VARCHAR(100) | Standardized business type for regulatory and revenue reporting |\n| `BusinessTypeCode` | VARCHAR(20) | Code / abbreviation for business type |\n| `Address1` | VARCHAR(200) | Primary address line |\n| `Address2` | VARCHAR(200) | Secondary address line |\n| `Address3` | VARCHAR(200) | Tertiary address line (suite, building) |\n| `Address4` | VARCHAR(200) | Quaternary address line |\n| `Address5` | VARCHAR(200) | Quinary address line |\n| `City` | VARCHAR(100) | City name |\n| `State` | VARCHAR(2) | State abbreviation (US standard) |\n| `ZipCode` | VARCHAR(10) | Postal code |\n| `Country` | VARCHAR(100) | Country name or code |\n| `Region` | VARCHAR(100) | Regional grouping for consolidation and analysis |\n| `District` | VARCHAR(100) | District or sales territory assignment |\n\n---\n\n## Related\n\n- [Customer](/entities/customer.md) \u2014 Canonical customer business object definition\n- [Demand Forecast](/datasets/demand_forecast.md) \u2014 Demand signals indexed by customer\n- [Sales Orders](/datasets/sales_orders.md) \u2014 Actual customer order transactions\n- [FILL IN: Link to forecast accuracy metric]", "datasets/tables/DimDate": "## Purpose\n\nFiscal calendar dimension used to group and filter supply chain facts by fiscal period. Provides a full hierarchy from individual dates up through fiscal weeks, months, quarters, halves, and years. Includes period-relative indicators (current period = 0, past = negative, future = positive) that support rolling-window analysis without hardcoded date logic.\n\nUsed as the time dimension in:\n\n- Demand forecasting and forecast accuracy reporting\n- Inventory coverage and days-of-supply calculations\n- Sales and order trend analysis\n- Holiday and weekday/weekend segmentation\n\n---\n\n## Grain\n\nEach row represents a unique **calendar date** (`TransactionDate`).\n\n---\n\n## Schema\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `TransactionDate` | DATE | Primary key \u2014 distinct calendar dates |\n| `FiscalYear` | INT | Fiscal year number (YYYY) |\n| `IntegerDate` | INT | Date as integer in YYYYMMDD format |\n| `MapicsDate` | INT | Legacy AS400/MAPICS date format used in ERP source tables |\n| `DayOfWeek` | VARCHAR | Full weekday name (Sunday through Saturday) |\n| `FiscalWeekNum` | INT | Week number within the fiscal year |\n| `FWDesc` | VARCHAR | Fiscal week label (e.g., FW 01) |\n| `FiscalYearWeekNum` | INT | Composite fiscal week key (YYYYWW) |\n| `FiscalMonthNum` | INT | Fiscal month number (1\u201312) |\n| `FMDesc` | VARCHAR | Fiscal month label (e.g., FM 01) |\n| `FiscalMonthName` | VARCHAR | Abbreviated month name (Jan, Feb, Mar, \u2026) |\n| `FiscalYearMonthNum` | INT | Composite fiscal month key (YYYYMM) |\n| `FiscalMonthYearDesc` | VARCHAR | Readable period label (e.g., Oct 2025) |\n| `FiscalQuarterNum` | INT | Fiscal quarter number (1\u20134) |\n| `FQDesc` | VARCHAR | Fiscal quarter label (e.g., FQ 2) |\n| `FiscalYearHalfNum` | INT | Composite fiscal half key (YYYYH) |\n| `FiscalHalfNum` | INT | Fiscal half number (1\u20132) |\n| `FHDesc` | VARCHAR | Fiscal half label (e.g., FH 1) |\n| `FYDesc` | VARCHAR | Fiscal year label (e.g., FY 2025) |\n| `FiscalWeekStart` | DATE | Sunday date marking the start of the fiscal week |\n| `FiscalWeekEnd` | DATE | Saturday date marking the end of the fiscal week |\n| `FiscalMonthStart` | DATE | First Sunday of the fiscal month |\n| `FiscalMonthEnd` | DATE | Last Saturday of the fiscal month |\n| `FiscalYearStart` | DATE | First Sunday of the fiscal year |\n| `FiscalYearEnd` | DATE | Last Saturday of the fiscal year |\n| `HolidayIndicator` | VARCHAR | \"Holiday\" or \"Non-Holiday\" |\n| `HolidayName` | VARCHAR | Holiday name, or blank if not a holiday |\n| `WeekdayWeekend` | VARCHAR | \"Weekday\" or \"Weekend\" |\n| `FiscalDayIndicator` | INT | Relative day index; 0 = today, negative = past, positive = future |\n| `FiscalWeekIndicator` | INT | Relative week index; 0 = current week |\n| `FiscalMonthIndicator` | INT | Relative month index; 0 = current month |\n| `FiscalQuarterIndicator` | INT | Relative quarter index; 0 = current quarter |\n| `FiscalYearIndicator` | INT | Relative year index; 0 = current year |\n| `FiscalWeeksInMonth` | INT | Count of fiscal weeks in the month |\n\n---\n\n## Related\n\n- [FILL IN: Link to Forecast Accuracy metric]\n- [FILL IN: Link to Days of Supply metric]\n- [FILL IN: Link to Demand Forecast dataset]", "datasets/tables/DimProduct": "## Purpose\n\nCentral product dimension for supply chain planning. Consolidates item master attributes from the ERP product master as the primary source, unified with planning details from `DimCurrentProductDetails`, vendor data, invoice history, and product knowledge extensions. Resolves divergent calculated columns across legacy semantic models into a governed set of source attributes and ETL-computed classification columns.\n\nAll gold fact tables join to `DimProduct`. Used in:\n\n- Demand and inventory planning\n- Lifecycle-stage filtering for forecast and planning reports\n- Product hierarchy and classification roll-ups\n- New product assessment and end-of-life tracking\n\n---\n\n## Grain\n\nEach row represents a unique **item SKU** (`ItemSKU`). Direct-ship-only supplier items are excluded from this table.\n\n---\n\n## Schema\n\n### Identity\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ItemSKU` | VARCHAR(15) | Primary key; item-level grain identifier used as FK in all gold fact tables |\n| `ItemDescription` | VARCHAR(30) | Full item name from product master |\n| `ItemSKUDesc` | VARCHAR(48) | ETL-computed: `ItemSKU + ' - ' + ItemDescription`; convenience label for visuals and slicers |\n| `ItemCode` | VARCHAR(25) | Secondary item code from source master; distinct from `ItemSKU` |\n\n### Series\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `SeriesNumber` | VARCHAR(5) | Series identifier for grouping related SKUs |\n| `SeriesName` | VARCHAR(100) | Human-readable series name |\n| `SeriesColor` | VARCHAR(60) | Color attribute at the series level |\n| `FrameNumber` | VARCHAR(16) | Frame number attribute |\n| `PlanningSeries` | VARCHAR(16) | ETL-computed: alias of `ItemExtSeriesNumber` using Logility naming convention |\n| `ItemExtSeriesNumber` | VARCHAR(16) | Extended/external series number from `DimCurrentProductDetails`; supplemental series identifier |\n| `ExtSeriesNumber` | VARCHAR(16) | Extended series number from item master |\n| `ExtSeriesDescription` | VARCHAR(119) | Description for the extended series number |\n| `SeriesDesc` | VARCHAR(108) | ETL-computed: `PlanningSeries + ' - ' + SeriesName`; replaces model-local Series Desc calculated columns |\n\n### Classification\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ItemClassCode` | CHAR(4) | Item classification code |\n| `ItemClassName` | VARCHAR(25) | Item classification description |\n| `CollectiveClass` | VARCHAR(100) | Collective class description |\n| `CollectiveClassGroup` | VARCHAR(100) | ETL-computed: custom grouping consolidating collective classes and item classes; applies special rules for components and kits |\n| `ProductLine` | VARCHAR(25) | Product line grouping |\n| `GeneralDescription` | VARCHAR(10) | General description label from GENDESC table |\n| `ItemGrouping` | VARCHAR(35) | Planning-level item grouping |\n| `MerchandisingCategory` | SMALLINT | Merchandising category for retail/display purposes |\n| `BusinessUnit` | VARCHAR(100) | Business unit from `DimCurrentProductDetails`; may be NULL for items not in that source |\n| `Colors` | VARCHAR(23) | Color attribute at the item level |\n| `PricePoint` | INT | Price point tier code |\n| `ItemPricePointRating` | VARCHAR(6) | Rating within price point tier |\n\n### Finance / Sales Hierarchy\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `AFIFinanceDivision` | VARCHAR(30) | Finance division |\n| `AFISalesDivision` | VARCHAR(25) | Sales division description |\n| `AFISalesCategory` | VARCHAR(25) | Sales category description |\n| `AlternateDivision` | VARCHAR(25) | ETL-computed: strips the `\"Signature \"` prefix from `AFISalesDivision` for Signature-branded divisions; used where the prefix creates grouping noise |\n\n### Geography / Sourcing\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ImportDomesticCode` | CHAR(1) | Import (I) or Domestic (D) sourcing indicator |\n| `CountryOfOrigin` | VARCHAR(30) | Country of manufacture |\n| `ResponsibleOffice` | VARCHAR(10) | Office responsible for sourcing and planning the item |\n| `ResponsibleOfficeName` | VARCHAR(10) | Description of the responsible office |\n| `CEXCode` | CHAR(3) | Default warehouse that the item balance record is created at |\n| `MakeBuyCode` | VARCHAR(10) | Make (manufactured internally) or Buy (purchased); pending ETL implementation |\n\n### Pricing / Physical Attributes\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `FOBArcPrice` | DECIMAL(15,3) | FOB unit price in USD indexed to Arcadia |\n| `Cubes` | DECIMAL(5,2) | Item cube in cubic feet |\n| `QtyInBox` | DECIMAL(4,0) | Units per carton; used in `MarketableConversionFactor` |\n| `UOM` | CHAR(2) | Unit of measure |\n| `ContainerVolume` | DECIMAL(10,7) | ETL-computed: `Cubes / 2400`; normalized container volume for purchase order estimation. Used in capacity planning: For a set of PO line items, sum of [Units] *[ContainerVolume] helps answer, \"How many containers is the vendor shipping this week? How many containers is the warehouse receiving this week?\" |\n| `CurrentUnitCost` | DECIMAL(19,3) | Average/list unit cost |\n\n### Vendor\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `PrimaryVendor` | VARCHAR(8) | Primary vendor number |\n| `PrimaryVendorName` | VARCHAR(23) | Primary vendor name |\n\n### Structure / Planning\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `MainPieceItem` | VARCHAR(5) | Item number of the main piece in a set maintained by sales teams |\n| `ItemForecastPlannerID` | VARCHAR(40) | Forecast planner ID; resolved via COALESCE priority from `Item_ENV` and `NonPkItems` |\n\n### Status / Lifecycle\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `AFIItemStatus` | CHAR(1) | Source lifecycle status code: N = New, D = Discontinued; empty string normalized to C (Current) by ETL; primary input to `LifecycleStage` |\n| `CurrentStatus` | CHAR(1) | Current item status from `DimCurrentProductDetails` |\n| `FutureStatus` | VARCHAR(40) | Planned future status: F = Phase-out, P = Planned drop; input to `LifecycleStage` and `PlanDropDecisionDate` |\n| `ManufacturingStatus` | VARCHAR(25) | Manufacturing status description |\n| `ManufacturingStatusChangeDate` | DATE | Date manufacturing status last changed |\n| `DiscontinuedDate` | DATE | Date item was discontinued |\n| `HoldBuyCode` | VARCHAR(40) | Purchasing hold code; resolved via COALESCE from `Item_ENV` and `NonPkItems` |\n\n### Market / Introduction Dates\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `MarketIntroducedAt` | VARCHAR(30) | Date item was introduced to market; kit item NULLs are corrected to the parent finished-good's date by ETL |\n| `MarketBeginDate` | DATE | Market availability begin date |\n| `MarketEndDate` | DATE | Market availability end date; NULL while the item is active |\n| `InitialInvoiceDate` | DATE | ETL-computed: date of first customer invoice from sales history; drives `Recent Launch` classification in `LifecycleStage` |\n| `InitialInvoiceQty` | DECIMAL(38,0) | Quantity on the first invoice |\n\n### Product Flags\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `SellableItemFlag` | CHAR(1) | Indicates item is directly sellable to end customers |\n| `ExpressShipFlag` | CHAR(1) | Express shipping eligibility flag |\n| `HSExclusiveFlag` | BIT | HomeStore exclusive product flag |\n| `HSCoreProductFlag` | BIT | HomeStore core product flag |\n| `HSProprietaryProductFlag` | BIT | HomeStore proprietary product flag |\n| `ConsumerChoiceFlag` | VARCHAR(5) | Consumer choice program flag |\n| `CommodityItem` | BIT | Commodity item classification |\n| `Showroom` | VARCHAR(87) | Showroom display attribute |\n\n### Image\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ItemImage` | VARCHAR(50) | Item image identifier |\n| `ImageURL` | VARCHAR(87) | ETL-computed: full image URL; NULL when `ItemImage` is NULL or empty |\n\n### ETL-Computed \u2014 Lifecycle & Planning\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `LifecycleStage` | VARCHAR(20) | ETL-computed: `Pre-Invoicing` \\| `Recent Launch` \\| `Current` \\| `End of Life`; single canonical lifecycle stage replacing divergent model-local calculated columns |\n| `LifecycleStageSortOrder` | INT | ETL-computed: numeric sort order for `LifecycleStage` (1\u20134); enables non-alphabetic sort in visuals |\n| `DiscontinuationHorizon` | VARCHAR(5) | ETL-computed: `12M` \\| `18M` \\| `24M` \\| NULL; buckets end-of-life items by expected drop timeline; pending implementation |\n| `PlanDropDecisionDate` | DATE | ETL-computed: date `FutureStatus` first changed to F or P; pending implementation |\n| `PartFlag` | VARCHAR(4) | ETL-computed: `PART` \\| `ITEM`; identifies component parts for filtering from customer-facing demand and inventory reports |\n| `KitFlag` | VARCHAR(3) | ETL-computed: kit/material type \u2014 `Bedding Kit` \\| `UPH Kit` \\| `Swatch` \\| `HIDES` \\| `VINYL`; replaces model-local kit-type variants; pending implementation |\n| `MarketableConversionFactor` | DECIMAL(10,6) | ETL-computed: `1.0` for standard marketable SKUs; `1/QtyInBox` for GDC-700 component items; enables demand aggregation at the parent SKU level; pending implementation |\n| `MarketableItemSKU` | VARCHAR(15) | ETL-computed: self for marketable items; parent finished-good `ItemSKU` for GDC-700 components; used in GROUPBY clauses to roll component demand up to the sellable SKU; pending implementation |\n\n---\n\n## Related\n\n- [FILL IN: Link to NewProductReview process]\n- [FILL IN: Link to ForecastRevision process]\n- [FILL IN: Link to Supplier entity]\n- [FILL IN: Link to LifecycleStage glossary term]", "datasets/tables/DimVendor": "## Purpose\n\nCentral vendor dimension for supply chain planning. Provides a single source of truth for vendor attributes \u2014 lead times, location, country of origin, and active status \u2014 used across procurement, supply planning, and on-time performance reporting.\n\nVendor-level aggregates such as open purchase orders and vendor ranking are not stored in this table; they are computed at report time in the measure layer.\n\n---\n\n## Grain\n\nEach row represents a unique **vendor** (`VendorNumber`). Both active and inactive vendors are included; use the `VendorActive` flag to filter to active vendors only when appropriate for the analysis.\n\n---\n\n## Schema\n\n### Identity\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `VendorNumber` | VARCHAR(8) | Primary key \u2014 vendor identifier; used as FK in `FactPSW`, `FactReceipts`, `FactOnTime`, and `FactProduction` |\n| `VendorName` | VARCHAR(40) | Vendor legal or trading name; consolidated from `VendorMaster`, `VENNAM`, and `vendor` source lookups |\n| `VendorDesc` | VARCHAR(60) | ETL-computed: `CONCAT(RTRIM(VendorNumber), ' - ', RTRIM(VendorName))`; convenience label for visuals and slicers |\n\n### Attributes\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `VendorOffice` | VARCHAR(20) | Office or division designation; used for vendor office-level grouping in supply planning and sourcing reports |\n| `VendorOfficeLocation` | VARCHAR(40) | Geographic or functional location of the vendor office (e.g., region, facility code) |\n| `Country` | VARCHAR(50) | Country of origin or country of vendor's primary location; supports import vs. domestic segmentation |\n| `LeadTime` | INT | Standard lead time in days; sourced from vendor master for use in supply planning calculations |\n| `VendorActive` | CHAR(1) | Active status flag (`Y`/`N`); filters active vs. inactive vendors in reporting and gold fact loads |\n\n---\n\n## Related\n\n- [Vendor](/entities/vendor.md) \u2014 Business definition, active status, and lead time context for the Vendor entity", "datasets/tables/DimWarehouse": "## Purpose\n\nCentral warehouse dimension for supply chain planning.\n\n---\n\n## Grain\n\nEach row represents a unique active **warehouse** (`WarehouseID`). Source values include physical codes (e.g., `1`, `15`, `ECR`) and virtual A-suffixed variants (e.g., `1A`, `15A`, `ECA`).\n\n---\n\n## Schema\n\n### Identity\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `WarehouseID` | VARCHAR(10) | Primary key \u2014 warehouse-level grain identifier used as FK in gold fact tables; raw warehouse codes from source system |\n| `WarehouseName` | VARCHAR(100) | ETL-computed: `WarehouseID + ' - ' + WarehouseLocation`; convenience label for visuals and slicers |\n| `WarehouseLocation` | VARCHAR(100) | Physical or logical warehouse location description from master |\n\n### Attributes\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `WarehouseOrderGroup` | VARCHAR(100) | Order grouping attribute for warehouse-level operational segmentation |\n| `IntransitWarehouse` | VARCHAR(100) | Intransit or consolidation warehouse designation |\n| `ContainerDirectWarehouse` | VARCHAR(100) | Container-direct receiving designation; supports direct-to-warehouse container shipments |\n| `ControlledWarehouse` | VARCHAR(100) | Controlled warehouse designation; governed inventory model indicator |\n| `AFIWarehousesKey` | VARCHAR(100) | Alternative key from source `DimAFIWarehouses` table |\n| `SiteID` | VARCHAR(50) | Site or location ID from `AshleyWarehouseMaster`; used in supply chain systems |\n\n### ETL-Computed\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `WarehouseGroup` | VARCHAR(10) | Operational group assignment \u2014 `AFI`, `ASH`, `C.DIR`, `PROD`, `CXD`, or `SDS`; NULL for unmapped codes. Enables warehouse-level aggregation in reports. See [Warehouse](/entities/warehouse.md) for group definitions and member codes. |\n| `PlanningWarehouse` | VARCHAR(10) | Preferred attribute to be displayed in reporting. Shorthand for `<ID>-<Name>` (e.g., `1-RKD`, `15-LEE`, `ECR-ECR`). Collapses virtual A-suffixed codes onto their physical facility code. See [Warehouse](/entities/warehouse.md) for full mapping. |\n| `SortBy` | INT | Display sort order for consistent warehouse sequencing across all reporting views; no NULLs \u2014 unmapped codes receive sequential values above 51 |\n\n---\n\n## Related\n\n- [Warehouse](/entities/warehouse.md) \u2014 Business definition, warehouse group classification, and PlanningWarehouse facility mapping", "datasets/tables/FactCurrentForecast": "## Purpose\n\nOperationally current demand forecast used in the supply planning database for generating the Supply Plan in Logility. This table holds the most recent published forecast at the **item \u00d7 warehouse \u00d7 fiscal week** grain \u2014 three forecast quantities per row: the resultant (statistical, post-override) forecast, the promotional lift overlay, and their combined total. All quantities are in **units**.\n\nForecast quantities originate as monthly values in Logility and are normalized to weekly granularity by dividing each monthly quantity by the number of fiscal weeks in that month. This is a basic conversion for trend analysis and not the exact weekly allocation that the Supply Plan would try to solve for.\n\nUsed in:\n\n- Supply plan inputs (weekly demand signal for each item-warehouse)\n- Item-warehouse reconciliation for [Forecast Accuracy](/metrics/forecast_accuracy.md) after Demand Consensus; customer-level forecast accuracy uses the [Working Forecast](/datasets/tables/FactWorkingForecast.md) captured at consensus because the customer dimension is collapsed in this table\n- Promotional lift visibility alongside the statistical model forecast\n\n---\n\n## Grain\n\nEach row represents one **item \u00d7 warehouse \u00d7 fiscal week-ending** combination in the latest forecast snapshot.\n\n`ItemSKU` \u00d7 `WarehouseID` \u00d7 `WeekEnding` is unique within the table. `SnapshotDate` is a metadata column recording when the forecast was published; it is constant across all rows (the table is fully replaced on each daily load) and is not part of the grain.\n\n---\n\n## Schema\n\nAll forecast quantities are in **units**.\n\n### Grain / Keys\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ItemSKU` | VARCHAR(20) | FK to [Product Master](/datasets/tables/DimProduct.md) (`DimProduct[ItemSKU]`) |\n| `WarehouseID` | VARCHAR(10) | FK to [Warehouse Master](/datasets/tables/DimWarehouse.md) (`DimWarehouse[WarehouseID]`) |\n| `WeekEnding` | DATE | FK to [Fiscal Calendar](/datasets/tables/DimDate.md) (`DimDate[TransactionDate]`); Saturday, the last day of the fiscal planning week; derived by mapping the monthly forecast period to fiscal week boundaries |\n\n### Forecast Quantities\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ResultantForecast` | INT | Final forecast quantity (units) after all planner overrides have been applied on top of the statistical model; see [Resultant Forecast](/glossary/resultant_forecast.md) |\n| `PromoLift` | INT | Promotional lift quantity (units); incremental demand from planned promotions; distributed evenly across all fiscal weeks in the month \u2014 see [Promo Lift](/glossary/promo_lift.md) for the week-distribution caveat |\n| `TotalForecast` | INT | Combined demand signal (units): `ResultantForecast + PromoLift`; the total quantity the supply plan should cover for this item-warehouse-week |\n\n### Metadata\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `SnapshotDate` | DATE | Date the forecast was published and loaded from Logility; constant across all rows; the full table is replaced on each daily load |\n\n---\n\n## Snapshot Strategy\n\nThis table stores only the most recent published forecast snapshot. The full table is replaced on each daily load; no prior snapshots are retained.\n\nFull snapshot history (required for plan drop horizon analysis or forecast drift tracking) is planned for a future release (Phase 5).\n\n---\n\n## Grain Normalization\n\nLogility publishes forecast quantities at a monthly grain. `FactCurrentForecast` normalizes these to weekly values by dividing each monthly quantity by the number of fiscal weeks in that month (derived from the fiscal calendar). Values are rounded to the nearest integer.\n\nThis produces an even distribution across weeks within a month \u2014 a 4-week month yields `monthly_qty \u00f7 4` per week; a 5-week month yields `monthly_qty \u00f7 5`. Promotional lift entered for a specific week in Logility will appear flat across the entire month in this table. Use [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md) for week-precise promo distribution.\n\nThis normalization logic will no longer apply after the Q3 2026 transition to a native weekly-grain forecast source. The table structure is expected to remain unchanged; only the ETL source will be updated.\n\n---\n\n## Temporal Notes\n\n- `WeekEnding` is sourced from `DimDate[TransactionDate]`, aligned to the fiscal calendar.\n- Joins to [Fiscal Calendar](/datasets/tables/DimDate.md) should use the `TransactionDate` column (primary key).\n- The fiscal calendar boundary is currently set through early 2029; records beyond that boundary are excluded by the load logic.\n\n---\n\n## Related\n\n- [Resultant Forecast](/glossary/resultant_forecast.md)\n- [Promo Lift](/glossary/promo_lift.md)\n- [Product Master](/datasets/tables/DimProduct.md)\n- [Warehouse Master](/datasets/tables/DimWarehouse.md)\n- [Fiscal Calendar](/datasets/tables/DimDate.md)\n- [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md)\n- [Forecast Accuracy](/metrics/forecast_accuracy.md)", "datasets/tables/FactSupplyPlanDetail": "## Purpose\n\nDaily extract of the Logility supply plan for operations. The table is fully overwritten each day with the current plan for semantic model efficiency. There is a similar table that keeps the snapshot history available. The Supply Plan is generate in the Logility application and projects 39 weeks forward from the snapshot date, showing how inventory is expected to evolve week by week at each item-warehouse combination, given current demand signals, open supply orders, planned orders, and safety stock targets.\n\nThe central output is [Shippable Inventory](/glossary/shippable_inventory.md) (`SIQty`) \u2014 the quantity projected to be available at the close of each planning week. Negative SI values identify supply gaps where planned outbound exceeds projected receipts. The Supply Plan solver's primary goal is to make Shippable Inventory match the Safety Stock Target.\n\nUsed in:\n\n- Exception-based supply plan review (SI negatives, safety stock gaps, fulfillment shortfalls)\n- Week-by-week visibility into firm vs. planned supply and demand\n- Safety stock gap analysis across the 39-week horizon\n\n---\n\n## Grain\n\nEach row represents one **item \u00d7 warehouse \u00d7 week-ending Saturday** combination in the current supply plan.\n\n`ItemSKU` \u00d7 `WarehouseID` \u00d7 `WeekEnding` is unique within the table. `SnapshotDate` is a metadata column that records when the daily extract was loaded; it does not vary within the table and should not be treated as part of the grain.\n\n---\n\n## Schema\n\n### Grain / Keys\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ItemSKU` | VARCHAR(20) | FK to [Product Master](/datasets/DimProduct.md) (`DimProduct[ItemSKU]`) |\n| `WarehouseID` | VARCHAR(10) | FK to [Warehouse Master](/datasets/DimWarehouse.md) (`DimWarehouse[Warehouse]`) |\n| `WeekEnding` | DATE | FK to [Fiscal Calendar](/datasets/DimDate.md) (`DimDate[TransactionDate]`); always a Saturday; the last day of the projected planning week |\n\n### Demand\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `BeginningBalance` | INT | Actual on-hand balance as of [SnapshotDate] \u2014 NOT the projected beginning on-hand for each week. This value is identical across all [WeekEnding] dates. For projected inventory at week ending, use [SIQty]. |\n| `FirmDemand` | INT | Confirmed open customer order quantity for the week; see [Firm Demand](/glossary/firm_demand.md) |\n| `Promo Lift` | INT | Manual promotional lift quantity entered by marketing and fed into Logility; independent of the statistical forecast |\n| `NetForecast` | INT | Statistical forecast quantity net of firm customer orders; floored at zero \u2014 when firm orders meet or exceed the forecast, this is 0; see [Net Forecast](/glossary/net_forecast.md) |\n\n### Transfers Out\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `TOutFirm` | INT | Quantity on a firm (committed) transfer-out order |\n| `TOutPlanned` | INT | Quantity on a transfer-out order Logility has planned but not yet committed (outside lead time) |\n\n### Production\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ProdFirm` | INT | Quantity on a firm production order |\n| `ProdPlanned` | INT | Quantity on a production order Logility has planned but not yet committed (outside production lead time) |\n\n### Purchase Orders\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `POsFirm` | INT | Quantity on a firm purchase order |\n| `POsPlanned` | INT | Quantity on a purchase order Logility has planned but not yet committed (outside vendor manufacturing lead time) |\n\n### Transfers In\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `TInInTransit` | INT | Quantity on a transfer-in order currently in transit to this warehouse |\n| `TInOnOrder` | INT | Quantity on a firm transfer-in order not yet in transit |\n| `TInPlanned` | INT | Quantity on a transfer-in order Logility has planned but not yet committed (outside lead time) |\n\n### Inventory Position\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `SIQty` | INT | [Shippable Inventory](/glossary/shippable_inventory.md): projected available quantity at week-end; the primary supply plan output |\n| `SSQty` | INT | Safety stock target quantity for this item-warehouse |\n| `SI-SS` | INT | `SIQty \u2212 SSQty`; positive = above safety stock target; negative = below target |\n| `SINegative` | INT | `SIQty` when `SIQty < 0`; zero otherwise; isolates supply gap weeks |\n| `SIPositive` | INT | `SIQty` when `SIQty \u2265 0`; zero otherwise |\n| `SSGap` | INT | Quantity needed to reach safety stock target; zero when `SIQty \u2265 SSQty`; see [Safety Stock Gap](/metrics/safety_stock_gap.md) |\n\n### Aggregate Demand & Fulfillment\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `TotalDemand` | INT | `FirmDemand + Promo Lift + NetForecast`; total planned outbound demand for the week |\n| `DemandFulfillmentQty` | INT | Quantity of `TotalDemand` the plan projects can be fulfilled; see [Projected Fulfillment Rate](/metrics/projected_fulfillment_rate.md) |\n| `TotalOut` | INT | `FirmDemand + Promo Lift + NetForecast + TotalTO`; total quantity leaving this warehouse (demand + transfers out) |\n\n### Aggregate Supply\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `TotalTO` | INT | `TOutFirm + TOutPlanned`; total transfer-out |\n| `TotalProd` | INT | `ProdFirm + ProdPlanned`; total production |\n| `TotalPOs` | INT | `POsFirm + POsPlanned`; total purchase orders |\n| `TotalTI` | INT | `TInInTransit + TInOnOrder + TInPlanned`; total transfer-in |\n| `TotalReceipts` | INT | `TotalProd + TotalPOs + TotalTI`; all planned inbound supply |\n| `NetInventoryChange` | INT | `TotalReceipts \u2212 TotalOut`; net weekly inventory movement |\n\n### Metadata\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `SnapshotDate` | DATE | Date the daily Logility extract was loaded; equals today; constant across all rows in the table since the full plan is replaced each day |\n\n---\n\n## Planning Horizon & Temporal Notes\n\n- The plan covers **39 weeks forward** from `SnapshotDate`.\n- `WeekEnding` is always a **Saturday**, aligned to the fiscal week boundary in [Fiscal Calendar](/datasets/DimDate.md).\n- All date joins to `DimDate` should use the `TransactionDate` column.\n- Because the table is a daily overwrite, there is no history of prior plan snapshots. To compare today's plan to a prior plan, a separate snapshot store would be required.\n\n---\n\n## Firm vs. Planned Supply\n\nSupply quantities appear in paired columns (e.g., `POsFirm` / `POsPlanned`). Understanding the distinction is critical for assessing supply reliability:\n\n- **Firm** \u2014 An order exists in the system. The quantity is committed and should be considered reliable for the near-term horizon.\n- **Planned** \u2014 Logility has computed that an order should be placed but it has not been issued yet. Planned quantities are projections and may not materialize if lead times or constraints change.\n\nWhen assessing short-term supply risk, weight firm supply more heavily than planned supply.\n\n---\n\n## Related\n\n- [Shippable Inventory](/glossary/shippable_inventory.md)\n- [Net Forecast](/glossary/net_forecast.md)\n- [Firm Demand](/glossary/firm_demand.md)\n- [Safety Stock Gap](/metrics/safety_stock_gap.md)\n- [Projected Fulfillment Rate](/metrics/projected_fulfillment_rate.md)\n- [Supply Plan Review](/playbooks/supply_plan_review.md)\n- [Product Master](/datasets/DimProduct.md)\n- [Warehouse Master](/datasets/DimWarehouse.md)\n- [Fiscal Calendar](/datasets/DimDate.md)", "datasets/tables/FactWorkingForecast": "## Purpose\n\nNightly snapshot of the in-progress working demand forecast sourced from Logility's DemandPlanning database. Provides the current-state demand signal at the **item \u00d7 warehouse \u00d7 customer group \u00d7 fiscal week** grain across three forecast quantities: resultant (statistical, post-override), promotional lift, and total. All quantities are in **units**.\n\nUnlike [Current Forecast](/datasets/tables/FactCurrentForecast.md), which reflects the demand signal after the Demand Consensus process has been finalized and pushed to Logility's SupplyPlanning database, this table captures the **pre-consensus** state \u2014 the working view that demand planners are actively refining. The addition of the `CustomerGroup` dimension makes it the primary source for customer-segment-level demand analysis.\n\nUsed in:\n\n- Demand planning review at the customer group level\n- Pre-consensus demand signal visibility for daily operational reporting\n- Customer-level [Forecast Accuracy](/metrics/forecast_accuracy.md) when captured at the official Demand Consensus snapshot\n- Comparison against [Current Forecast](/datasets/tables/FactCurrentForecast.md) to monitor demand consensus-stage adjustments\n\n---\n\n## Grain\n\nEach row represents one **item \u00d7 warehouse \u00d7 customer group \u00d7 fiscal week-ending** combination in the latest forecast snapshot.\n\n`ItemSKU` \u00d7 `WarehouseID` \u00d7 `CustomerGroup` \u00d7 `WeekEnding` is unique within the table. `SnapshotDate` is a metadata column recording when the nightly load ran; it is constant across all rows (the table is fully replaced on each daily load) and is not part of the grain.\n\n---\n\n## Schema\n\nAll forecast quantities are in **units**.\n\n### Grain / Keys\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ItemSKU` | VARCHAR(20) | FK to [Product Master](/datasets/tables/DimProduct.md) (`DimProduct[ItemSKU]`) |\n| `WarehouseID` | VARCHAR(10) | FK to [Warehouse Master](/datasets/tables/DimWarehouse.md) (`DimWarehouse[WarehouseID]`) |\n| `CustomerGroup` | VARCHAR(50) | Demand planning customer group; FK to [Customer Master](/datasets/tables/DimCustomer.md) (`DimCustomer[AccountAndShipToNumber]`); NULL values in the Logility source are normalized to `AFICONS` by ETL \u2014 `AFICONS` is a valid customer group, not a data quality indicator |\n| `WeekEnding` | DATE | FK to [Fiscal Calendar](/datasets/tables/DimDate.md) (`DimDate[TransactionDate]`); the last day of the fiscal planning week; derived by mapping the monthly source forecast period to fiscal week boundaries |\n\n### Forecast Quantities\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ResultantForecast` | INT | Forecast quantity (units) after all planner overrides have been applied on top of the statistical model; see [Resultant Forecast](/glossary/resultant_forecast.md) |\n| `PromoLift` | INT | Promotional lift quantity (units); incremental demand from planned promotions, distributed evenly across fiscal weeks in the month; see [Promo Lift](/glossary/promo_lift.md) |\n| `TotalForecast` | INT | Combined demand signal (units): `ResultantForecast + PromoLift`; the total quantity to be covered for this item-warehouse-customer group-week |\n\n### Metadata\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `SnapshotDate` | DATE | Date the nightly forecast snapshot was generated; constant across all rows; the full table is replaced on each daily load |\n\n---\n\n## Working vs. Current Forecast\n\nThis table and [Current Forecast](/datasets/tables/FactCurrentForecast.md) both originate in Logility but represent different stages of the demand planning workflow.\n\n| | Working Forecast | Current Forecast |\n| --- | --- | --- |\n| **Logility database** | DemandPlanning | SupplyPlanning |\n| **Stage** | Pre-consensus \u2014 actively being refined | Post-consensus \u2014 approved and published, used to plan purchase orders, manufacturing orders, etc |\n| **CustomerGroup** | Yes \u2014 part of grain | No \u2014 summed to Item-Warehouse (Inventory Plann Location) at Post-consensus sync |\n| **Grain** | Item \u00d7 Warehouse \u00d7 CustomerGroup \u00d7 Week | Item \u00d7 Warehouse \u00d7 Week |\n| **Primary use** | Demand planning by customer segment, forecast accuracy | Supply planning inputs |\n\nThe Demand Consensus process synchronizes the finalized working forecast from DemandPlanning to SupplyPlanning, creating the official [Current Forecast](/datasets/tables/FactCurrentForecast.md). Since Supply Planning operates only at the ItemSKU-Warehouse level, demand is aggregated by ItemSKU-Warehouse-FiscalPeriod for synchronization, dropping the customer group dimension.\n\n---\n\n## Snapshot Strategy\n\nThis table stores only the most recent nightly working forecast snapshot. The full table is replaced on each daily load; no prior snapshots are retained. Full snapshot history is retained in the upstream source.\n\n---\n\n## Grain Normalization\n\nLogility publishes forecast quantities at a monthly grain in the source database. `FactWorkingForecast` normalizes these to weekly values by dividing each monthly quantity by the number of fiscal weeks in that month (derived from the fiscal calendar). Values are rounded to the nearest integer.\n\nThis produces an even distribution across weeks within a month \u2014 a 4-week month yields `monthly_qty \u00f7 4` per week; a 5-week month yields `monthly_qty \u00f7 5`.\n\nThis normalization will no longer apply after the Q3 2026 transition to a native weekly-grain forecast source. The table structure and grain are expected to remain unchanged; only the ETL source logic will be updated.\n\n---\n\n## Temporal Notes\n\n- `WeekEnding` is sourced from `DimDate[TransactionDate]`, aligned to the fiscal calendar.\n- Joins to [Fiscal Calendar](/datasets/tables/DimDate.md) should use the `TransactionDate` column (primary key).\n- The fiscal calendar boundary is currently set through early 2029; records beyond that boundary are excluded by the load logic.\n\n---\n\n## Related\n\n- [Resultant Forecast](/glossary/resultant_forecast.md)\n- [Promo Lift](/glossary/promo_lift.md)\n- [Current Forecast](/datasets/tables/FactCurrentForecast.md)\n- [Product Master](/datasets/tables/DimProduct.md)\n- [Warehouse Master](/datasets/tables/DimWarehouse.md)\n- [Customer Master](/datasets/tables/DimCustomer.md)\n- [Fiscal Calendar](/datasets/tables/DimDate.md)\n- [Forecast Accuracy](/metrics/forecast_accuracy.md)", "datasets/tables/inventory_onhand": "## Overview\n\nThis dataset reflects the current physical inventory position. It is the primary source for calculating [coverage_days](/metrics/coverage_days.md) and [days_of_supply](/metrics/days_of_supply.md) and for detecting stockout risk.\n\nHighJump (WMS) is the system of record for inventory. Data flows from HighJump to the ERP and from the ERP to the data warehouse on a [FILL IN: daily/real-time] basis.\n\n## Grain\n\nOne row per **item \u00d7 warehouse \u00d7 location** (or item \u00d7 warehouse if location-level detail is not available in the DW).\n\n## Schema\n\n| Column | Type | Description |\n| --- | --- | --- |\n| `item_id` | VARCHAR | Foreign key to [Product Master](/datasets/tables/DimProduct.md) (`ItemSKU`) |\n| `warehouse_id` | VARCHAR | Warehouse identifier |\n| `location_id` | VARCHAR | Location within the warehouse (may be null if aggregated) |\n| `qty_on_hand` | DECIMAL | Physical quantity currently on hand |\n| `qty_allocated` | DECIMAL | Quantity reserved/allocated to open orders |\n| `qty_available` | DECIMAL | qty_on_hand minus qty_allocated |\n| `as_of_date` | DATE | Snapshot date of this record |\n| `uom` | VARCHAR | Unit of measure |\n\n> **Note**: Column names above are illustrative. Confirm against the actual warehouse schema and update this document before setting `status: active`.\n\n## Key Joins\n\n- Join to [Product Master](/datasets/tables/DimProduct.md) on `item_id` = `ItemSKU` for product attributes ([FILL IN: lead time and safety stock columns not yet in DimProduct]).\n- Join to [purchase_orders](/datasets/tables/purchase_orders.md) on `item_id` to compute total supply pipeline for [days_of_supply](/metrics/days_of_supply.md).\n\n## Known Considerations\n\n- Use `qty_available` (not `qty_on_hand`) for stockout risk calculations \u2014 allocated inventory is not available to fill new demand.\n- Inventory snapshot timing: records reflect the warehouse state as of `as_of_date`. Intraday movements are not captured.\n- [FILL IN: handling of multi-warehouse scenarios, transit inventory, consignment, etc.]", "datasets/tables/purchase_orders": "## Overview\n\nThis dataset contains purchase order lines created in the ERP. It is the primary source for the open supply pipeline \u2014 what inventory is coming in and when.\n\nOpen POs feed the [days_of_supply](/metrics/days_of_supply.md) calculation and are critical for projecting stockout recovery dates.\n\nPlanned POs from Logility become firm ERP purchase orders when released by a planner. The `source` field (or equivalent) distinguishes Logility-originated POs from manually created ones.\n\n## Grain\n\nOne row per **PO line** (PO number + line number).\n\n## Schema\n\n| Column | Type | Description |\n| --- | --- | --- |\n| `po_number` | VARCHAR | Purchase order number |\n| `po_line` | INTEGER | Line number within the PO |\n| `vendor_id` | VARCHAR | Supplier identifier |\n| `item_id` | VARCHAR | Foreign key to [Product Master](/datasets/tables/DimProduct.md) (`ItemSKU`) |\n| `ordered_qty` | DECIMAL | Quantity ordered from the supplier |\n| `received_qty` | DECIMAL | Quantity received to date |\n| `open_qty` | DECIMAL | ordered_qty minus received_qty |\n| `expected_receipt_date` | DATE | Supplier-committed or system-calculated receipt date |\n| `actual_receipt_date` | DATE | Actual date received (null if not yet received) |\n| `po_status` | VARCHAR | Status: Open, Partial, Closed, Cancelled |\n| `uom` | VARCHAR | Unit of measure |\n\n> **Note**: Column names above are illustrative. Confirm against the actual warehouse schema and update this document before setting `status: active`.\n\n## Key Joins\n\n- Join to [Product Master](/datasets/tables/DimProduct.md) on `item_id` = `ItemSKU` for planning context.\n- Join to [inventory_onhand](/datasets/tables/inventory_onhand.md) on `item_id` to compute [days_of_supply](/metrics/days_of_supply.md).\n\n## Known Considerations\n\n- Filter to `po_status IN ('Open', 'Partial')` when calculating the open supply pipeline. Closed and cancelled POs must be excluded.\n- `expected_receipt_date` may not reflect current supplier lead times if the PO was created long ago. Use with awareness of supplier performance history.\n- [FILL IN: any nuances around partial receipts, PO amendments, drop-ship orders, etc.]", "datasets/tables/sales_orders": "## Overview\n\nThis dataset contains customer sales order lines from the ERP system. It is the primary source of **actual demand** used to evaluate forecast accuracy, assess product performance, and identify fulfillment gaps.\n\nUse `shipped_qty` (not `ordered_qty`) when measuring realized demand \u2014 it reflects what was actually fulfilled and consumed inventory.\n\n## Grain\n\nOne row per **order line** (order number + line number).\n\n## Schema\n\n| Column | Type | Description |\n| --- | --- | --- |\n| `order_id` | VARCHAR | Unique sales order identifier |\n| `order_line` | INTEGER | Line number within the order |\n| `item_id` | VARCHAR | Foreign key to [Product Master](/datasets/tables/DimProduct.md) (`ItemSKU`) |\n| `customer_id` | VARCHAR | Customer identifier |\n| `order_date` | DATE | Date the order was placed |\n| `requested_ship_date` | DATE | Customer-requested ship date |\n| `actual_ship_date` | DATE | Date the order was actually shipped |\n| `ordered_qty` | DECIMAL | Quantity ordered by the customer |\n| `shipped_qty` | DECIMAL | Quantity actually shipped (fulfilled demand) |\n| `open_qty` | DECIMAL | Quantity remaining to be shipped |\n| `order_status` | VARCHAR | Status: Open, Shipped, Cancelled, etc. |\n| `uom` | VARCHAR | Unit of measure |\n\n> **Note**: Column names above are illustrative. Confirm against the actual warehouse schema and update this document before setting `status: active`.\n\n## Key Joins\n\n- Join to [Product Master](/datasets/tables/DimProduct.md) on `item_id` = `ItemSKU` for product attributes.\n- Join to [demand_forecast](/datasets/tables/demand_forecast.md) on `item_id` + period alignment for forecast vs. actual comparison.\n\n## Known Considerations\n\n- Filter by `order_status` correctly: cancelled orders must be excluded from demand actuals.\n- `ordered_qty` vs. `shipped_qty` distinction is critical: use `shipped_qty` for demand actuals, `ordered_qty` for backlog and unfulfilled demand analysis.\n- [FILL IN: any known data quality issues specific to your ERP, e.g., returns handling, EDI order timing, etc.]", "entities/customer": "## Definition\n\nA **Customer** is a buying entity in the supply chain, identified at two levels: the account level (consolidated organization) and the ship-to level (individual receiving location). Customers are the primary demand source and the target of fulfillment operations.\n\nCustomer master data originates from the ERP and is exposed through the governed [Customer Master](/datasets/tables/DimCustomer.md) dimension. That dataset is the authoritative source for all customer attributes used in supply chain analysis.\n\n---\n\n## Grain and Uniqueness\n\nThe [Customer Master](/datasets/tables/DimCustomer.md) table is keyed on **`AccountAndShipToNumber`**, representing a unique account-ship-to location combination. This grain allows tracking of:\n\n- **Account-level aggregates:** Total customer demand, customer segment reporting, regional analysis\n- **Ship-to level detail:** Location-specific demand patterns, multi-location customer dynamics, delivery-specific attributes (address, region, district)\n\nAn account may have multiple ship-to locations (e.g., a retailer with regional distribution centers); a single row represents demand and fulfillment flows to one specific location.\n\n---\n\n## Account vs. Ship-To Distinction\n\n| Dimension | Identifier | Meaning | Usage |\n| --- | --- | --- | --- |\n| **Account** | `AccountNumber` | Parent organization or buying entity | Consolidate demand across all locations; apply business-level rules and customer contracts |\n| **Ship-To** | `ShipToNumber` | Individual receiving location | Analyze location-specific demand patterns; forecast and plan at the location level; identify regional demand drivers |\n\nWhen analyzing demand or planning inventory, use the ship-to grain to capture location-specific dynamics, but reference `AccountNumber` when applying account-level rules or hierarchies.\n\n---\n\n## Key Attributes\n\n| Concept | DimCustomer Column | Description |\n| --- | --- | --- |\n| Account identifier | `AccountNumber` | Primary account-level identifier; used as FK in fact tables |\n| Account name | `AccountName` | Account name for display and filtering |\n| Ship-to identifier | `ShipToNumber` | Location-specific identifier; combined with AccountNumber to form the unique key |\n| Ship-to name | `ShipToName` | Location name or label (e.g., distribution center name, regional office) |\n| Account-ship-to key | `AccountAndShipToNumber` | Composite key for unique row identification |\n| Customer group | `CustomerGroup` | Customer grouping classification (e.g., AFICONS, distributor class); critical for demand segmentation |\n| Customer segment | `CustomerSegment` | Market or channel segment (e.g., wholesale, retail, direct); used for hierarchical reporting |\n| Business type | `ReportingBusinessType` / `BusinessTypeCode` | Standardized business type for regulatory and revenue reporting |\n| Address | `Address1`\u2013`Address5` | Shipping address detail (line by line) |\n| City | `City` | City name for the ship-to location |\n| State | `State` | State abbreviation (US standard) |\n| Zip code | `ZipCode` | Postal code |\n| Country | `Country` | Country name or code for international locations |\n| Region | `Region` | Regional grouping for consolidation and analysis (e.g., North, South, East, West) |\n| District | `District` | District or sales territory assignment for alignment with sales organization |\n\n---\n\n## Customer Segmentation\n\nCustomers are segmented along multiple dimensions for demand analysis and planning:\n\n- **Customer Group** (`CustomerGroup`) \u2014 Primary grouping for demand pattern recognition and forecast model selection (e.g., AFICONS vs. regional distributors have distinctly different demand patterns)\n- **Customer Segment** (`CustomerSegment`) \u2014 Channel or market segment that governs fulfillment and supply chain strategy (e.g., wholesale orders follow predictable patterns; retail orders may be more volatile)\n- **Business Type** (`ReportingBusinessType`) \u2014 Regulatory classification for revenue and compliance reporting\n\nApply these dimensions consistently when segmenting forecast models, setting safety stock policy, or analyzing demand volatility.\n\n---\n\n## Regional and Territorial Organization\n\nThe `Region` and `District` fields align customer locations with the sales organization structure:\n\n- **Region** \u2014 Broad geographic grouping for consolidated reporting and regional demand analysis\n- **District** \u2014 Sales territory assignment; use to align supply planning with sales management hierarchy\n\nWhen analyzing demand or planning supply, respect the sales territory boundaries encoded in `District` unless a specific cross-territory analysis is required by the process.\n\n---\n\n## Related\n\n- [Customer Master](/datasets/tables/DimCustomer.md) \u2014 Authoritative dataset for all customer attributes and hierarchies\n- [Demand Forecast](/datasets/tables/demand_forecast.md) \u2014 Demand signals by customer group and planning period\n- [Sales Orders](/datasets/tables/sales_orders.md) \u2014 Actual customer orders and fulfillment history\n- [New Product Performance Review](/playbooks/new_product_review.md) \u2014 Customer segmentation used in product performance analysis", "entities/product": "## Definition\n\nA **Product** (also referred to as an Item or SKU) is the fundamental planning unit in the supply chain. Each product has a unique `ItemSKU` and carries attributes that govern how it is planned, procured, stored, and sold.\n\nProduct master data originates from the ERP and is exposed through the governed [Product Master](/datasets/tables/DimProduct.md) dimension. That dataset is the authoritative source for all product attributes used in supply chain analysis.\n\n---\n\n## Key Attributes\n\n| Concept | DimProduct Column | Description |\n| --- | --- | --- |\n| Identifier | `ItemSKU` | Primary key; unique item-level grain identifier used as FK across all gold fact tables |\n| Display label | `ItemSKUDesc` | ETL-computed: `ItemSKU + ' - ' + ItemDescription`; use in visuals and slicers |\n| Item description | `ItemDescription` | Full item name from product master |\n| Lifecycle stage | `LifecycleStage` | ETL-computed canonical stage: Pre-Invoicing, Recent Launch, Current, End of Life |\n| Item class | `ItemClassCode` / `ItemClassName` | Product classification code and description |\n| Collective class | `CollectiveClass` / `CollectiveClassGroup` | Category grouping; `CollectiveClassGroup` is the ETL-governed version for reporting |\n| Product line | `ProductLine` | Product line grouping |\n| Planning series | `PlanningSeries` | Series identifier using Logility naming convention |\n| Planner | `ItemForecastPlannerID` | Assigned forecast planner |\n| Primary vendor | `PrimaryVendor` / `PrimaryVendorName` | Default procurement source |\n| Sourcing origin | `ImportDomesticCode` / `CountryOfOrigin` | Import vs. domestic indicator and country of manufacture |\n| Unit cost | `CurrentUnitCost` | Average/list unit cost |\n| Market begin | `MarketBeginDate` | Market availability start date |\n| Market end | `MarketEndDate` | Market availability end date; NULL while item is active |\n| First invoice date | `InitialInvoiceDate` | Date of first customer invoice; drives Recent Launch classification |\n| Discontinued date | `DiscontinuedDate` | Date item was discontinued |\n| Part or item | `PartFlag` | ETL-computed: PART or ITEM; use to exclude component SKUs from customer-facing reports |\n| Kit type | `KitFlag` | ETL-computed: Bedding Kit, UPH Kit, Swatch, HIDES, VINYL, or empty for non-kit items |\n\n---\n\n## Product Lifecycle Stages\n\nLifecycle stage is governed by the ETL-computed `LifecycleStage` column in [DimProduct](/datasets/tables/DimProduct.md). Do not derive it independently \u2014 use this column as the single canonical source.\n\n| Stage | Meaning | Primary Conditions |\n| --- | --- | --- |\n| Pre-Invoicing | Item created, not yet invoiced to any customer | `AFIItemStatus = 'N'` |\n| Recent Launch | First customer invoice within the past 9 months | `InitialInvoiceDate >= today \u2212 9 months` |\n| Current | Actively sold item with established history | Default (none of the above or below conditions met) |\n| End of Life | Planned for drop or already discontinued | `FutureStatus IN (F, P, L, E)` OR `AFIItemStatus IN (D, R)` |\n\n> Priority order: End of Life (via FutureStatus) \u2192 Pre-Invoicing \u2192 Recent Launch \u2192 End of Life (via AFIItemStatus) \u2192 Current. FutureStatus takes precedence over AFIItemStatus.\n\n`LifecycleStageSortOrder` (1\u20134) provides a numeric sort order for visuals where alphabetic ordering would be misleading.\n\n---\n\n## New Product Classification\n\nA product enters the **Recent Launch** stage when its `InitialInvoiceDate` falls within the past 9 months. This is the organization's defined window for newly introduced products.\n\nNew products require special handling in planning and analysis:\n\n- Forecast accuracy is expected to be lower due to limited demand history.\n- Safety stock targets may be elevated to buffer against launch-period demand uncertainty.\n- Performance should be reviewed more frequently than established products.\n\nSee [New Product Performance Review](/playbooks/new_product_review.md) for the full analysis process.\n\n---\n\n## Component and Kit Classification\n\nNot all SKUs represent sellable finished goods. Two ETL-computed flags identify special item types:\n\n- **`PartFlag = 'PART'`** \u2014 Component or sub-assembly SKU; exclude from customer-facing demand and inventory reports unless explicitly analyzing component-level demand.\n- **`KitFlag`** \u2014 Classifies kit and material type (Bedding Kit, UPH Kit, Swatch, etc.); use when unit-count measures must distinguish kit items from standard items.\n\nFor demand measures that must aggregate component demand to the parent finished-good level, use `MarketableItemSKU` and `MarketableConversionFactor` (pending ETL implementation).\n\n---\n\n## Related\n\n- [Product Master](/datasets/tables/DimProduct.md) \u2014 Authoritative dataset for all product attributes and lifecycle classification\n- [Recently Introduced](/glossary/recently_introduced.md) \u2014 New product window definition\n- [New Product Performance Review](/playbooks/new_product_review.md) \u2014 Analysis playbook for new products", "entities/transaction_date": "## Definition\n\nA **Transaction Date** is a calendar date mapped to the organization's fiscal calendar. It is the primary time axis for supply chain analysis, providing the full fiscal hierarchy \u2014 week, month, quarter, half, and year \u2014 along with relative period indicators that enable rolling-window queries without hardcoded date ranges.\n\nTransaction date attributes originate from the governed [Fiscal Calendar](/datasets/tables/DimDate.md) dimension. That dataset is the authoritative source for all date and fiscal period attributes used in supply chain analysis.\n\n---\n\n## Grain and Uniqueness\n\nThe [Fiscal Calendar](/datasets/tables/DimDate.md) table is keyed on **`TransactionDate`**, one row per distinct calendar date. This means:\n\n- Every date in the supported planning horizon has exactly one row\n- Fiscal period attributes (week, month, quarter) are properties of the date, not computed at query time\n- Rolling-window filters use the `*Indicator` columns rather than date arithmetic\n\n---\n\n## Fiscal Calendar Hierarchy\n\nThe organization uses a fiscal calendar that does not necessarily align with the Gregorian calendar. Weeks run Sunday\u2013Saturday. Months, quarters, and halves are composed of whole fiscal weeks.\n\n| Level | Columns | Format |\n| --- | --- | --- |\n| Day | `TransactionDate`, `DayOfWeek` | DATE, full weekday name |\n| Week | `FiscalWeekNum`, `FWDesc`, `FiscalYearWeekNum` | Within-year number, label, YYYYWW |\n| Month | `FiscalMonthNum`, `FMDesc`, `FiscalMonthName`, `FiscalYearMonthNum` | 1\u201312, label, abbreviation, YYYYMM |\n| Quarter | `FiscalQuarterNum`, `FQDesc` | 1\u20134, label |\n| Half | `FiscalHalfNum`, `FHDesc`, `FiscalYearHalfNum` | 1\u20132, label, YYYYH |\n| Year | `FiscalYear`, `FYDesc` | YYYY, label |\n\nPeriod boundary columns (`FiscalWeekStart`, `FiscalWeekEnd`, `FiscalMonthStart`, `FiscalMonthEnd`, `FiscalYearStart`, `FiscalYearEnd`) provide the DATE values for the start and end of each period enclosing a given date.\n\n---\n\n## Period Indicators\n\nRelative period indicator columns index time relative to today, eliminating hardcoded date thresholds in analysis logic.\n\n| Column | Meaning |\n| --- | --- |\n| `FiscalDayIndicator` | 0 = today; \u2212N = N days ago; +N = N days ahead |\n| `FiscalWeekIndicator` | 0 = current week; \u2212N = N weeks ago; +N = N weeks ahead |\n| `FiscalMonthIndicator` | 0 = current month; \u2212N = N months ago; +N = N months ahead |\n| `FiscalQuarterIndicator` | 0 = current quarter; \u2212N = N quarters ago; +N = N quarters ahead |\n| `FiscalYearIndicator` | 0 = current year; \u2212N = N years ago; +N = N years ahead |\n\nWhen defining rolling windows (e.g., last 13 weeks, next 3 months), always filter on these indicator columns rather than computing date ranges at query time.\n\n---\n\n## Holiday and Day-Type Classification\n\nThe `HolidayIndicator` and `WeekdayWeekend` columns provide day-type attributes for demand pattern segmentation:\n\n- `HolidayIndicator` \u2014 \"Holiday\" or \"Non-Holiday\"; use with `HolidayName` to identify named holidays\n- `WeekdayWeekend` \u2014 \"Weekday\" or \"Weekend\"; use when demand patterns differ by day type\n\n---\n\n## Related\n\n- [Fiscal Calendar](/datasets/tables/DimDate.md) \u2014 Authoritative dataset for all fiscal date and period attributes\n- [FILL IN: Link to Forecast Accuracy metric]\n- [FILL IN: Link to Days of Supply metric]\n- [FILL IN: Link to Demand Forecast dataset]", "entities/vendor": "## Definition\n\nA **Vendor** is a supplier from whom the company sources products. Vendors are the procurement nodes in the supply chain and appear as a reporting dimension across purchase orders, receipts, on-time delivery, and production planning. The [Vendor Master](/datasets/tables/DimVendor.md) dataset is the single source of truth for all vendor attributes.\n\nVendor identity is keyed on `VendorNumber`, which serves as the foreign key across all gold fact tables in the supply chain warehouse (`FactPSW`, `FactReceipts`, `FactOnTime`, `FactProduction`).\n\n---\n\n## Active Status\n\nThe `VendorActive` flag distinguishes vendors still in active use from those that have been deactivated. Both active and inactive vendors are retained in `DimVendor` to preserve historical fact joins.\n\n| `VendorActive` | Meaning |\n| --- | --- |\n| `Y` | Vendor is active; eligible for new purchase orders and planning |\n| `N` | Vendor is inactive; historical records only \u2014 exclude from forward-looking analyses |\n\nWhen filtering for current procurement or supply planning analyses, always apply `VendorActive = 'Y'` unless the intent is to include historical sourcing data.\n\n---\n\n## Lead Time\n\n`LeadTime` is the standard order lead time in days from purchase order placement to expected receipt. It is sourced from the vendor master and used in supply planning calculations to determine when to place replenishment orders.\n\nLead time is a vendor-level attribute. If item-level lead time variation is needed, verify whether that granularity is captured in the product or procurement source systems \u2014 it is not stored in `DimVendor`.\n\n---\n\n## Country of Origin\n\n`Country` identifies the country of the vendor's primary location or origin, used primarily for import vs. domestic segmentation in sourcing and compliance reporting. This is the vendor's country, not the product's country of origin \u2014 the two may differ when a vendor sources from multiple countries.\n\n---\n\n## Vendor Office\n\nVendors may have multiple offices (`VendorOffice`, `VendorOfficeLocation`). Office-level grouping supports sourcing and supply planning reports that need visibility below the vendor level but above the transaction level.\n\n---\n\n## Related\n\n- [Vendor Master](/datasets/tables/DimVendor.md) \u2014 Source dataset for all vendor attributes and active status", "entities/warehouse": "## Definition\n\nA **Warehouse** is a physical distribution center or virtual inventory location used in supply chain planning. Warehouses are the fulfillment nodes for customer orders and the primary dimension for inventory planning and supply allocation reporting.\n\nVirtual warehouse codes (A-suffixed, e.g., `1A`, `15A`, `ECA`) exist in the source system as distinct identifiers but represent the same physical facility as their base code counterpart. For planning purposes they are collapsed onto their physical facility via the `PlanningWarehouse` field in [Warehouse Master](/datasets/tables/DimWarehouse.md).\n\n---\n\n## Warehouse Types\n\n- **Manufacturing and Distribution Warehouse** - physical warehouse locations that meet at least some of their supply through manufacturing. Supply will also come through transfers in from other warehouse sources or purchase orders from third party vendors. Invoices to either wholesale customers receiving full truckload (FTL) or less than truckload shipments (LTL), or direct to consumer \"express\" shipments through parcel services (unless otherwise noted).\n- **Distribution Warehouse** - physical warehouse locations that meet their demand through external supply sources. Either through transfers in from manufacturing sites or purchase orders from third party vendors. Invoices to either wholesale customers receiving full truckload (FTL) or less than truckload shipments (LTL), or direct to consumer \"express\" shipments through parcel (fedEx) services.\n- **Manufacturing Satellite Warehouse** - physical warehouse locations that only manufacturing and do not directly invoice to customers. They transfer out their production to our warehouses that have distribution as well.\n- **Container Direct Warehouse** - This is a type of virtual warehouse used for the facilitation of the container direct program, where a customer's order is passed to and directly fulfilled by third party vendors. No inventory is ever taken into our possession. Note: this is a wholesale program, full ocean container loads to furniture dealers, and should not be confused with direct to consumer ecommerce by parcel service\n- **Intransit Warehouse** - another type of virtual warehouse used to track inventory that is being transferred between warehouses. When a physical warehouse loads a transfer out to another warehouse, an inventory transaction debits the physical warehouse and credits the intransit warehouse assigned to the destination. When the transfer arrives at the destination, an inventory transaction debits the intransit warehouse and credits the physical warehouse that the load arrived at.\n- **Virtual Warehouse** - An entity in our ERP system that is tied to a physical location. This was used as a way to allocate separate inventory for a specific customer that would purchase against the virtual warehouse. The program has been discontinued, although invoice and inventory history still have records from these locations\n\n---\n\n## Warehouse Details\n\n### Manufacturing and Distribution Warehouses\n\n#### 1 - Arcadia\n\n- Located in Arcadia, Wisconsin\n- Manufactures Domestic Casegoods and Stationary Upholstery pieces and distrbutes all other finished goods products\n- Site ID: 001\n- Intransit Warehouse: A\n- Virtual Warehouse: 1A\n\n#### 15 - Leesport\n\n- Located in Leesport, Pennsylvania\n- Manufactures Stationary Upholstery pieces and distrbutes all other finished goods products\n- Site ID: 015\n- Intransit Warehouse: L\n- Virtual Warehouse: 15A\n\n#### 17 - Advance\n\n- Located in Advance, North Carolina\n- Manufactures Stationary Upholstery and distrbutes all other finished goods products\n- Site ID: 017\n- Intransit Warehouse: N\n- Virtual Warehouse: 17A\n\n#### ECR - Ecru\n\n- Located in Ecru, Mississippi\n- Manufactures Stationary Upholstery and distrbutes all other finished goods products\n- Site ID: 013\n- Intransit Warehouse: E\n- Virtual Warehouse: ECA\n\n#### 19 - Saltillo\n\n- Located in Saltillo, Mississippi\n- Manufactures Hybrid Mattress. Primarily transfers out to other distribution warehouses, but can invoice its products directly to wholesale customers that buy full truckloads. Currently not set up for LTL or Express shipment capability due to it's limited finshed goods storage space.\n- Site ID: 019\n- Intransit Warehouse: S\n- Virtual Warehouse: 19A\n\n### Distribution Warehouses\n\n#### 28 - Mesquite\n\n- Located in Mequite, Texas\n- Distributes all finished goods products\n- Site ID: 028\n- Intransit Warehouse: T\n- Virtual Warehouse: 28A\n\n#### 5 - Redlands\n\n- Located in Redlands, California\n- Distributes all finished goods products\n- Site ID: 005\n- Intransit Warehouse: B\n- Virtual Warehouse: 5A\n\n#### 335 - Ashton\n\n- Located in Ho Chi Minh City, Vietnam\n- Bonded warehouse program benefitting from certain import duties.\n- Warehouses and distrbutes all products produced in Vietnam. Select items from other countries may also be opened at this location.\n- Acts as a consolidation location for consolidating inventory from multiple vendors\n- Primary service point for international customers in Asia, Australia, Africa, Europe\n- Serves US customers who don't want to buy full containers direct from vendors\n- Also consolidates and transfers to our USA based distribution warehouses where needed supply may not fill containers direct from vendors regularly\n- Intransit Warehouse: G\n\n#### 42 - Spanaway\n\n- Located in Spanaway, Washington\n- Distrbuted all finished goods products\n- Discontinued invoicing in spring of 2025, although inventory records may still persist until full closure in spring 2026\n- Site ID: 042\n- Intransit Warehouse: F\n- Virtual Warehouse: 42A\n\n### Manufacturing Satellite Warehouses\n\n#### 12 - Ripley\n\n- Located in Ripley, Mississippi\n- Manufactures Motion Upholstery and transfers out to distribution warehouses\n\n#### 101 - Chippewa Falls\n\n- Located in Chippewa Falls, Wisconsin\n- Manufactures Stationary Upholstery and transfers out to warehouse 1 - Arcadia\n\n#### 201 - Verona Plant 4\n\n- Located in Verona, Mississippi\n- Manufactures Foam Mattresses and transfers out to distribution warehouses\n\n#### 20 - Verona Foam Plant\n\n- Located in Verona, Mississippi\n- Manufactures Foam to be used as a raw material in downstream Finished Good production.\n  - Transfers foam next door to 201 - Verona for foam mattress production\n  - Transfers processed foam to 19 - Saltillo to be used in the foam layers of hybrid mattress production\n  - Transfers Foam Buns to ECR - Ecru to be used in the foam cushions for FG upholstery production\n\n#### 3 - Whitehall\n\n- Located in Whitehall, Wisconsin\n- Manufactures fiber and webbing to be used as a raw material downstream upholstery production\n\n#### 151 Pottsville\n\n- Located in Pottsville, Pennsylvania\n- Closed location. Used to manufacture stationairy upholstery and transfer out to warehouse 15 - Leesport\n\n### Container Direct Warehouses\n\n#### C - Container Direct\n\n#### CNW - Container Direct\n\n#### AF - Container Direct\n\n#### IOR - Container Direct\n\n#### C35 - Ashton Container Direct\n\n#### C99 - Container Direct\n\n### Cross Dock Warehouses\n\n#### 49 - Colton XD\n\n- Located in Redlands, California\n- Used as a temporary virtual warehouse to support the cross docking of inbound containers. Example of use use may be when ocean carrier constraints prevent shipments to Central and Eastern USA warehouse locations, and we were only able to get a booking to the West Coast. Unloads the receipt from purchase order and directly loads back onto an outboud trailer, transfering out to the destination warehouse\n\n---\n\n## Warehouse Groups\n\nEach warehouse is assigned to an operational group (`WarehouseGroup`) that governs how it aggregates in planning and reporting. The grouping is ETL-computed from `WarehouseID`.\n\n| Group | Description | Warehouse Codes |\n| --- | --- | --- |\n| `AFI` | Core AFI distribution centers, including virtual A-suffix counterparts | 1, 15, 17, 28, 42, 5, ECR, 19A, 1A, 15A, 17A, 28A, 42A, 5A, ECA |\n| `ASH` | Ashton distribution facility | 335 |\n| `C.DIR` | Container Direct \u2014 all direct-import receiving variants | C, CNW, C35, AF, C99, IOR |\n| `PROD` | Production-only, non-invoicing facilities | 12, 101, 151, 19, 201, 20, 3 |\n| `CXD` | Cross-dock only | 49 |\n| `SDS` | Supplier Direct Ship | 55 |\n| NULL | Warehouse codes with no group assignment | All other codes |\n\nNote: `19` (Saltillo) is classified as `PROD`; its virtual counterpart `19A` is classified as `AFI`. This distinction is intentional in the source ETL.\n\n---\n\n## Planning Warehouse\n\nThe `PlanningWarehouse` field provides a single canonical planning facility code per warehouse, replacing three divergent calculated columns (`Physical WH`, `WH Site`, `WHSE`) used across legacy reports. All warehouse-level filtering and aggregation in current reports should use `PlanningWarehouse`.\n\nKey rules:\n\n- Physical warehouse codes map directly to a facility code (e.g., `1 \u2192 1-RKD`, `ECR \u2192 ECR-ECR`).\n- Virtual A-suffixed codes collapse onto their physical facility code (e.g., `1A \u2192 1-RKD`, `ECA \u2192 ECR-ECR`).\n- Codes with no explicit mapping pass through as-is.\n\n| `WarehouseID` | `PlanningWarehouse` | Facility Name |\n| --- | --- | --- |\n| 1, 1A | 1-RKD | Arcadia |\n| 15, 15A | 15-LEE | Leesport |\n| 17, 17A | 17-ADV | Advance |\n| 19, 19A | 19-SLT | Saltillo |\n| 28, 28A | 28-MES | Mesquite |\n| 42, 42A | 42-SPW | Spanaway |\n| 5, 5A | 5-RED | Redlands |\n| ECR, ECA | ECR-ECR | Ecru |\n| 335 | 335-ASH | Ashton |\n| C | C-ENT | Container Direct Enterprise Contract |\n| CNW | CNW-CUS | Container Direct Customer Contract |\n| C35 | C35-ASH | Container Direct through Ashton |\n| AF | AF-CND | Container Direct AF |\n| C99 | C99-CND | Container Direct 99 |\n| IOR | IOR-CND | Container Direct Importer of Record |\n| 12 | 12-RIP | Ripley |\n| 101 | 101-CHP | Chippewa Falls |\n| 151 | 151-POT | Pottsville |\n| 201 | 201-VRM | Verona Mattress |\n| 20 | 20-VRF | Verona Foam |\n| 3 | 3-WHT | Whitehall |\n| 49 | 49-COL | Colton Crossdock |\n| 55 | 55-SDS | Supplier Direct Ship |\n\n---\n\n## Related\n\n- [Warehouse Master](/datasets/tables/DimWarehouse.md) \u2014 Source dataset for all warehouse attributes and ETL-computed fields", "glossary/customer_group": "## Definition\n\n**Customer Group** is a Logility demand planning construct that groups individual customer accounts into segments for collaborative forecast review. Demand planners work at the customer group level when building and adjusting the [Working Forecast](/datasets/tables/FactWorkingForecast.md) \u2014 a single customer group row represents the aggr
