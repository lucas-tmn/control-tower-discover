egate demand from all accounts within that group for a given item-warehouse-week.\n\n## Current Customer Groups\n\n| Customer Group | Makeup |\n| --- | --- |\n| AFICONS | Intended for Primaries and general wholesale customers. But is the default assignment when no other rule exists |\n| ECOMM | Ecommerce accounts like Wayfair and Amazon |\n| HSENT | Enterprise HomeStore accounts |\n| HSLIC | Licensee HomeStore accounts |\n| INT | International accounts |\n| MASSRENT | Mass Merchants like Walmart and Menards, and Rental stores like Aaron's or Rent-A-Center |\n| MFRM | Mattress firm account |\n| NFM | Nebraska Furniture Mart account |\n| RHCUST | Resident Home account |\n\n## Distinction from DimCustomer\n\nCustomer Group is not the same as an individual customer record in [Customer Master](/datasets/tables/DimCustomer.md).\n\n| | Customer Group | Customer (DimCustomer) |\n| --- | --- | --- |\n| **Level** | Planning segment (group of accounts) | Individual account or ship-to |\n| **Where used** | [Working Forecast](/datasets/tables/FactWorkingForecast.md) grain | Order and sales transaction grain |\n| **Source** | Logility DemandPlanning | [FILL IN: ERP or MDM source for DimCustomer] |\n| **Collapsed at consensus** | Yes \u2014 not retained in [Current Forecast](/datasets/tables/FactCurrentForecast.md) | No |\n\n## AFICONS\n\n`AFICONS` is a valid Logility customer group. Rows in the source DemandPlanning database where the customer group is NULL are normalized to `AFICONS` by the ETL load. Treat `AFICONS` as a real planning segment, not a data quality flag.\n\n## Where Customer Group Appears\n\n`CustomerGroup` is part of the grain in [Working Forecast](/datasets/tables/FactWorkingForecast.md) only. It is not carried through to [Current Forecast](/datasets/tables/FactCurrentForecast.md) after the [Demand Consensus](/glossary/demand_consensus.md) process collapses the customer group dimension.\n\n## Related\n\n- [Working Forecast](/datasets/tables/FactWorkingForecast.md)\n- [Current Forecast](/datasets/tables/FactCurrentForecast.md)\n- [Demand Consensus](/glossary/demand_consensus.md)\n- [Customer Master](/datasets/tables/DimCustomer.md)", "glossary/demand_consensus": "## Definition\n\n**Demand Consensus** is the collaborative demand planning process in which the demand team reviews, adjusts, and approves the in-progress working forecast in Logility. Once consensus is reached, the approved forecast is synchronized from Logility's DemandPlanning database to the SupplyPlanning database, where it becomes the [Current Forecast](/datasets/tables/FactCurrentForecast.md).\n\n## What Changes at Consensus\n\nTwo things happen when a forecast moves through Demand Consensus:\n\n- **Database**: The forecast moves from Logility DemandPlanning \u2192 SupplyPlanning.\n- **CustomerGroup dimension is collapsed**: The [Working Forecast](/datasets/tables/FactWorkingForecast.md) carries demand at the customer group level. The post-consensus [Current Forecast](/datasets/tables/FactCurrentForecast.md) aggregates these into a single item-warehouse-week row; the customer group breakdown is not retained in the supply planning view.\n\n| | Before Consensus | After Consensus |\n| --- | --- | --- |\n| **Table** | [Working Forecast](/datasets/tables/FactWorkingForecast.md) | [Current Forecast](/datasets/tables/FactCurrentForecast.md) |\n| **Logility database** | DemandPlanning | SupplyPlanning |\n| **Grain** | Item \u00d7 Warehouse \u00d7 CustomerGroup \u00d7 Week | Item \u00d7 Warehouse \u00d7 Week |\n| **Status** | In-progress; subject to change | Approved; consumed by supply planning |\n\n## Implications for Analysis\n\n- Demand visible in [Working Forecast](/datasets/tables/FactWorkingForecast.md) is **not yet committed** \u2014 planners may still revise quantities before consensus.\n- The [Current Forecast](/datasets/tables/FactCurrentForecast.md) is the authoritative signal for supply plan inputs and item-warehouse reconciliation after consensus.\n- Customer-level [Forecast Accuracy](/metrics/forecast_accuracy.md) uses the [Working Forecast](/datasets/tables/FactWorkingForecast.md) captured at the time of consensus, because that is when the approved demand signal is pushed to SupplyPlanning and the working and current forecasts are in sync at the shared item-warehouse total.\n- The cadence and approval steps of the Demand Consensus process are [FILL IN: cadence and stakeholders for the Demand Consensus review cycle].\n\n## Related\n\n- [Working Forecast](/datasets/tables/FactWorkingForecast.md)\n- [Current Forecast](/datasets/tables/FactCurrentForecast.md)\n- [Customer Group](/glossary/customer_group.md)\n- [Forecast Accuracy](/metrics/forecast_accuracy.md)", "glossary/firm_demand": "## Definition\n\n**Firm Demand** is the total confirmed open customer order quantity for a given item-warehouse-week combination. These are orders that have been placed by customers and are open in the ERP system \u2014 committed demand the business is obligated to fulfill.\n\nFirm Demand is distinct from statistical forecast (which is probabilistic) and from [Net Forecast](/glossary/net_forecast.md) (which is the uncovered residual after firm orders are applied).\n\n## Role in the Supply Plan\n\nIn Logility, Firm Demand takes priority over forecast when computing planned demand:\n\n1. **Firm Demand** is applied first \u2014 it represents known, committed orders.\n2. **Net Forecast** covers only the portion of the statistical forecast not yet covered by firm orders.\n3. **Promo Lift** is added separately as a manual marketing input.\n\nThis sequencing prevents double-counting: the supply plan does not simultaneously plan for both a customer order and the forecast that originally predicted that order.\n\n## Near-Term vs. Outer Weeks\n\n- In **near-term weeks**, most of the week's expected demand already appears as Firm Demand. Net Forecast will be small or zero.\n- In **outer weeks** beyond the order horizon, Firm Demand is sparse and the plan relies primarily on Net Forecast.\n\nAgents should expect high Firm Demand / low Net Forecast in the near term, and low Firm Demand / high Net Forecast further out. A week with unexpectedly high Net Forecast in the near term may signal late-ordering customers or an overstated statistical forecast.\n\n## Related\n\n- [Net Forecast](/glossary/net_forecast.md)\n- [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md)\n- [Sales Orders](/datasets/tables/sales_orders.md)\n- [Supply Plan Review](/playbooks/supply_plan_review.md)", "glossary/net_forecast": "## Definition\n\n**Net Forecast** is the week's statistical demand forecast quantity after subtracting the firm open customer orders already placed for that week. It represents only the \"unmet\" portion of the forecast \u2014 demand that is expected but not yet committed.\n\n```text\nNetForecast = MAX(0, StatisticalForecast \u2212 FirmDemand)\n```\n\nNetForecast has a **lower bound of zero**. When firm customer orders meet or exceed the week's statistical forecast, NetForecast equals zero rather than going negative.\n\n## Why Net Forecast Exists\n\nWithout netting, a supply plan that includes both firm orders and a full statistical forecast would double-count demand \u2014 planning for the same customer need twice. Logility uses Net Forecast to ensure that only the uncovered portion of the forecast is planned for, keeping total projected demand accurate.\n\nIn practice:\n\n- In **near-term weeks** (inside the order horizon), firm orders typically dominate and Net Forecast is often zero.\n- In **outer weeks** (beyond the order horizon), firm orders are sparse and Net Forecast approaches the full statistical forecast.\n\n## Relationship to Total Demand\n\nNet Forecast is one of three components of total planned demand in the supply plan:\n\n```text\nTotalDemand = FirmDemand + Promo Lift + NetForecast\n```\n\nSee [Firm Demand](/glossary/firm_demand.md) and [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md) for the other components.\n\n## What Net Forecast Is Not\n\nNet Forecast is **not** the statistical forecast itself. When comparing the supply plan's demand signal to the Logility forecast output, use the statistical forecast from the appropriate forecast dataset \u2014 not `NetForecast` from `FactSupplyPlanDetail`, which has already been reduced by firm orders.\n\n## Related\n\n- [Firm Demand](/glossary/firm_demand.md)\n- [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md)\n- [Demand Forecast](/datasets/tables/demand_forecast.md)\n- [Supply Plan Review](/playbooks/supply_plan_review.md)", "glossary/overstock": "## Definition\n\n**Overstock** is the condition where total supply (on-hand + inbound POs) materially exceeds projected demand over the planning horizon.\n\nIt is the mirror of [stockout](/glossary/stockout.md): instead of running out, the organization carries more inventory than it can sell within a reasonable timeframe \u2014 incurring holding costs, tying up working capital, and risking obsolescence.\n\n## Threshold\n\nAn item is flagged as overstock when [Overstock Exposure](/metrics/overstock_exposure.md) exceeds:\n\n> **[FILL IN: e.g., X weeks of forward demand above the safety stock target]**\n>\n> This threshold requires confirmation from the planning team. Update and change `status` to `active` once agreed.\n\n## Common Root Causes\n\n- Demand came in below forecast \u2014 the most common cause for new products during the launch period.\n- Supply was built or procured based on an inflated demand signal before the miss was visible.\n- A forecast was revised downward too late to stop inbound POs already in transit.\n- Promotional or seasonal demand did not materialize as planned.\n\n## Business Impact\n\n- **Holding costs**: warehouse space, handling, and insurance on inventory that is not moving.\n- **Obsolescence risk**: particularly acute for new products if demand fails to ramp as expected or the product does not gain traction.\n- **Cash flow**: excess inventory ties up working capital that could be deployed elsewhere.\n\n# Related\n\n- [Overstock Exposure](/metrics/overstock_exposure.md)\n- [Days of Supply](/metrics/days_of_supply.md)\n- [Stockout](/glossary/stockout.md)\n- [Forecast Revision](/playbooks/forecast_revision.md)\n- [New Product Performance Review](/playbooks/new_product_review.md)", "glossary/promo_lift": "## Definition\n\n**Promo Lift** is the incremental demand quantity expected from a planned promotion. It is entered by the demand planning or marketing team in Logility, separate from the statistical forecast, to augment the base demand signal when a promotion is expected to drive demand above the model's baseline.\n\nPromo Lift is always a separate component \u2014 it is never embedded in the [Resultant Forecast](/glossary/resultant_forecast.md). Total demand is:\n\n```text\nTotalForecast = ResultantForecast + PromoLift\n```\n\n## Weekly Distribution Caveat\n\nDemand planning in Logility operates at a **monthly grain**. When promo lift flows downstream, the week-level distribution differs between datasets:\n\n**[Current Forecast](/datasets/tables/FactCurrentForecast.md)** \u2014 Promo Lift is extracted at the monthly level and then distributed evenly across all fiscal weeks in that month (\u00f7 weeks in month). A promotion entered for week 1 of a 4-week month appears as `promo_qty \u00f7 4` in each of the four weeks \u2014 not concentrated in the actual promo week.\n\n**[Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md)** \u2014 The supply planning module reflects the actual week the promo lift was entered. The full promo quantity appears in the correct planning week; distribution is accurate at the week level.\n\n| Use case | Recommended source |\n| --- | --- |\n| Monthly aggregate promo demand | Either table |\n| Weekly promo timing accuracy | [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md) |\n| Forecast input vs. actuals comparison | [Current Forecast](/datasets/tables/FactCurrentForecast.md) |\n\n## Related\n\n- [Resultant Forecast](/glossary/resultant_forecast.md)\n- [Current Forecast](/datasets/tables/FactCurrentForecast.md)\n- [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md)\n- [Net Forecast](/glossary/net_forecast.md)", "glossary/recently_introduced": "## Definition\n\nA product is considered **recently introduced** if its `InitialInvoiceDate` from [Product Master](/datasets/tables/DimProduct.md) falls within the following window:\n\n> **[FILL IN: e.g., \"within the last 12 months\" or \"within the first N weeks/months after intro_date\"]**\n\nThis classification gates which items are included in new product performance reviews and applies appropriate planning adjustments.\n\n## Why This Definition Matters\n\nThe boundary between \"new\" and \"established\" is a business decision, not a universal supply chain standard. A consistent definition ensures:\n\n- Agents apply the same filter across all analyses involving new products.\n- Performance expectations are calibrated appropriately \u2014 a 60% forecast accuracy for a new product is evaluated differently than the same accuracy for an established item.\n- Planning parameters (safety stock, review frequency) are applied to the right items at the right time.\n\n## Data Source\n\n| Field | Dataset | Notes |\n| --- | --- | --- |\n| `InitialInvoiceDate` | [Product Master](/datasets/tables/DimProduct.md) | Date of first customer invoice; drives Recent Launch lifecycle stage classification |\n| `LifecycleStage` | [Product Master](/datasets/tables/DimProduct.md) | Exclude items where `LifecycleStage = 'End of Life'` from scope |\n\n## Action Required\n\n> This definition requires confirmation from the planning or product management team. Update the time window above and change `status` to `active` once agreed.\n\n## Related\n\n- [Product](/entities/product.md)\n- [Product Master](/datasets/tables/DimProduct.md)\n- [New Product Performance Review](/playbooks/new_product_review.md)", "glossary/resultant_forecast": "## Definition\n\n**Resultant Forecast** is the final demand forecast quantity produced by Logility after planner-applied overrides and adjustments have been layered on top of the base statistical model output. It represents demand planning's approved forecast \u2014 the number the supply plan is expected to cover.\n\n## What \"Resultant\" Means\n\nLogility's planning workflow distinguishes between two values:\n\n- **Statistical (base) forecast** \u2014 quantity generated by Logility's demand model from historical patterns; no human input applied\n- **Resultant forecast** \u2014 the statistical forecast after planners have applied manual adjustments or overrides (e.g., new product launch lifts, event adjustments, management inputs)\n\nThe `ResultantForecast` column in [Current Forecast](/datasets/tables/FactCurrentForecast.md) always reflects the **post-override** value. It is not the raw statistical model output.\n\n## What Resultant Forecast Is Not\n\nResultant Forecast does **not** include promotional lift. Promo lift is tracked separately as `PromoLift` and combined at the `TotalForecast` level. See [Promo Lift](/glossary/promo_lift.md).\n\nResultant Forecast is also not the same as [Net Forecast](/glossary/net_forecast.md), which is the statistical forecast portion of the supply plan *net of firm customer orders* and floored at zero.\n\n## Related\n\n- [Current Forecast](/datasets/tables/FactCurrentForecast.md)\n- [Promo Lift](/glossary/promo_lift.md)\n- [Net Forecast](/glossary/net_forecast.md)\n- [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md)\n- [Forecast Accuracy](/metrics/forecast_accuracy.md)", "glossary/stockout": "## Definition\n\nA **stockout** is the condition where available inventory cannot satisfy current or near-term demand.\n\nThere are two types of stockout conditions:\n\n## Current Stockout\n\n`qty_available = 0` for an active, demand-bearing item.\n\nThe item has no available inventory and cannot fill open orders without a receipt from a supplier.\n\n## Projected Stockout\n\n`coverage_days < lead_time_days` \u2014 the item will exhaust its inventory before the next replenishment can arrive, even if inventory is currently positive.\n\nProjected stockout is the more actionable signal because it identifies risk before it becomes a live outage, allowing time for intervention.\n\n## What Counts as \"Available\"\n\nAlways use `qty_available` from [inventory_onhand](/datasets/tables/inventory_onhand.md), **not** `qty_on_hand`. Allocated inventory is committed to open orders and cannot be redirected to fill new demand.\n\n## Severity Levels\n\n| Condition | Severity | Recommended Action |\n| --- | --- | --- |\n| `days_of_supply \u2265 lead_time_days` | None | No action needed |\n| `coverage_days < lead_time_days` and open PO arriving in time | Warning | Monitor PO closely; confirm receipt date with supplier |\n| `coverage_days < lead_time_days` and no open PO or PO arriving late | Critical | Expedite or place emergency PO; escalate to buyer |\n| `qty_available = 0` | Current Stockout | Immediate escalation; communicate to affected customers |\n\n> **Note**: Specific day thresholds for each severity level are not yet defined. See [FILL IN: phase 2 threshold documentation]. Follow [stockout_escalation](/playbooks/stockout_escalation.md) for the current decision process.\n\n## Related\n\n- [Coverage Days](/metrics/coverage_days.md)\n- [Days of Supply](/metrics/days_of_supply.md)\n- [Inventory On Hand](/datasets/tables/inventory_onhand.md)\n- [Stockout Escalation](/playbooks/stockout_escalation.md)", "metrics/atp_in_stock": "## Definition\n\nATP In Stock measures how often a selected item-warehouse-week had positive available-to-promise quantity in the ATP source. It is an event-rate metric: each ATP observation contributes one stock event, and observations where `ATPQty > 0` contribute one in-stock event.\n\nUse this metric to understand whether customers are likely seeing available ATP for active, forecasted items at customer-invoicing warehouses.\n\n## Calculation\n\n```text\nATPInStockRate = SUM(InStockEvent) / SUM(StockEvent)\n```\n\nExpressed as a percentage:\n\n```text\nATPInStockRate (%) = (SUM(InStockEvent) / SUM(StockEvent)) x 100\n```\n\nWhere:\n\n- `InStockEvent` = count of underlying ATP observations where `ATPQty > 0`\n- `StockEvent` = count of underlying ATP observations in scope\n\nBoth fields are produced by [ATP In Stock Query](/datasets/queries/atp_in_stock_query.md).\n\nDo not compute this metric when `SUM(StockEvent) = 0`; there are no ATP observations in scope for the selected grain.\n\n## Recommended Grain\n\nThe query output is grouped by:\n\n- `ItemSKU`\n- `WarehouseID`\n- `WeekEnding`\n- `RecentLaunchFlag`\n- `InitialInvoiceDate`\n\nFor reporting, aggregate to the level being reviewed before calculating the percentage. Examples:\n\n- Item x warehouse x week\n- Warehouse x week\n- `RecentLaunchFlag` x week\n- Total selected portfolio x week\n\nUse a ratio of sums, not an average of row-level percentages, when rolling up across items, warehouses, or weeks.\n\n## Scope Rules\n\nThe supporting query intentionally limits the metric to rows that are meaningful for ATP availability analysis:\n\n- `ATPWeek = 'Week2'`, matching a typical customer-request lead time of roughly seven days\n- prior completed fiscal weeks only, using `FiscalWeekIndicator BETWEEN -8 AND -1`\n- customer-invoicing warehouses `1`, `15`, `17`, `28`, `5`, `335`, and `ECR`\n- item-warehouse combinations with positive resultant forecast in the last 13 months\n- Logility item statuses excluding `D`, `I`, `R`, `T`, and `N`\n\nChanging these filters changes the business meaning of the metric and should be called out when comparing reports.\n\n## Interpretation\n\n| Rate | Signal |\n| --- | --- |\n| 100% | Every ATP observation in scope had positive ATP quantity. |\n| 0% < rate < 100% | Intermittent availability; customers may see ATP on some days but not consistently across the reviewed week. |\n| 0% | No ATP observation in scope had positive ATP quantity; this is a strong availability risk for the selected item, warehouse, and week. |\n\nUse `AvgATPQty` from [ATP In Stock Query](/datasets/queries/atp_in_stock_query.md) as supporting context. A high in-stock rate with low average ATP quantity can still indicate shallow availability, while a low in-stock rate with high average ATP quantity can indicate uneven ATP timing during the week.\n\n## Relationship to Stockout Analysis\n\nATP In Stock is customer-facing availability evidence. It complements, but does not replace, supply-plan metrics such as [Shippable Inventory](/metrics/shippable_inventory.md), [Safety Stock Gap](/metrics/safety_stock_gap.md), and [Projected Fulfillment Rate](/metrics/projected_fulfillment_rate.md).\n\n- ATP In Stock answers whether ATP showed positive available quantity during recent completed weeks.\n- Shippable Inventory and related supply-plan metrics answer whether the planning model projects enough future inventory to cover demand and safety stock.\n\nWhen ATP In Stock is low for active items with recent forecast demand, use [Stockout Escalation](/playbooks/stockout_escalation.md) or [Supply Plan Review](/playbooks/supply_plan_review.md) to investigate whether the issue is current inventory, inbound supply timing, forecast demand, or item status.\n\n## Related\n\n- [ATP In Stock Query](/datasets/queries/atp_in_stock_query.md)\n- [Stockout](/glossary/stockout.md)\n- [Shippable Inventory](/metrics/shippable_inventory.md)\n- [Safety Stock Gap](/metrics/safety_stock_gap.md)\n- [Projected Fulfillment Rate](/metrics/projected_fulfillment_rate.md)\n- [Supply Plan Review](/playbooks/supply_plan_review.md)\n- [Product Master](/datasets/tables/DimProduct.md)\n- [Warehouse Master](/datasets/tables/DimWarehouse.md)", "metrics/coverage_days": "## Definition\n\nCoverage Days is a snapshot metric: how long will current on-hand inventory last if no new supply arrives? It is a leading indicator of stockout risk and the fastest signal to compute when assessing immediate exposure.\n\nUnlike [Days of Supply](/metrics/days_of_supply.md), Coverage Days does **not** include open purchase orders. Use Coverage Days to assess immediate risk; use Days of Supply for forward-looking planning decisions.\n\n## Calculation\n\n```text\nCoverage Days = qty_available / avg_daily_demand\n```\n\nWhere:\n\n- `qty_available` = `qty_on_hand` minus `qty_allocated` from [inventory_onhand](/datasets/tables/inventory_onhand.md)\n- `avg_daily_demand` = rolling N-day average of `shipped_qty` from [sales_orders](/datasets/tables/sales_orders.md)\n- N = [FILL IN: 30, 60, or 90 days \u2014 confirm with planning team]\n\n## Interpretation\n\nCompare Coverage Days against the item's `lead_time_days` from [Product Master](/datasets/tables/DimProduct.md) ([FILL IN: confirm lead time column \u2014 not currently in DimProduct]):\n\n- **Coverage Days < lead_time_days** \u2192 Stockout risk: a replenishment order placed today cannot arrive before current stock is depleted.\n- **Coverage Days \u2265 lead_time_days** \u2192 Stock will last until the next receipt assuming normal demand continues.\n\nSpecific escalation thresholds are defined in [stockout_escalation](/playbooks/stockout_escalation.md).\n\n## Related\n\n- [Days of Supply](/metrics/days_of_supply.md) \u2014 the forward-looking companion metric that includes open POs\n- [Inventory On Hand](/datasets/tables/inventory_onhand.md)\n- [Product Master](/datasets/tables/DimProduct.md)\n- [Stockout](/glossary/stockout.md)\n- [Stockout Escalation](/playbooks/stockout_escalation.md)", "metrics/days_of_supply": "## Definition\n\nDays of Supply (DOS) is a forward-looking metric that answers: given current inventory plus expected inbound supply, how many days can we satisfy demand before running out?\n\nUnlike [Coverage Days](/metrics/coverage_days.md), DOS incorporates the open supply pipeline from [purchase_orders](/datasets/tables/purchase_orders.md), making it the right metric for planning decisions and stockout recovery projections.\n\n## Calculation\n\n```text\nDays of Supply = (qty_available + open_po_qty) / avg_daily_demand\n```\n\nWhere:\n\n- `qty_available` = from [inventory_onhand](/datasets/tables/inventory_onhand.md)\n- `open_po_qty` = sum of `open_qty` for `po_status IN ('Open', 'Partial')` from [purchase_orders](/datasets/tables/purchase_orders.md)\n- `avg_daily_demand` = rolling historical average from [sales_orders](/datasets/tables/sales_orders.md), **or** forward forecast rate from [demand_forecast](/datasets/tables/demand_forecast.md) when available\n\nUsing the **forward forecast** as the demand rate is preferred for new products, where historical averages may be too short or unrepresentative.\n\n## Interpretation\n\n| Days of Supply | Signal |\n| --- | --- |\n| < item lead_time_days | Stockout projected before next receipt can arrive \u2014 escalate |\n| Between lead time and target DOS | Normal operating range \u2014 monitor |\n| > target DOS | Potential overstock \u2014 review supply pipeline |\n\nSpecific thresholds for target DOS are defined in [stockout_escalation](/playbooks/stockout_escalation.md) and [overstock_exposure](/metrics/overstock_exposure.md).\n\n## Related\n\n- [Coverage Days](/metrics/coverage_days.md) \u2014 on-hand only snapshot (no inbound supply)\n- [Overstock Exposure](/metrics/overstock_exposure.md)\n- [Inventory On Hand](/datasets/tables/inventory_onhand.md)\n- [Purchase Orders](/datasets/tables/purchase_orders.md)\n- [Demand Forecast](/datasets/tables/demand_forecast.md)\n- [Product Master](/datasets/tables/DimProduct.md)", "metrics/forecast_accuracy": "## Definition\n\nForecast Accuracy is the governed framework for measuring how well the approved Demand Consensus forecast predicted actual demand. The core KPI is tracked at the customer level using the [Working Forecast](/datasets/tables/FactWorkingForecast.md) as it existed at the time of Demand Consensus, when that forecast is pushed to SupplyPlanning and is in sync with the supply-facing current forecast at the shared item-warehouse total.\n\nForecast accuracy is evaluated against official consensus snapshot dates, across lag periods from **Lag-0 through Lag-4**, so Demand Planning can measure forecast improvement as the actual demand period gets closer.\n\nThis metric family replaces ad hoc or legacy snapshot-selection logic with consensus-cycle alignment. The primary governed outputs are:\n\n- MAPE - Mean Absolute Percentage Error\n- wMAPE - Weighted Mean Absolute Percentage Error\n- wMPE - Weighted Mean Percent Error / Forecast Bias\n- RMSE - Root Mean Squared Error\n- PVA - Process Value Add\n\nUse this page as the semantic-model definition for forecast accuracy calculations. The BRD is authoritative over earlier agent-draft guidance on this metric.\n\n## Business Purpose\n\nForecast accuracy reporting is used to:\n\n- Provide one governed source of truth for forecast accuracy metrics.\n- Measure Demand Planning performance across consistent lag periods.\n- Identify whether forecast accuracy improves as consensus cycles approach the actuals period.\n- Support structured root cause analysis for forecast misses.\n- Measure whether the demand planning process adds value beyond a simple naive forecast.\n\n## KPI Source and Grain\n\nThe core KPI is measured from the Working Forecast captured at the consensus snapshot. That source preserves the customer-level planning dimension needed for forecast accuracy. The supply-facing [Current Forecast](/datasets/tables/FactCurrentForecast.md) remains useful for item-warehouse reconciliation after consensus, but it does not retain the customer-level forecast breakdown.\n\nThe target forecast accuracy fact is measured at:\n\n```text\nCustomerGroup x ItemSKU x WarehouseID x FiscalPeriod x ForecastSnapshotDate x LagIndicator\n```\n\nThe BRD names the forecast accuracy fact as `FcstAccuracy_CustItemWh` and defines the business grain as **Customer-Item-Warehouse-Fiscal Period**. In the current Working Forecast contract, the customer-level planning dimension is `CustomerGroup`. If the final KPI tables carry a lower-level customer key in addition to `CustomerGroup`, document that field in the table docs and update this grain.\n\nCurrent-state time period is **Fiscal Month**. A future transition to weekly evaluation is still TBD.\n\nRequired rollups include:\n\n- Customer / Item / Warehouse\n- Item / Warehouse\n- Customer Group\n- Item\n- Warehouse\n- Brand\n- Total Business\n\nReporting views may aggregate across 1-week, 4-week, and 12-week windows, but the governed source period remains the fiscal period tied to the selected lag snapshot.\n\n## Consensus Snapshot Alignment\n\nForecast accuracy must align to official Demand Consensus snapshot dates, not simply the latest available forecast snapshot.\n\nAt the consensus moment, the finalized Working Forecast is pushed from Logility DemandPlanning to SupplyPlanning. The customer-level KPI should use the Working Forecast snapshot from that consensus moment. The Current Forecast can be used to reconcile the synchronized item-warehouse totals after the push, but it should not be treated as the primary customer-level KPI source because the customer dimension is collapsed in the supply-facing table.\n\nThe BRD defines two supporting structures:\n\n| Structure | Purpose |\n| --- | --- |\n| `DimFcstConsensusCycleDates` | SharePoint-maintained list of locked forecast dates for each consensus period. |\n| `FcstAccuracySnapshotDates` | Derived mapping from consensus cycle dates to Lag-0 through Lag-4 snapshot dates and actuals month-end dates. |\n\nThe forecast accuracy fact should join to the Working Forecast history by `ForecastSnapshotDate` and should retain the forecast cycle and lag labels used for reporting.\n\n### Lag Labels\n\n| Legacy period label | Governed lag label |\n| --- | --- |\n| `2Week` | `Lag-0` |\n| `30 Day` | `Lag-1` |\n| `60 Day` | `Lag-2` |\n| `90 Day` | `Lag-3` |\n| `120 Day` | `Lag-4` |\n\n## Core Inputs\n\n| Input | Definition |\n| --- | --- |\n| `ActualDemand` | Ordered quantity by current request date minus load lead time for the defined fiscal period. This supersedes the prior draft instruction to use shipped quantity for forecast accuracy. |\n| `ForecastQty` | Working Forecast quantity captured at Demand Consensus for the applicable `ForecastSnapshotDate` and `LagIndicator` at the same customer-item-warehouse-period grain. |\n| `NaiveForecastQty` | Forecast baseline derived from prior-period actual demand, adjusted for 4-4-5 fiscal calendar alignment. |\n| `ForecastSnapshotDate` | Date of the consensus forecast snapshot used for the lag calculation. |\n| `ActualsMonthEndDate` | Fiscal month-end date for the actual demand period being evaluated. |\n| `ForecastCycleIdentifier` | Forecast cycle label, such as `FY26-M03`, used to tie the snapshot date to the Demand Consensus cycle. |\n| `LagIndicator` | Relative lag bucket from `Lag-0` through `Lag-4`. |\n\n### Naive Forecast\n\nThe naive forecast assumes the prior fiscal period's actual demand is the best available predictor for the current period. Because AFI uses a 4-4-5 fiscal calendar, the prior period must be normalized by fiscal weeks before being applied to the current period.\n\n```text\nPriorPeriodAverageWeeklyDemand = PriorPeriodActualDemand / PriorPeriodFiscalWeekCount\nNaiveForecastQty = PriorPeriodAverageWeeklyDemand * CurrentPeriodFiscalWeekCount\n```\n\n## Row-Level Calculations\n\nCalculate these fields at the target forecast accuracy fact grain before reporting-level aggregation.\n\n| Field | Calculation |\n| --- | --- |\n| `ForecastError` | `ForecastQty - ActualDemand` |\n| `AbsoluteForecastError` | `ABS(ForecastQty - ActualDemand)` |\n| `NaiveForecastError` | `NaiveForecastQty - ActualDemand` |\n| `AbsoluteNaiveForecastError` | `ABS(NaiveForecastQty - ActualDemand)` |\n| `SquaredForecastError` | `(ForecastQty - ActualDemand)^2` |\n\nThe BRD Section 6.2 text says signed forecast error is `Actual Demand - Forecast Quantity`, but the BRD change log and metric sections define the governed direction as `Forecast - Actual`. Use `ForecastQty - ActualDemand` so positive values indicate over-forecasting and negative values indicate under-forecasting.\n\n## Semantic Model Metrics\n\n### MAPE - Mean Absolute Percentage Error\n\nAverage absolute percentage error across valid observations.\n\n```text\nMAPE = SUM(ABS(ForecastQty - ActualDemand) / ActualDemand) / CountValidObservations * 100\n```\n\nUse only valid observations. Exclude records where `ActualDemand = 0` unless the business defines a separate zero-actual handling rule.\n\n### wMAPE - Weighted Mean Absolute Percentage Error\n\nAbsolute forecast error weighted by actual demand volume. This should be the primary scale-insensitive error metric for aggregate reporting.\n\n```text\nwMAPE = SUM(ABS(ForecastQty - ActualDemand)) / SUM(ActualDemand) * 100\n```\n\nLower values are better.\n\n### wMPE - Weighted Mean Percent Error / Forecast Bias\n\nSigned forecast error weighted by actual demand volume. This measures directional bias.\n\n```text\nwMPE = SUM(ForecastQty - ActualDemand) / SUM(ActualDemand) * 100\n```\n\nInterpretation:\n\n| wMPE value | Meaning |\n| --- | --- |\n| Positive | Over-forecast |\n| Negative | Under-forecast |\n| Near zero | Directionally neutral, subject to the neutral threshold defined by the business |\n\n### RMSE - Root Mean Squared Error\n\nMeasures the standard deviation of forecast errors and penalizes large misses more heavily.\n\n```text\nRMSE = SQRT(SUM((ForecastQty - ActualDemand)^2) / CountValidObservations)\n```\n\nCalculate squared error at the row grain, aggregate squared error to the reporting level, then apply the square root.\n\n### PVA - Process Value Add\n\nMeasures whether the Demand Planning process outperformed the naive baseline forecast.\n\n```text\nPVA = wMAPE_Naive - wMAPE_Forecast\n```\n\nWhere:\n\n```text\nwMAPE_Forecast = SUM(ABS(ForecastQty - ActualDemand)) / SUM(ActualDemand) * 100\nwMAPE_Naive = SUM(ABS(NaiveForecastQty - ActualDemand)) / SUM(ActualDemand) * 100\n```\n\nInterpretation:\n\n| PVA value | Meaning |\n| --- | --- |\n| Positive | Consensus forecast outperformed the naive forecast; the process added value. |\n| Negative | Consensus forecast performed worse than the naive forecast; the process did not add value. |\n| Zero | Consensus and naive forecasts performed the same. |\n\n## Optional Accuracy Score\n\nThe governed BRD metrics are error and bias metrics. If a dashboard needs a higher-is-better accuracy score or accuracy band, derive it explicitly from the selected error metric:\n\n```text\nForecastAccuracyPct = 100 - wMAPE\n```\n\nDo not mix raw MAPE, wMAPE, and derived accuracy percentage in the same visual without labeling the measure clearly.\n\n## Classification Fields\n\nThe BRD calls for the following reporting classifications:\n\n| Field | Definition |\n| --- | --- |\n| `AccuracyBand` | Bucketed accuracy classification, such as `<70%`, `70-80%`, `80-90%`, `>90%`, based on the selected accuracy score. |\n| `BiasClassification` | Over-Forecast, Under-Forecast, or Neutral based on wMPE. |\n| `FiscalPeriodStatus` | Open or Closed status for the actual demand period. |\n| `ForecastVersionIdentifier` | Forecast version label, such as Consensus, Statistical, or Final Approved. |\n| `DataQualityFlag` | Exception flag for issues such as missing snapshot, zero actual, invalid fiscal period, or missing source relationship. |\n\nNeutral bias thresholds and final accuracy-band boundaries are [FILL IN: business-approved threshold values].\n\n## Planned KPI Tables\n\nThe actual KPI tables that contain the relevant consensus snapshots, lag mappings, actual demand, naive forecast, and error calculations will be added to this bundle as dataset docs when their physical contracts are confirmed.\n\nExpected table documentation:\n\n| Planned table | Expected role |\n| --- | --- |\n| `DimFcstConsensusCycleDates` | Maintained consensus cycle date source that identifies the approved snapshot date for each cycle. |\n| `FcstAccuracySnapshotDates` | Lag mapping table that relates each actuals period to the Lag-0 through Lag-4 Working Forecast snapshots. |\n| `FcstAccuracy_CustItemWh` | Customer-level KPI fact containing Working Forecast at consensus, actual demand, naive forecast, row-level errors, and fields needed for MAPE, wMAPE, wMPE, RMSE, and PVA. |\n\nUntil those table docs are added, this metric page defines the governing business logic and expected calculation contract.\n\n## Embedded Forecast Accuracy Terms\n\nKeep these terms here until they are reused outside forecast accuracy.\n\n| Term | Meaning |\n| --- | --- |\n| Consensus Forecast Snapshot Date | The approved Working Forecast snapshot date selected from the Demand Consensus cycle date source for accuracy measurement. |\n| Forecast Cycle | The fiscal consensus cycle being evaluated, such as a fiscal year/month cycle. |\n| Forecast Cycle Identifier | Label tying records to the governed forecast cycle, such as `FY26-M03`. |\n| Lag Indicator | Lag bucket showing how far ahead of the actual period the forecast snapshot was taken. |\n| Lag-0 | Forecast snapshot closest to the actuals period, replacing the legacy `2Week` label. |\n| Lag-1 | Forecast snapshot replacing the legacy `30 Day` label. |\n| Lag-2 | Forecast snapshot replacing the legacy `60 Day` label. |\n| Lag-3 | Forecast snapshot replacing the legacy `90 Day` label. |\n| Lag-4 | Forecast snapshot replacing the legacy `120 Day` label. |\n| Actual Demand | Ordered quantity by current request date minus load lead time for the defined fiscal period. |\n| Load Lead Time | Lead-time offset applied to current request date when assigning ordered quantity to the actual demand period. |\n| Naive Forecast | Prior-period actual demand baseline adjusted for 4-4-5 fiscal calendar differences. |\n| Valid Observation | Observation included in metric calculations after excluding invalid rows such as zero actual demand for MAPE. |\n| Zero Actual | A record where actual demand is zero; exclude from MAPE and flag for defined handling in weighted metrics. |\n| Forecast Bias | Directional forecast error measured by wMPE. |\n| Process Value Add | Difference between naive forecast wMAPE and consensus forecast wMAPE. |\n| Actuals Month End Date | Fiscal month-end date for the actual demand period. |\n\n## Data Quality and Audit Requirements\n\nForecast accuracy outputs should retain:\n\n- Snapshot date used for calculation.\n- Actuals month-end date.\n- Forecast cycle identifier.\n- Lag indicator.\n- Source system identifier, such as Logility or ERP.\n- Record created timestamp.\n- Record updated timestamp.\n- Data quality flag.\n\nMinimum validation checks:\n\n- Validate that consensus snapshot dates are maintained in the SharePoint source.\n- Confirm every lag record has a valid `ForecastSnapshotDate`.\n- Flag missing forecast snapshots.\n- Flag zero-actual records.\n- Confirm fiscal 4-4-5 calendar alignment for actual, forecast, and naive forecast periods.\n\n## Current Bundle Gaps\n\n- The current [Working Forecast](/datasets/tables/FactWorkingForecast.md) documentation describes the latest working forecast only. Customer-level forecast accuracy requires historical Working Forecast snapshots captured at the official consensus dates.\n- The actual KPI table docs for consensus cycle dates, lag snapshot mapping, and customer-level forecast accuracy calculations still need to be added to the bundle after their physical contracts are confirmed.\n- The current [Sales Orders](/datasets/tables/sales_orders.md) draft says forecast accuracy should use shipped quantity. The BRD supersedes that with ordered quantity by current request date minus load lead time.\n- The exact ERP fields for current request date, ordered quantity, and load lead time are [FILL IN: source field mapping].\n- The SharePoint-backed `DimFcstConsensusCycleDates` and derived `FcstAccuracySnapshotDates` dataset docs are [FILL IN: create dataset docs when sources are confirmed].\n- The BRD uses the spelling `FcstAccurary` in some table names. Confirm final physical names before creating dataset docs.\n\n## Common Failure Modes\n\n- **Wrong snapshot date**: Using the latest forecast instead of the consensus-cycle snapshot causes look-ahead bias.\n- **Wrong forecast source**: Using the supply-facing Current Forecast as the customer-level KPI source loses the customer-level planning dimension; use the Working Forecast captured at consensus.\n- **Wrong actual demand basis**: Using shipped quantity instead of BRD-defined ordered quantity by request date minus load lead time changes the meaning of accuracy.\n- **Missing consensus history**: The latest Working Forecast alone is not enough; lag-based KPI reporting requires retained snapshots for each official consensus cycle.\n- **Zero actuals**: MAPE is unstable or undefined when actual demand is zero.\n- **4-4-5 mismatch**: Naive forecast and lag comparisons are distorted if fiscal week counts are not aligned correctly.\n- **Aggregation order**: Absolute error, squared error, and naive error must be calculated at the fact grain before reporting-level aggregation.\n\n## Related\n\n- [Demand Consensus](/glossary/demand_consensus.md)\n- [Customer Group](/glossary/customer_group.md)\n- [Current Forecast](/datasets/tables/FactCurrentForecast.md)\n- [Working Forecast](/datasets/tables/FactWorkingForecast.md)\n- [Current Forecast Snapshot Daily](/datasets/tables/CurFcstSnapshotDaily.md)\n- [Sales Orders](/datasets/tables/sales_orders.md)\n- [Fiscal Calendar](/datasets/tables/DimDate.md)\n- [Forecast Revision](/playbooks/forecast_revision.md)", "metrics/overstock_exposure": "## Definition\n\nOverstock Exposure quantifies how much inventory is expected to remain unsold after a defined planning horizon. It flags items where supply significantly exceeds projected demand \u2014 a risk of elevated carrying costs, obsolescence, or markdown pressure.\n\n## Calculation\n\n```text\nProjected Ending Inventory = qty_available + open_po_qty - (forecast_daily_rate \u00d7 horizon_days)\nOverstock Exposure = MAX(0, Projected Ending Inventory)\nOverstock Weeks = Overstock Exposure / avg_weekly_demand\n```\n\nWhere:\n\n- `qty_available` = from [inventory_onhand](/datasets/tables/inventory_onhand.md)\n- `open_po_qty` = sum of open PO qty from [purchase_orders](/datasets/tables/purchase_orders.md)\n- `forecast_daily_rate` = from [demand_forecast](/datasets/tables/demand_forecast.md), converted to a daily rate\n- `horizon_days` = [FILL IN: planning horizon in days, e.g., 90]\n\n## Interpretation\n\nAn item has overstock exposure when `Overstock Weeks` exceeds the target threshold.\n\n| Overstock Weeks Above Target | Signal | Action |\n| --- | --- | --- |\n| 1\u20132 weeks | Low \u2014 monitor | No immediate action; watch next cycle |\n| 2\u20134 weeks | Moderate | Flag for planner review; consider demand pull-forward |\n| > 4 weeks | High | Escalate; consider PO cancellation, deferral, or demand promotion |\n\n> **Note**: Thresholds above are illustrative. Confirm organization-specific targets with the planning team and update this document before setting `status: active`.\n\n## Root Cause Signals\n\nWhen overstock is detected, identify the underlying driver:\n\n- **Demand miss**: actuals consistently below forecast \u2192 recommend forecast downward revision via [forecast_revision](/playbooks/forecast_revision.md).\n- **Supply overbuild**: POs were placed based on an inflated forecast before the miss was visible \u2192 flag for procurement review of open POs.\n- **Both**: common for new products experiencing a demand shortfall during launch ramp.\n\n## Related\n\n- [Days of Supply](/metrics/days_of_supply.md)\n- [Forecast Accuracy](/metrics/forecast_accuracy.md)\n- [Overstock](/glossary/overstock.md)\n- [Forecast Revision](/playbooks/forecast_revision.md)\n- [New Product Performance Review](/playbooks/new_product_review.md)", "metrics/projected_fulfillment_rate": "## Definition\n\nProjected Fulfillment Rate measures whether the supply plan can cover all planned demand for a given item-warehouse-week. A rate of 100% means the plan expects to fulfill every unit of demand; below 100% means a supply constraint exists and some demand will go unfulfilled in that week.\n\n## Calculation\n\n```text\nProjectedFulfillmentRate = DemandFulfillmentQty / TotalDemand\n```\n\nExpressed as a percentage:\n\n```text\nProjectedFulfillmentRate (%) = (DemandFulfillmentQty / TotalDemand) \u00d7 100\n```\n\nWhere:\n\n- `DemandFulfillmentQty` = quantity of total demand the plan projects can be fulfilled\n- `TotalDemand` = `FirmDemand + Promo Lift + NetForecast`\n\nBoth values are sourced from [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md).\n\n**Do not compute this metric when `TotalDemand = 0`** \u2014 a week with zero planned demand produces a divide-by-zero condition and the ratio is not meaningful.\n\n## Interpretation\n\n| Rate | Signal |\n| --- | --- |\n| 100% | Full fulfillment projected; no supply constraint this week |\n| < 100% | Supply constraint \u2014 the plan cannot cover all demand; `TotalDemand \u2212 DemandFulfillmentQty` units will be unfulfilled |\n| Near 0% | Severe supply gap; nearly all demand for this week will be unmet |\n\nA fulfillment rate below 100% in a near-term week (inside item lead time) is a high-priority exception. There is not enough time to bring in additional supply through normal replenishment, and customer orders will likely be impacted.\n\n## Relationship to Shippable Inventory\n\nProjected Fulfillment Rate and [Shippable Inventory](/metrics/shippable_inventory.md) are complementary views of the same supply constraint:\n\n- A **negative SI** causes a fulfillment shortfall \u2014 if `SIQty < 0`, the plan cannot fulfill all demand.\n- **Projected Fulfillment Rate** quantifies how much of that demand is projected to be met, making it useful for customer-impact assessment.\n\nWhen SI is positive, Projected Fulfillment Rate is 100% by definition. Check this metric only when SI indicates a constraint (`SIQty \u2264 0`).\n\n## Related\n\n- [Shippable Inventory](/metrics/shippable_inventory.md)\n- [Safety Stock Gap](/metrics/safety_stock_gap.md)\n- [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md)\n- [Supply Plan Review](/playbooks/supply_plan_review.md)\n- [Firm Demand](/glossary/firm_demand.md)\n- [Net Forecast](/glossary/net_forecast.md)", "metrics/safety_stock_gap": "## Definition\n\nSafety Stock Gap (SS Gap) is the quantity an item-warehouse position would need to receive in order to reach its safety stock target in a given planning week. It is an exception signal: a non-zero SSGap means the current supply plan leaves the item below its safety stock buffer for that week.\n\n## Calculation\n\n```text\nSSGap = MAX(0, SSQty \u2212 SIQty)\n```\n\nEquivalently:\n\n- When `SIQty \u2265 SSQty`: `SSGap = 0` (at or above target; no gap)\n- When `SIQty < SSQty`: `SSGap = SSQty \u2212 SIQty` (below target; gap equals the shortfall)\n\nNote that `SSGap` is always non-negative. A position above safety stock target produces a gap of zero, not a surplus value. To measure surplus above target, use `SI-SS` from [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md) directly.\n\nBoth `SSGap` and `SSQty` are sourced from [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md).\n\n## Interpretation\n\n| SSGap | Signal |\n| --- | --- |\n| `0` | Position meets or exceeds safety stock target; no action needed for SS |\n| `> 0` and SI is positive | Below safety stock target; monitor and consider whether planned supply will close the gap in future weeks |\n| `> 0` and SI is negative | Supply gap exists; demand cannot be fully met; safety stock shortfall is secondary concern \u2014 address SI < 0 first |\n\nSSGap is most actionable when `SIQty > 0` but `SIQty < SSQty`. In this condition the item can still ship, but the buffer is eroded. If the gap persists across multiple weeks without planned supply closing it, the planner should investigate whether the safety stock target is achievable in the current plan.\n\n## Prioritizing Exceptions\n\nWhen reviewing SSGap exceptions across many items:\n\n1. **Prioritize near-term weeks first** \u2014 a gap in week 1\u20134 that is inside item lead time cannot be recovered through standard replenishment.\n2. **Rank by gap magnitude** \u2014 larger `SSGap` values represent a greater buffer erosion.\n3. **Filter to active items** \u2014 join to [Product Master](/datasets/tables/DimProduct.md) and exclude `LifecycleStage = 'End of Life'` and `PartFlag = 'PART'` to avoid noise from inactive or component items.\n\n## Related\n\n- [Shippable Inventory](/metrics/shippable_inventory.md)\n- [Projected Fulfillment Rate](/metrics/projected_fulfillment_rate.md)\n- [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md)\n- [Supply Plan Review](/playbooks/supply_plan_review.md)\n- [Stockout](/glossary/stockout.md)", "metrics/shippable_inventory": "## Definition\n\nShippable Inventory (SI) is the quantity of an item projected to be available at a warehouse at the close of each planning week, after all planned outbound demand and inbound supply have been applied. It is the central planning output in [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md) and the primary signal used to identify supply constraints across the 39-week horizon.\n\nSee [Shippable Inventory (glossary)](/glossary/shippable_inventory.md) for the conceptual definition and what \"shippable\" means in this organization.\n\n## Calculation\n\nAt the business level, Shippable Inventory is a weekly roll-forward of inventory:\n\n```text\nBeginning on hand\n  + Purchase order quantity\n  + Production quantity\n  + Transfers in\n  - Transfers out\n  - Firm customer orders\n  - Net forecast\n= Shippable Inventory\n```\n\nWhere:\n\n- `BeginningBalance` = actual inventory on hand as of `SnapshotDate`\n- `TotalPOs` = firm and planned purchase order quantity expected in the week\n- `TotalProd` = firm and planned production quantity expected in the week\n- `TotalTI` = in-transit, on-order, and planned transfers into the warehouse\n- `TotalTO` = firm and planned transfers out of the warehouse\n- `FirmDemand` = confirmed customer orders expected to ship in the week\n- `NetForecast` = forecast demand remaining after firm customer orders are applied; in business terms, total forecast less firm customer orders, floored at zero\n\nIn the Supply Plan Detail fields, the compact calculation is:\n\n```text\nSIQty = BeginningBalance + TotalReceipts - TotalOut\nTotalReceipts = TotalPOs + TotalProd + TotalTI\nTotalOut = FirmDemand + Promo Lift + NetForecast + TotalTO\n```\n\n`Promo Lift` is tracked separately from `NetForecast` in [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md), so it is included explicitly in `TotalOut`.\n\nAll values are sourced directly from [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md).\n\n## Timing and Roll-Forward\n\nThe first projected week starts from today's on-hand inventory, recorded as `BeginningBalance` on the daily `SnapshotDate`. All other elements in the calculation are the receipts, transfers, orders, and forecast demand expected to occur between today and the week-ending Saturday. The result is the projected Shippable Inventory for that week-ending date.\n\nFor future weeks, the plan does not restart from today's on-hand balance. It rolls forward from the preceding week-ending Shippable Inventory, then applies that next week's expected receipts, shipments, transfers, and forecast demand to calculate the next week-ending Shippable Inventory.\n\n## Interpretation\n\n| SIQty | Signal |\n| --- | --- |\n| Positive | Surplus inventory projected; review against safety stock target (`SSQty`) |\n| Zero | Plan is exactly balanced; no surplus, no gap |\n| Negative | Supply gap \u2014 planned outbound exceeds projected receipts; a constraint exists this week |\n\nWhen `SIQty < 0`:\n\n- The plan cannot fulfill all projected demand for this week.\n- If the week is within item lead time, there is no time to bring in additional supply through normal replenishment \u2014 escalate immediately.\n- If the week is outside lead time, evaluate whether Logility has already generated a planned order to recover the position in a future week.\n\n## Relationship to Safety Stock\n\nSI alone does not indicate whether inventory is \"healthy\" \u2014 it must be compared to the safety stock target (`SSQty`):\n\n- `SI > SS` \u2192 position is above target; monitor for overstock risk in extended horizon\n- `0 < SI < SS` \u2192 position is below target; a safety stock gap exists; see [Safety Stock Gap](/metrics/safety_stock_gap.md)\n- `SI < 0` \u2192 supply gap; the plan cannot fulfill demand regardless of SS target\n\n## Aggregation Notes\n\nSI quantities should **not** be summed across weeks for a single item-warehouse, as they represent projected ending balances at discrete points in time, not flows. Summing would overstate inventory. Compare week-over-week SI values to understand inventory trajectory.\n\n## Related\n\n- [Shippable Inventory (glossary)](/glossary/shippable_inventory.md)\n- [Safety Stock Gap](/metrics/safety_stock_gap.md)\n- [Projected Fulfillment Rate](/metrics/projected_fulfillment_rate.md)\n- [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md)\n- [Supply Plan Review](/playbooks/supply_plan_review.md)", "playbooks/forecast_revision": "## Purpose\n\nThis playbook defines when a Logility forecast revision is warranted and what the recommendation should include. Forecast revisions are not made automatically \u2014 this playbook produces a **recommendation for a human planner** to review, adjust, and act on in Logility.\n\n## When to Recommend a Revision\n\nRecommend a forecast revision when [forecast_accuracy](/metrics/forecast_accuracy.md) shows a **consistent directional bias** across multiple planning periods:\n\n| Signal | Direction | Condition |\n| --- | --- | --- |\n| Actuals persistently above forecast | Upward revision | Demand is stronger than the model is capturing |\n| Actuals persistently below forecast | Downward revision | Demand is weaker than the model is projecting |\n\nA single period of deviation is **not** sufficient. Require at least [FILL IN: 2\u20133 consecutive periods] of consistent bias before recommending a revision. Single-period swings may reflect noise, timing, or a one-time event \u2014 not a structural demand shift.\n\n## What to Include in the Recommendation\n\nA complete forecast revision recommendation must specify:\n\n1. **Items affected** \u2014 list item_id and description for each\n2. **Direction** \u2014 upward or downward\n3. **Magnitude** \u2014 percentage or quantity adjustment suggested, derived from the observed deviation\n4. **Time horizon** \u2014 which future periods the revision should apply to\n5. **Evidence** \u2014 the actual vs. forecast comparison supporting the recommendation (periods covered, quantities, accuracy %)\n6. **Inventory implication** \u2014 what the current forecast miss means for inventory risk (link to [coverage_days](/metrics/coverage_days.md) or [overstock_exposure](/metrics/overstock_exposure.md) as applicable)\n\n## Who Acts on This\n\nForecast revisions are made by the **demand planner** in Logility. This playbook produces the recommendation; the planner reviews, adjusts, and firms the change in Logility.\n\nAfter a revision is firmed, planned orders are updated in Logility and pushed to the ERP. Monitor [demand_forecast](/datasets/tables/demand_forecast.md) in subsequent planning cycles to confirm the revision is reflected in the warehouse.\n\n## Cautions\n\n- Do not recommend aggressive revisions based on very short demand history. For a new product with fewer than [FILL IN: 4\u20136 weeks] of sales data, distinguish between a true demand miss and typical launch-period noise.\n- A downward forecast revision for an item with existing open POs may create or worsen overstock \u2014 assess the inventory pipeline before recommending.\n- A upward forecast revision for a constrained item may trigger planned POs that cannot realistically be sourced within the item's lead time.\n\n## Related\n\n- [Demand Forecast](/datasets/tables/demand_forecast.md)\n- [Sales Orders](/datasets/tables/sales_orders.md)\n- [Forecast Accuracy](/metrics/forecast_accuracy.md)\n- [Overstock Exposure](/metrics/overstock_exposure.md)\n- [New Product Performance Review](/playbooks/new_product_review.md)\n- [Recently Introduced](/glossary/recently_introduced.md)", "playbooks/new_product_review": "## Purpose\n\nUse this playbook when asked to assess how recently introduced products are performing and what risks need to be discussed. This is a self-directed reasoning workflow \u2014 follow the steps in order, gather the relevant data, and produce a structured recommendation.\n\nThis playbook covers:\n\n- Sales performance vs. demand forecast\n- Inventory risk assessment (stockout or overstock)\n- Stockout and overstock projections with recovery timelines\n- Recommended actions including forecast revision and escalation\n\n## Step 1 \u2014 Scope the Products\n\nQuery [Product Master](/datasets/tables/DimProduct.md) for items meeting both criteria:\n\n- `InitialInvoiceDate` falls within the recently introduced window \u2014 see [recently_introduced](/glossary/recently_introduced.md) for the exact definition\n- `LifecycleStage NOT IN ('End of Life')` \u2014 exclude items planned for or already discontinued\n\nRecord the item count and the `InitialInvoiceDate` range included so you can cite it in your output.\n\n## Step 2 \u2014 Compare Actuals vs. Forecast\n\nFor each scoped item, compare actual sales against the planned demand forecast.\n\n**Data sources:**\n\n- Actuals: `shipped_qty` from [sales_orders](/datasets/tables/sales_orders.md) \u2014 use shipped quantity, not ordered quantity, to reflect real fulfilled demand\n- Forecast: most recent firm forecast version from [demand_forecast](/datasets/tables/demand_forecast.md) for the same item and period\n- Align both on the same time period and unit of measure before comparing\n\nCalculate [forecast_accuracy](/metrics/forecast_accuracy.md) per item for the period under review.\n\n**Decision signals:**\n\n| Condition | Signal | Next Step |\n| --- | --- | --- |\n| Actuals consistently above forecast across multiple periods | Demand stronger than planned | Recommend forecast increase \u2192 [forecast_revision](/playbooks/forecast_revision.md) |\n| Actuals consistently below forecast across multiple periods | Demand weaker than planned | Recommend forecast decrease \u2192 [forecast_revision](/playbooks/forecast_revision.md) |\n| Actuals tracking forecast closely | Forecast is healthy | Note as on-track; no revision needed |\n| High period-over-period volatility with no clear trend | Unstable demand pattern | Flag for planner review; do not recommend revision based on single-period swings |\n\nA single period of deviation is not sufficient to recommend a revision. Require at least [FILL IN: 2\u20133 consecutive periods] of consistent directional bias.\n\n## Step 3 \u2014 Assess Inventory Risk\n\nFor each item, calculate the following metrics using current data:\n\n| Metric | Purpose | Document |\n| --- | --- | --- |\n| Coverage Days | How long current on-hand inventory lasts with no inbound supply | [coverage_days](/metrics/coverage_days.md) |\n| Days of Supply | How long inventory lasts including open PO receipts | [days_of_supply](/metrics/days_of_supply.md) |\n| Overstock Exposure | Whether total supply exceeds projected demand over the horizon | [overstock_exposure](/metrics/overstock_exposure.md) |\n\n**Stockout risk signal**: If `days_of_supply < lead_time_days` from [Product Master](/datasets/tables/DimProduct.md) ([FILL IN: confirm lead time column]), a stockout is projected before the next replenishment can arrive. Proceed to [stockout_escalation](/playbooks/stockout_escalation.md) for the action path.\n\n**Overstock risk signal**: If overstock exposure is above threshold, the item has more supply than the forecast can absorb within the planning horizon. See [overstock](/glossary/overstock.md) for severity levels.\n\n## Step 4 \u2014 Project Stockout or Recovery Date\n\n**If stockout risk exists:**\n\n1. Using current [inventory_onhand](/datasets/tables/inventory_onhand.md) and open [purchase_orders](/datasets/tables/purchase_orders.md), project the date when `qty_available` will reach zero at the current demand rate.\n2. Using the `expected_receipt_date` of the next open PO, project when inventory will return to a positive level.\n3. If no open POs exist, note that no replenishment has been initiated \u2014 this is a critical escalation signal requiring immediate attention.\n\n**If overstock risk exists:**\n\n1. Calculate weeks of supply above target using [overstock_exposure](/metrics/overstock_exposure.md).\n2. Determine root cause: demand miss (actuals below forecast) or supply overbuild (POs placed on inflated forecast before the miss was visible).\n3. Identify whether any in-transit POs can still be cancelled or deferred before adding to on-hand inventory.\n\n## Step 5 \u2014 Produce Recommendations\n\nStructure the output with the following four sections:\n\n### Section 1: Items On Track\n\nList items where actuals are tracking forecast and inventory is within a healthy range. Brief confirmation \u2014 no action needed.\n\n### Section 2: Items at Stockout Risk\n\nFor each at-risk item:\n\n- Severity (based on [stockout_escalation](/playbooks/stockout_escalation.md))\n- Projected stockout date\n- Projected recovery date (based on next open PO receipt, or earliest possible if no PO exists)\n- Recommended action (expedite open PO, place emergency PO, escalate to buyer)\n\n### Section 3: Items at Overstock Risk\n\nFor each overstock item:\n\n- Weeks of excess supply above target\n- Root cause: demand miss vs. supply overbuild\n- Recommended action (forecast decrease in Logility, PO cancellation/deferral, demand pull-forward)\n\n### Section 4: Forecast Revision Candidates\n\nList items with consistent forecast deviation (per Step 2 signals) and recommend direction of revision. Reference [forecast_revision](/playbooks/forecast_revision.md) for the full revision process.\n\nAlways cite the dataset and time window your analysis covers. Flag any items where data was missing or ambiguous.\n\n## Related\n\n- [Forecast Revision](/playbooks/forecast_revision.md)\n- [Stockout Escalation](/playbooks/stockout_escalation.md)\n- [Demand Forecast](/datasets/tables/demand_forecast.md)\n- [Sales Orders](/datasets/tables/sales_orders.md)\n- [Inventory On Hand](/datasets/tables/inventory_onhand.md)\n- [Purchase Orders](/datasets/tables/purchase_orders.md)\n- [Product Master](/datasets/tables/DimProduct.md)\n- [Recently Introduced](/glossary/recently_introduced.md)\n- [Forecast Accuracy](/metrics/forecast_accuracy.md)\n- [Coverage Days](/metrics/coverage_days.md)\n- [Days of Supply](/metrics/days_of_supply.md)\n- [Overstock Exposure](/metrics/overstock_exposure.md)", "playbooks/stockout_escalation": "## Purpose\n\nThis playbook defines how to classify stockout risk severity and what action to recommend. It is triggered when [coverage_days](/metrics/coverage_days.md) or [days_of_supply](/metrics/days_of_supply.md) falls below safe thresholds \u2014 either in a standalone inventory review or as Step 3 of the [New Product Performance Review](/playbooks/new_product_review.md).\n\n## Severity Classification\n\nClassify stockout risk using the relationship between available supply and the item's `lead_time_days` from [Product Master](/datasets/tables/DimProduct.md) ([FILL IN: confirm lead time column \u2014 not currently in DimProduct]):\n\n| Condition | Severity | Description |\n| --- | --- | --- |\n| `days_of_supply \u2265 lead_time_days` | None | Supply pipeline is sufficient; no action needed |\n| `coverage_days < lead_time_days` and open PO `expected_receipt_date` is before projected stockout | Warning | On-hand stock will run out, but an inbound receipt is expected to arrive before demand is unmet |\n| `coverage_days < lead_time_days` and no open PO, or open PO arriving after projected stockout | Critical | Stockout projected with no current remedy in the supply pipeline |\n| `qty_available = 0` | Current Stockout | Item is already out of stock |\n\n## Recommended Actions by Severity\n\n### Warning\n\n- Monitor the open PO `expected_receipt_date` closely each planning cycle.\n- Confirm with the supplier that the expected receipt date is still valid \u2014 do not assume the system date is current.\n- Flag to the buyer or planner in the review summary.\n\n### Critical\n\n- **Expedite options**: Assess whether the open PO can be expedited or whether an emergency PO is feasible within the supplier's minimum lead time.\n- **Lead time check**: Confirm actual supplier lead time against `lead_time_days` in [Product Master](/datasets/tables/DimProduct.md) ([FILL IN: confirm lead time column]) \u2014 the standard may be stale or the supplier may be experiencing delays.\n- **Demand review**: Assess whether any open customer orders can be rescheduled to reduce short-term demand pressure while supply catches up.\n- **Escalate to buyer**: Flag immediately with projected stockout date, projected recovery date, and recommended action.\n\n### Current Stockout\n\n- Immediately escalate to buyer and supply chain leadership.\n- Identify which customer orders are affected by joining to [sales_orders](/datasets/tables/sales_orders.md) on `item_id` where `open_qty > 0`.\n- Communicate expected recovery date based on the next open PO `expected_receipt_date` from [purchase_orders](/datasets/tables/purchase_orders.md).\n\n## Projecting the Recovery Date\n\nThe **recovery date** is the `expected_receipt_date` of the next open PO for the item.\n\nIf no open PO exists:\n\n- Note that no replenishment is in the pipeline.\n- Calculate the earliest possible receipt as: today + `lead_time_days` (the floor, assuming a PO were placed today and the supplier performs at standard lead time).\n- Include this earliest-possible recovery date in the escalation alongside the note that no PO has been placed.\n\n## Related\n\n- [Stockout](/glossary/stockout.md)\n- [Coverage Days](/metrics/coverage_days.md)\n- [Days of Supply](/metrics/days_of_supply.md)\n- [Inventory On Hand](/datasets/tables/inventory_onhand.md)\n- [Purchase Orders](/datasets/tables/purchase_orders.md)\n- [Product Master](/datasets/tables/DimProduct.md)\n- [New Product Performance Review](/playbooks/new_product_review.md)", "playbooks/supply_plan_review": "## Purpose\n\nThis playbook defines how to analyze [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md) to surface supply constraints, prioritize exceptions, and determine recommended actions. It is the primary reasoning workflow for agents and planners interpreting the current Logility supply plan.\n\nThe supply plan is a forward-looking projection \u2014 always a snapshot of today's plan as of `SnapshotDate`. Conclusions drawn here reflect the plan's expectations, not physical warehouse reality.\n\n---\n\n## Step 1 \u2014 Establish Scope\n\nBefore querying [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md), define the scope of the review:\n\n- **Item scope** \u2014 a specific SKU, a product line, a planner's portfolio, or all active items\n- **Warehouse scope** \u2014 a specific warehouse, a warehouse group (from [Warehouse Master](/datasets/tables/DimWarehouse.md)), or all warehouses\n- **Time scope** \u2014 typically the near-term horizon (weeks 1\u201313), but full 39-week horizon for longer-range reviews\n\nFilter out noise before analysis:\n\n- Exclude items with `LifecycleStage = 'End of Life'` from [Product Master](/datasets/tables/DimProduct.md)\n- Exclude component parts (`PartFlag = 'PART'`) unless the analysis is specifically about components\n- Exclude warehouse records not relevant to the planning scope\n\n---\n\n## Step 2 \u2014 Identify SI Negative Exceptions\n\nSI negatives are the highest-priority exception in the supply plan. A negative [Shippable Inventory](/metrics/shippable_inventory.md) means the plan cannot fulfill all projected demand for that week.\n\nFilter for: `SIQty < 0` (equivalently, `SINegative < 0`)\n\nFor each exception, assess:\n\n1. **Which week?** \u2014 How soon is the gap? Weeks inside item lead time have no standard replenishment remedy.\n2. **How deep is the gap?** \u2014 `SINegative` shows the magnitude; `DemandFulfillmentQty` vs. `TotalDemand` shows the projected fulfillment shortfall.\n3. **What is the supply pipeline?** \u2014 Are firm orders (`POsFirm`, `ProdFirm`, `TInOnOrder`, `TInInTransit`) arriving before or after the constraint week?\n4. **Is the gap isolated to one week or persistent?** \u2014 A single negative week that self-corrects in the following week may reflect a timing issue; a run of negative weeks signals a structural supply shortage.\n\n---\n\n## Step 3 \u2014 Identify Safety Stock Gap Exceptions\n\nAfter addressing SI negatives, review items where SI is positive but below the safety stock target. These items can still ship, but their buffer has been eroded.\n\nFilter for: `SSGap > 0` and `SIQty >= 0`\n\nFor each exception, assess:\n\n1. **How large is the gap?** \u2014 `SSGap` = quantity below target. Larger gaps represent greater exposure to unplanned demand spikes.\n2. **Is the gap closing?** \u2014 Review the trajectory of `SI-SS` across the 39-week horizon. If it trends toward zero or positive, planned supply is expected to recover the position. If it remains negative or widens, investigate whether Logility has generated sufficient planned orders.\n3. **What is driving the shortfall?** \u2014 High demand weeks, a missing planned PO, or a transfer delay can all produce a safety stock gap. Understanding the cause determines the right action.\n\n---\n\n## Step 4 \u2014 Assess Fulfillment Shortfalls\n\nFor any week with `SIQty < 0`, calculate the [Projected Fulfillment Rate](/metrics/projected_fulfillment_rate.md):\n\n```text\nProjectedFulfillmentRate = DemandFulfillmentQty / TotalDemand\n```\n\n- A rate below 100% means some demand will go unmet in that week.\n- The unfulfilled quantity = `TotalDemand \u2212 DemandFulfillmentQty`.\n- Assess whether the unfulfilled demand is Firm (`FirmDemand` is the committed portion) \u2014 customer orders at risk must be escalated.\n\nWhen firm demand is at risk, cross-reference [Sales Orders](/datasets/tables/sales_orders.md) to identify affected customer orders.\n\n---\n\n## Step 5 \u2014 Distinguish Firm vs. Planned Supply\n\nWhen evaluating whether supply will materialize, always separate firm supply from planned supply:\n\n| Supply Type | Reliability | Action if Missing |\n| --- | --- | --- |\n| Firm (POs, Production, Transfers In \u2014 on order or in transit) | High \u2014 orders are placed | Confirm receipt date with supplier or DC; expedite if slipping |\n| Planned (Logility-projected orders not yet placed) | Lower \u2014 plan recommendation only | Verify whether the planner has actioned the planned order; if not, it may not arrive as planned |\n\nWeeks where the only supply covering a gap is **planned** supply carry higher risk than weeks covered by firm supply.\n\n---\n\n## Step 6 \u2014 Prioritize and Recommend\n\nPrioritize exceptions in this order:\n\n1. **SI negative, inside item lead time, with firm demand at risk** \u2014 Highest urgency; escalate to planner and buyer immediately\n2. **SI negative, outside lead time, persistent across multiple weeks** \u2014 Structural shortage; review planned order generation and supplier capacity\n3. **SI negative, single week, self-correcting** \u2014 May be a timing gap; confirm firm receipts arriving immediately after the constraint week\n4. **Safety stock gap, near-term (weeks 1\u20138)** \u2014 Monitor; determine if planned supply closes the gap before the horizon\n5. **Safety stock gap, outer weeks (weeks 9\u201339)** \u2014 Flag for review; Logility should generate planned orders to recover the position\n\nFor each prioritized exception, state:\n\n- Item SKU and warehouse\n- Which weeks are affected\n- Severity (SI negative vs. SS gap)\n- Magnitude (`SINegative`, `SSGap`, or fulfillment shortfall units)\n- Whether firm supply is in the pipeline to recover\n- Recommended action\n\n---\n\n## Data Notes\n\n- All weeks in [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md) end on **Saturday**, aligned to the fiscal week in [Fiscal Calendar](/datasets/tables/DimDate.md).\n- The table reflects only the **current day's plan**. There is no historical snapshot comparison available in this table. To compare against a prior plan, a separate snapshot store is required.\n- `SnapshotDate` is constant across all rows \u2014 filter or ignore it in aggregations.\n\n---\n\n## Related\n\n- [Shippable Inventory (glossary)](/glossary/shippable_inventory.md)\n- [Shippable Inventory (metric)](/metrics/shippable_inventory.md)\n- [Safety Stock Gap](/metrics/safety_stock_gap.md)\n- [Projected Fulfillment Rate](/metrics/projected_fulfillment_rate.md)\n- [Net Forecast](/glossary/net_forecast.md)\n- [Firm Demand](/glossary/firm_demand.md)\n- [Supply Plan Detail](/datasets/tables/FactSupplyPlanDetail.md)\n- [Product Master](/datasets/tables/DimProduct.md)\n- [Warehouse Master](/datasets/tables/DimWarehouse.md)\n- [Fiscal Calendar](/datasets/tables/DimDate.md)\n- [Sales Orders](/datasets/tables/sales_orders.md)\n- [Stockout Escalation](/playbooks/stockout_escalation.md)", "processes/demand_consensus_meeting": "## Purpose\n\n[FILL IN: Description of meeting cadence, participants, and objectives. Examples: weekly/monthly, attended by demand planner + sales director + supply chain manager, purpose is to review forecast miss and make consensus revisions.]\n\n## Process Overview\n\n[FILL IN: Define the agenda flow: what data is reviewed first, what exceptions trigger discussion, how decisions are made, and how outputs are communicated back to the planning system.]\n\n## Pre-Meeting Preparation\n\n[FILL IN: What analysis or reports are prepared before the meeting? Who prepares them and by when? Examples: forecast accuracy dashboard, demand variance summary by product line, list of exceptional items.]\n\n## Key Metrics Reviewed\n\n[FILL IN: Specific KPIs or metrics discussed in the meeting. Examples: forecast accuracy by product family, demand variance analysis, inventory exceptions.]\n\n## Decision Framework\n\n[FILL IN: How are consensus revisions decided? Are there voting rules, majority decisions, or are certain stakeholders (e.g., sales) given veto power? How are disagreements resolved?]\n\n## Post-Meeting Actions\n\n[FILL IN: What happens after the meeting? Who implements forecast changes? What is the timeline for changes to be reflected in the planning system? How is compliance tracked?]\n\n## Related Playbooks\n\n[FILL IN: Link to playbooks that support analysis or decision-making during the meeting, such as Forecast Revision or New Product Performance Review.]\n\n## Related\n\n[FILL IN: Cross-links to relevant datasets, metrics, and glossary terms that define concepts used in this process.]", "processes/lifecycle_planning": "## Purpose\n\n[FILL IN: Description of when lifecycle planning reviews occur, who participates, and what decisions are made during this business process.]\n\n## Process Overview\n\n[FILL IN: Define the sequence of steps, decision gates, and outputs of the lifecycle planning process. Include cadence (weekly, monthly, quarterly) and participants.]\n\n## Key Inputs\n\n[FILL IN: List the datasets, metrics, and reports that inform lifecycle planning decisions. Examples: sales history, forecast accuracy, inventory position, margin data.]\n\n## Key Outputs\n\n[FILL IN: What decisions or actions result from this process? Examples: product introductions, growth investments, end-of-life phase decisions.]\n\n## Decision Rules\n\n[FILL IN: Specific thresholds or criteria for moving products between lifecycle stages. Examples: minimum sales velocity to transition from introduction to growth, margin floors for continued maturity support.]\n\n## Related Playbooks\n\n[FILL IN: Link to any playbooks that support analysis during this process, such as New Product Performance Review.]\n\n## Related\n\n[FILL IN: Cross-links to relevant datasets, metrics, and glossary terms that define concepts used in this process.]"}, "types": ["Dataset", "Entity", "Glossary Term", "Metric", "Playbook", "Process", "Query"], "palette": {"Dataset": "#3b82f6", "Metric": "#8b5cf6", "Entity": "#10b981", "Playbook": "#f59e0b", "Process": "#14b8a6", "Glossary Term": "#64748b"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
