<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: #0f172a;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  background: #fff;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;
  min-width: 0;
  position: relative;
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: #fff;
}
#detail-empty {
  text-align: center;
  margin-top: 40px;
}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  font-size: 18px;
  margin: 4px 0 2px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  row-gap: 4px;
  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {
  border: 1px solid #e2e8f0; padding: 4px 8px; font-size: 12px;
}
#detail-body a.internal { color: #2563eb; cursor: pointer; }
#detail-body a.external { color: #2563eb; }

#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>
</head>
<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

<script>

 "Query", "description": "EDW SQL query that produces the vendor master shape.", "resource": "[Wholesale_Purchasing_AFI].[Vennam]", "tags": ["vendor", "master-data", "procurement", "supply-planning", "dimension", "query"], "color": "#94a3b8", "size": 51}}, {"data": {"id": "datasets/queries/warehouse_master", "label": "Warehouse Master Query", "type": "Query", "description": "EDW SQL query that produces the warehouse master.", "resource": "[SupplyChain_DW].[DimAFIWarehouses]", "tags": ["warehouse", "master-data", "planning", "logistics", "dimension", "query"], "color": "#94a3b8", "size": 74}}, {"data": {"id": "datasets/queries/weekly_current_forecast", "label": "Weekly Current Forecast", "type": "Query", "description": "Query the latest snapshot of the current forecast used in Supply Planning, transformed into a weekly value.", "resource": "[Wholesale_DemandPlanning_AFI].[SupplyForecast]", "tags": ["forecast", "current-forecast", "weekly-grain", "logility", "supply-planning", "query"], "color": "#94a3b8", "size": 43}}, {"data": {"id": "datasets/tables/CurFcstSnapshotDaily", "label": "Current Forecast Snapshot Daily", "type": "Dataset", "description": "Daily snapshot of the monthly forecast extracted from the SupplyPlanning databases inside Logility.", "resource": "[SupplyChain_Enh].[CurFcstSnapshotDaily]", "tags": ["forecast", "current-forecast", "snapshot", "monthly-grain", "logility", "supply-planning"], "color": "#3b82f6", "size": 50}}, {"data": {"id": "datasets/tables/demand_forecast", "label": "Demand Forecast", "type": "Dataset", "description": "Logility-generated demand forecast by item and planning period, loaded into the data warehouse after each planning run.", "resource": "[database].[schema].[demand_forecast]", "tags": ["demand-planning", "forecast", "logility", "supply-chain"], "color": "#3b82f6", "size": 41}}, {"data": {"id": "datasets/tables/DimCustomer", "label": "Customer Master", "type": "Dataset", "description": "Customer dimensions at account and Gold].[dbo].[FactCurrentForecast]", "tags": ["forecast", "supply-planning", "demand-planning", "weekly-grain", "snapshot", "promotional-lift", "logility"], "color": "#3b82f6", "size": 54}}, {"data": {"id": "datasets/tables/FactSupplyPlanDetail", "label": "Supply Plan Detail", "type": "Dataset", "description": "Current day's Logility supply plan showing a 39-week forward projection of Shippable Inventory at the item-warehouse-week grain, net of all planned demand, supply receipts, and transfer activity.", "resource": "[SupplyChain_Gold].[dbo].[FactSupplyPlanDetail]", "tags": ["supply-plan", "inventory", "logility", "shippable-inventory", "safety-stock", "demand", "transfers", "production", "purchase-orders"], "color": "#3b82f6", "size": 66}}, {"data": {"id": "datasets/tables/FactWorkingForecast", "label": "Working Forecast", "type": "Dataset", "description": "Latest Working Forecast as extracted from the Logility Demand Planning database at the item-warehouse-customer group-week grain; the pre-consensus demand signal actively being refined before synchronization to supply planning.", "resource": "[SupplyChain_Gold].[dbo].[FactWorkingForecast]", "tags": ["forecast", "demand-planning", "working-forecast", "customer-group", "weekly-grain", "snapshot", "logility", "promotional-lift"], "color": "#3b82f6", "size": 61}}, {"data": {"id": "datasets/tables/inventory_onhand", "label": "Inventory On Hand", "type": "Dataset", "description": "Current on-hand inventory quantities by item and warehouse location, sourced from HighJump WMS and synchronized to the ERP and data warehouse.", "resource": "[database].[schema].inventory_onhand", "tags": ["inventory", "warehouse", "highjump", "erp", "on-hand"], "color": "#3b82f6", "size": 40}}, {"data": {"id": "datasets/tables/purchase_orders", "label": "Purchase Orders", "type": "Dataset", "description": "Open and historical purchase order lines from the ERP, representing the inbound supply pipeline from suppliers.", "resource": "[database] try of origin, active status, and office designation used across procurement and supply planning.", "resource": "[SupplyChain_Gold].[dbo].[DimVendor]", "tags": ["vendor", "supplier", "procurement", "supply-planning", "master-data"], "color": "#10b981", "size": 41}}, {"data": {"id": "entities/warehouse", "label": "Warehouse", "type": "Entity", "description": "A physical or virtual warehouse location used in supply chain planning, classified by operational group and mapped to a canonical planning facility code.", "resource": "[SupplyChain_Gold].[dbo].[DimWarehouse]", "tags": ["warehouse", "logistics", "planning", "master-data"], "color": "#10b981", "size": 80}}, {"data": {"id": "glossary/customer_group", "label": "Customer Group", "type": "Glossary Term", "description": "A Logility demand planning grouping of customer accounts used to organize and review the working forecast at a segment level; distinct from individual customer records in DimCustomer.", "resource": "", "tags": ["demand-planning", "customer", "logility", "forecast", "glossary", "customer-group"], "color": "#64748b", "size": 42}}, {"data": {"id": "glossary/demand_consensus", "label": "Demand Consensus", "type": "Glossary Term", "description": "The demand planning process by which the working forecast is finalized and synchronized from Logility's DemandPlanning database to the SupplyPlanning database, making it the official demand signal consumed by supply planning.", "resource": "", "tags": ["forecast", "demand-planning", "supply-planning", "logility", "process", "glossary"], "color": "#64748b", "size": 42}}, {"data": {"id": "glossary/firm_demand", "label": "Firm Demand", "type": "Glossary Term", "description": "Confirmed open customer order quantity for a given item-warehouse-week; committed demand placed in the ERP system, as distinct from statistical forecast.", "resource": "", "tags": ["supply-plan", "demand", "orders", "glossary", "firm-demand"], "color": "#64748b", "size": 38}}, {"data": {"id": "g }, {"data": {"id": "playbooks/new_product_review__metrics/overstock_exposure", "source": "playbooks/new_product_review", "target": "metrics/overstock_exposure"}}, {"data": {"id": "playbooks/new_product_review__playbooks/stockout_escalation", "source": "playbooks/new_product_review", "target": "playbooks/stockout_escalation"}}, {"data": {"id": "playbooks/new_product_review__glossary/overstock", "source": "playbooks/new_product_review", "target": "glossary/overstock"}}, {"data": {"id": "playbooks/new_product_review__datasets/tables/inventory_onhand", "source": "playbooks/new_product_review", "target": "datasets/tables/inventory_onhand"}}, {"data": {"id": "playbooks/new_product_review__datasets/tables/purchase_orders", "source": "playbooks/new_product_review", "target": "datasets/tables/purchase_orders"}}, {"data": {"id": "playbooks/stockout_escalation__metrics/coverage_days", "source": "playbooks/stockout_escalation", "target": "metrics/coverage_days"}}, {"data": {"id": "playbooks/stockout_escalation__metrics/days_of_supply", "source": "playbooks/stockout_escalation", "target": "metrics/days_of_supply"}}, {"data": {"id": "playbooks/stockout_escalation__playbooks/new_product_review", "source": "playbooks/stockout_escalation", "target": "playbooks/new_product_review"}}, {"data": {"id": "playbooks/stockout_escalation__datasets/tables/DimProduct", "source": "playbooks/stockout_escalation", "target": "datasets/tables/DimProduct"}}, {"data": {"id": "playbooks/stockout_escalation__datasets/tables/sales_orders", "source": "playbooks/stockout_escalation", "target": "datasets/tables/sales_orders"}}, {"data": {"id": "playbooks/stockout_escalation__datasets/tables/purchase_orders", "source": "playbooks/stockout_escalation", "target": "datasets/tables/purchase_orders"}}, {"data": {"id": "playbooks/stockout_escalation__glossary/stockout", "source": "playbooks/stockout_escalation", "target": "glossary/stockout"}}, {"data": {"id": "playbooks/stockout_escalation__datasets/tables/inventory_onhand", "source": "playbooks/stockout_escalation", "target": "datasets/tables/inventory_onhand"}}, {"data": {"id": "playbooks/supply_plan_review__datasets/tables/FactSupplyPlanDetail", "source": "playbooks/supply_plan_review", "target": "datasets/tables/FactSupplyPlanDetail"}}, {"data": {"id": "playbooks/supply_plan_review__datasets/tables/DimWarehouse", "source": "playbooks/supply_plan_review", "target": "datasets/tables/DimWarehouse"}}, {"data": {"id": "playbooks/supply_plan_review__datasets/tables/DimProduct", "source": "playbooks/supply_plan_review", "target": "datasets/tables/DimProduct"}}, {"data": {"id": "playbooks/supply_plan_review__metrics/shippable_inventory", "source": "playbooks/supply_plan_review", "target": "metrics/shippable_inventory"}}, {"data": {"id": "playbooks/supply_plan_review__metrics/projected_fulfillment_rate", "source": "playbooks/supply_plan_review", "target": "metrics/projected_fulfillment_rate"}}, {"data": {"id": "playbooks/supply_plan_review__datasets/tables/sales_orders", "source": "playbooks/supply_plan_review", "target": "datasets/tables/sales_orders"}}, {"data": {"id": "playbooks/supply_plan_review__datasets/tables/DimDate", "source": "playbooks/supply_plan_review", "target": "datasets/tables/DimDate"}}, {"data": {"id": "playbooks/supply_plan_review__metrics/safety_stock_gap", "source": "playbooks/supply_plan_review", "target": "metrics/safety_stock_gap"}}, {"data": {"id": "playbooks/supply_plan_review__glossary/net_forecast", "source": "playbooks/supply_plan_review", "target": "glossary/net_forecast"}}, {"data": {"id": "playbooks/supply_plan_review__glossary/firm_demand", "source": "playbooks/supply_plan_review", "target": "glossary/firm_demand"}}, {"data": {"id": "playbooks/supply_plan_review__playbooks/stockout_escalation", "source": "playbooks/supply_plan_review", "target": "playbooks/stockout_escalation"}}], "bodies": {"datasets/queries/atp_in_stock_query": "## Purpose\n\nWeekly ATP availability extract for recent planning weeks. The query identifies whether item-warehouse combinations had available-to-promise quantity during each week-ending period, while separating recent launches from active products using first positive shipped invoice history.\n\nUse this query to support [ATP In Stock](/metrics/atp_in_stock.md) reporting and to understand whether customers are likely seeing available ATP for active, recently forecasted items at customer-invoicing warehouses.\n\n---\n\n## Grain\n\nEach row represents one **item x warehouse x week-ending x initial invoice date** grouping after ATP rows are filtered to:\n\n- `ATPWeek = 'Week2'`\n- prior completed fiscal weeks (`FiscalWeekIndicator BETWEEN -8 AND -1`)\n- selected customer-invoicing warehouses\n- item-warehouse combinations with positive recent resultant forecast\n- Logility item statuses that are not discontinued, inactive, restricted, terminated, or new-item exclusions\n\nThe natural analytic grain is `ItemSKU` x `WarehouseID` x `WeekEnding` x `RecentLaunchFlag`. `InitialInvoiceDate` is included to make the launch classification auditable.\n\n---\n\n## Schema\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ItemSKU` | VARCHAR | Trimmed item identifier from `[SupplyChain_Enh].[ATPWeekEnding]`; joins to [Product Master](/datasets/tables/DimProduct.md). |\n| `WarehouseID` | VARCHAR | Customer-invoicing warehouse from the ATP source, right-trimmed in the outer select; joins to [Warehouse Master](/datasets/tables/DimWarehouse.md). |\n| `InitialInvoiceDate` | DATE | Earliest positive shipped invoice date for the item from `[Wholesale_SalesHistory_AFI].[InvoiceDetail]`, excluding supplier direct ship and container-direct virtual warehouses. |\n| `RecentLaunchFlag` | VARCHAR | `NewLaunch` when the item has no initial invoice date or is within 90 days of initial invoice as of `WeekEnding`; otherwise `Active`. |\n| `WeekEnding` | DATE | ATP week-ending date; aligns to [Fiscal Calendar](/datasets/tables/DimDate.md). |\n| `InStockEvent` | INT | Count of underlying ATP observations in the group where `ATPQty > 0`. |\n| `StockEvent` | INT | Count of underlying ATP observations contributing to the group. This is the denominator for [ATP In Stock](/metrics/atp_in_stock.md). |\n| `AvgATPQty` | DECIMAL | Average ATP quantity observed across the underlying rows for the grouped week. Use as supporting context, not as the in-stock rate itself. |\n\n---\n\n## Source Logic\n\n### ATP window and warehouse scope\n\nThe inner ATP subquery reads `[SupplyChain_Enh].[ATPWeekEnding]` and joins `[Enterprise_DW].[DimDate_NonRetail]` on `RunDate` to keep only completed fiscal weeks where `FiscalWeekIndicator BETWEEN -8 AND -1`.\n\nThe query filters to:\n\n- `ATPWeek = 'Week2'`\n- `InsertedVersion = 1`\n- warehouses `1`, `15`, `17`, `28`, `5`, `335`, and `ECR`\n\n`Week2` is used because customer orders commonly have roughly a seven-day lead between order date and requested date, so the second ATP week better reflects the ATP position customers expect to see.\n\n### Recent forecast demand filter\n\nThe query inner joins to a `[SupplyChain_Enh].[DemandForecastSnapshot]` aggregate by item and warehouse, limited to snapshots from the last 13 months. The `HAVING SUM(dfcResultantForecast) > 0` filter keeps only item-warehouse combinations with positive recent forecast demand.\n\nThis prevents ATP rows for item-warehouse combinations with no recent forecast demand from inflating availability reporting.\n\n### Item status filter\n\nThe query left joins `[SupplyChain_Enh].[DemandFulfillmentCommonContainer_Logility]` by item, warehouse, and week ending, then filters out item statuses `D`, `I`, `R`, `T`, and `N`.\n\nBecause the item-status condition is in the `WHERE` clause, rows without a matching Logility status record are also excluded.\n\n### Launch classification\n\nThe launch-classification subquery reads `[Wholesale_SalesHistory_AFI].[InvoiceDetail]`, keeps positive shipped quantity, and excludes warehouses `55`, `C`, and `CNW`.\n\n- Warehouse `55` is excluded because it is the supplier direct ship warehouse and does not have ATP.\n- Warehouses `C` and `CNW` are container-direct virtual warehouses; excluding them keeps the initial invoice date tied to the first physical-warehouse shipment.\n\n`RecentLaunchFlag` is assigned as:\n\n```text\nNewLaunch when InitialInvoiceDate is null\nNewLaunch when InitialInvoiceDate + 90 days > WeekEnding\nActive otherwise\n```\n\n---\n\n## Metric Logic\n\n[ATP In Stock](/metrics/atp_in_stock.md) is calculated from this query as:\n\n```text\nATPInStockRate = SUM(InStockEvent) / SUM(StockEvent)\n```\n\n`AvgATPQty` is a supporting diagnostic that shows the average available-to-promise quantity observed during the week. It helps explain whether an in-stock week had shallow or deep availability, but it is not the in-stock-rate numerator.\n\n---\n\n## Related\n\n- [ATP In Stock](/metrics/atp_in_stock.md)\n- [Product Master](/datasets/tables/DimProduct.md)\n- [Warehouse Master](/datasets/tables/DimWarehouse.md)\n- [Fiscal Calendar](/datasets/tables/DimDate.md)\n- [Current Forecast](/datasets/tables/FactCurrentForecast.md)\n- [Stockout](/glossary/stockout.md)\n\n## Base Query\n\n```sql\nSELECT [ATP].[ItemSKU]\n      ,RTRIM([ATP].[Warehouse]) AS [WarehouseID]\n      ,[LC].[InitialDate] AS [InitialInvoiceDate]\n      ,CASE \n            WHEN [LC].[InitialDate] IS NULL \n                THEN 'NewLaunch'\n            WHEN DATEADD(DAY,90,[LC].[InitialDate]) > [ATP].[WeekEnding]\n                THEN 'NewLaunch'\n            ELSE 'Active'\n        END AS [RecentLaunchFlag]\n      ,[ATP].[WeekEnding]\n      ,SUM(ATP.[In Stock Event]) AS [InStockEvent]\n      ,SUM(ATP.[Stock Event])    AS [StockEvent]\n      ,AVG(ATP.[ATPQty])         AS [AvgATPQty]\n  FROM (\nSELECT RTRIM(atp.[ItemSKU]) AS [ItemSKU]\n      ,atp.[Warehouse]\n      ,atp.[ATPWeek]\n      ,atp.[WeekEnding]\n  \n                 ,atp.[ATPQty]\n                 ,dd.FiscalMonthLastDate\n                 ,CASE\n                      WHEN [atp].[ATPQty] > 0 THEN\n                          1\n                      ELSE\n                          0\n                  END AS [In Stock Event]\n                 ,1   AS [Stock Event]\n             --,atp.[RunDate]\n             --,atp.[InsertedVersion]\n             --,atp.[VersionDescription]\n             --,atp.[APNQ]\n             FROM [SupplyChain_Enh].[ATPWeekEnding]                     atp\n                 INNER JOIN Enterprise_DW.DimDate_NonRetail AS dd\n                     ON atp.[RunDate] = dd.[DateID]\n                     AND [dd].[FiscalWeekIndicator] BETWEEN -8 AND -1\n\n                 INNER JOIN (\n                                SELECT dfs.dfcItem\n                                      ,dfs.dfcWarehouse\n                                      ,SUM(dfs.dfcResultantForecast) AS RSLF\n                                  FROM SupplyChain_Enh.DemandForecastSnapshot dfs\n                                 WHERE dfs.dfcSnapshot > DATEADD(MONTH, -13, GETDATE())\n                                 GROUP BY dfs.dfcItem\n                                         ,dfs.dfcWarehouse\n                                HAVING SUM(dfs.dfcResultantForecast) > 0\n                            )                                           dfc\n                     ON dfc.dfcItem = RTRIM(atp.[ItemSKU])\n                    AND dfc.dfcWarehouse = atp.Warehouse\n\n              LEFT JOIN [SupplyChain_Enh].[DemandFulfillmentCommonContainer_Logility] AS DFL\n                ON [atp].[ItemSKU] = [DFL].[Item]\n                AND [atp].[Warehouse] = [DFL].[Whse]\n                AND [atp].[WeekEnding] = [DFL].[WeekEnding]\n            WHERE atp.[ATPWeek] = 'Week2'\n              AND atp.[Warehouse] IN ( '1', '15', '17', '28', '5', '335', 'ECR' )\n              AND atp.[InsertedVersion] = 1\n              AND [DFL].[ItemStatus] NOT IN ( 'D', 'I', 'R', 'T','N') \n\n\n       ) ATP\n  LEFT JOIN (\n\n        SELECT [ItemNumber]\n              ,MIN([InvoiceDate]) AS [InitialDate]\n          FROM [Wholesale_SalesHistory_AFI].[InvoiceDetail]\n          WHERE [Warehouse] NOT IN ('55','C','CNW') \n            AND [QuantityShipped] > 0\n\n          GROUP BY [ItemNumber]\n    ) AS LC \n    ON [ATP].[ItemSKU] = [LC].[ItemNumber]\n\n GROUP BY [ATP].[ItemSKU]\n         ,[ATP].[Warehouse]\n         ,[ATP].[WeekEnding]\n         ,[LC].[InitialDate]\n```", "datasets/queries/customer_master": "## Purpose\n\nCentral customer dimension for supply chain planning and demand analysis. Consolidates customer account and ship-to location attributes to enable demand forecasting, order fulfillment analysis, and forecast accuracy reporting. Provides ship-to level detail for multi-location customers to capture location-specific subscription and demand patterns.\n\nUsed as the customer entity in:\n\n- Demand forecasting models\n- Order fulfillment analysis\n- Forecast accuracy reporting\n- Demand pattern segmentation\n\n---\n\n## Grain\n\nEach row represents a unique **account and ship-to location combination** (`AccountAndShipToNumber`).\n\n---\n\n## Schema\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `AccountAndShipToNumber` | VARCHAR(20) | Composite key identifying the unique account-ship-to combination for multi-location demand tracking |\n| `AccountNumber` | VARCHAR(10) | Account-level identifier; used as foreign key in fact tables |\n| `AccountName` | VARCHAR(200) | Customer name / account name for display and filtering |\n| `ShipToNumber` | VARCHAR(10) | Ship-to location code identifying the receiving location |\n| `ShipToName` | VARCHAR(200) | Ship-to location name or address label |\n| `CustomerGroup` | VARCHAR(100) | Customer grouping classification for demand segmentation (e.g., AFICONS, regional distributor class) |\n| `CustomerSegment` | VARCHAR(100) | Market or channel segment (e.g., wholesale, retail, direct) for hierarchical reporting |\n| `ReportingBusinessType` | VARCHAR(100) | Standardized business type for regulatory and revenue reporting |\n| `BusinessType` | VARCHAR(100) | Business type used for customer classification and CustomerGroup derivation |\n| `Address1` | VARCHAR(200) | Primary address line |\n| `Address2` | VARCHAR(200) | Secondary address line |\n| `Address3` | VARCHAR(200) | Tertiary address line (suite, building) |\n| `Address4` | VARCHAR(200) | Quaternary address line |\n| `Address5` | VARCHAR(200) | Quinary address line |\n| `City` | VARCHAR(100) | City name |\n| `State` | VARCHAR(2) | State abbreviation (US standard) |\n| `ZipCode` | VARCHAR(10) | Postal code |\n| `Country` | VARCHAR(100) | Country name or code |\n| `CountryCode` | VARCHAR(10) | Country code from the ship-to geographic location |\n\n---\n\n## Related\n\n- [Customer](/entities/customer.md) \u2014 Canonical customer business object definition\n- [Demand Forecast](/datasets/tables/demand_forecast.md) \u2014 Demand signals indexed by customer\n- [Sales Orders](/datasets/tables/sales_orders.md) \u2014 Actual customer order transactions\n- [FILL IN: Link to forecast accuracy metric]\n\n---\n\n## Base Query\n\nUse this query to produce the Customer Master shape while the gold `DimCustomer` table is unavailable.\n\n```sql\nSELECT [C].[Account And ShipTo Number] AS [AccountAndShipToNumber]\n      ,[C].[Customer Account Number] AS [AccountNumber]\n      ,CONCAT(TRIM([C].[Customer Name]), ' - ', TRIM([C].[Customer Account Number])) AS [AccountName] \n      ,[C].[Customer Shipto Number] AS [ShipToNumber]\n      ,[C].[ShipTo Details] AS [ShipToName]\n      ,CASE \n            WHEN [CG].[CustomerGroup] IS NOT NULL\n                THEN [CG].[CustomerGroup]\n            WHEN [C].[Customer Account Number] = '6000100' THEN 'AFICONS' --SAMPLE ACCOUNT\n            WHEN [C].[Customer Account Number] IN ('1913400','8888000','8888300','8888600','9946600','9955000','9955100','9956600','9966100','9974000','9977400','9983800','9985500','9989200')\n                THEN 'HSENT'\n            WHEN [C].[Customer Account Number] = '4444400' --ASHCOMM\n                THEN 'HSENT' \n            WHEN [C].[Reporting Business Type] = 'Ashley HomeStores'\n                    AND [C].[Commission Code] <> '006'\n                THEN 'HSLIC'\n            WHEN [C].[Business Type] = 'Hybrid - Homestore and Primary'\n                THEN 'HSLIC'\n            WHEN [C].[Customer Account Number] = '109200'\n                THEN 'NFM'\n            WHEN [C].[Customer Account Number] = '3061700' --Payless in E-Retail should be AFICONS\n                THEN 'AFICONS'\n            WHEN [C].[Reporting Business Type] = 'E-Retail'\n                THEN 'ECOMM'\n            WHEN [C].[Reporting Business Type] = 'Rental'\n                THEN 'MASSRENT'\n            WHEN [C].[Reporting Business Type] = 'Mass Merchants'\n                THEN 'MASSRENT'\n            WHEN [C].[Reporting Business Type] = 'International'\n                THEN 'INT'\n            WHEN [C].[Customer Account Number] = '4031300'\n                THEN 'RHCUST'\n            WHEN [C].[Customer Account Number] = '3824800'\n                THEN 'AFI DIST'\n            ELSE 'AFICONS'\n        END AS [CustomerGroup]\n      ,[C].[Customer Segment] AS [CustomerSegment]\n      ,[C].[Reporting Business Type] AS [ReportingBusinessType]\n      ,[C].[Business Type] AS [BusinessType]\n      ,[G].[Address 1]  AS [Address1]\n      ,[G].[Address 2]  AS [Address2]\n      ,[G].[Address 3]  AS [Address3]\n      ,[G].[Address 4]  AS [Address4]\n      ,[G].[Address 5]  AS [Address5]\n      ,[G].[City]\n      ,[G].[State Code] AS [State]\n      ,[G].[ZipCode]\n      ,[G].[Country]\n      ,[G].[Country Code] AS [CountryCode]\n     \n  FROM [AFISales_DW].[DimCustomers] AS C\n  LEFT JOIN [AFISales_DW].[DimGeographicLocations] AS G\n    ON [C].[Shipto AddressID] = [G].[Address ID]\n \n  INNER JOIN ( -- Filter out Accounts that haven't ordered in 5 years\nSELECT DISTINCT [Account And ShipTo Number]\n  FROM [SupplyChain_Enh].[ActualsCustItemWH_AFI]\n  ) AS ID\n    ON [C].[Account And ShipTo Number] = [ID].[Account And ShipTo Number]\n \n    -- Pull in Logility Customer Groupings\n  LEFT JOIN [Wholesale_ProductSourcing_AFI].[CustomerGrouping] AS CG\n    ON [C].[Customer Account Number] = [CG].[CustomerNumber]\n```\n", "datasets/queries/fiscal_calendar": "## Purpose\n\nFiscal calendar dimension used to group and filter supply chain facts by fiscal period. Provides a full hierarchy from individual dates up through fiscal weeks, months, quarters, halves, and years. Includes period-relative indicators (current period = 0, past = negative, future = positive) that support rolling-window analysis without hardcoded date logic.\n\nUsed as the time dimension in:\n\n- Demand forecasting and forecast accuracy reporting\n- Inventory coverage and days-of-supply calculations\n- Sales and order trend analysis\n- Holiday and weekday/weekend segmentation\n\n---\n\n## Grain\n\nEach row represents a unique **calendar date** (`TransactionDate`).\n\n---\n\n## Schema\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `TransactionDate` | DATE | Primary key \u2014 distinct calendar dates |\n| `FiscalYear` | INT | Fiscal year number (YYYY) |\n| `IntegerDate` | INT | Date as integer in YYYYMMDD format |\n| `MapicsDate` | INT | Legacy AS400/MAPICS date format used in ERP source tables |\n| `DayOfWeek` | VARCHAR | Full weekday name (Sunday through Saturday) |\n| `FiscalWeekNum` | INT | Week number within the fiscal year |\n| `FWDesc` | VARCHAR | Fiscal week label (e.g., FW 01) |\n| `FiscalYearWeekNum` | INT | Composite fiscal week key (YYYYWW) |\n| `FiscalMonthNum` | INT | Fiscal month number (1\u201312) |\n| `FMDesc` | VARCHAR | Fiscal month label (e.g., FM 01) |\n| `FiscalMonthName` | VARCHAR | Abbreviated month name (Jan, Feb, Mar, \u2026) |\n| `FiscalYearMonthNum` | INT | Composite fiscal month key (YYYYMM) |\n| `FiscalMonthYearDesc` | VARCHAR | Readable period label (e.g., Oct 2025) |\n| `FiscalQuarterNum` | INT | Fiscal quarter number (1\u20134) |\n| `FQDesc` | VARCHAR | Fiscal quarter label (e.g., FQ 2) |\n| `FiscalYearHalfNum` | INT | Composite fiscal half key (YYYYH) |\n| `FiscalHalfNum` | INT | Fiscal half number (1\u20132) |\n| `FHDesc` | VARCHAR | Fiscal half label (e.g., FH 1) |\n| `FYDesc` | VARCHAR | Fiscal year label (e.g., FY 2025) |\n| `FiscalWeekStart` | DATE | Sunday date marking the start of the fiscal week |\n| `FiscalWeekEnd` | DATE | Saturday date marking the end of the fiscal week |\n| `FiscalMonthStart` | DATE | First Sunday of the fiscal month |\n| `FiscalMonthEnd` | DATE | Last Saturday of the fiscal month |\n| `FiscalYearStart` | DATE | First Sunday of the fiscal year |\n| `FiscalYearEnd` | DATE | Last Saturday of the fiscal year |\n| `HolidayIndicator` | VARCHAR | \"Holiday\" or \"Non-Holiday\" |\n| `HolidayName` | VARCHAR | Holiday name, or blank if not a holiday |\n| `WeekdayWeekend` | VARCHAR | \"Weekday\" or \"Weekend\" |\n| `FiscalDayIndicator` | INT | Relative day index; 0 = today, negative = past, positive = future |\n| `FiscalWeekIndicator` | INT | Relative week index; 0 = current week |\n| `FiscalMonthIndicator` | INT | Relative month index; 0 = current month |\n| `FiscalQuarterIndicator` | INT | Relative quarter index; 0 = current quarter |\n| `FiscalYearIndicator` | INT | Relative year index; 0 = current year |\n| `FiscalWeeksInMonth` | INT | Count of fiscal weeks in the month |\n\n---\n\n## Related\n\n- [FILL IN: Link to Forecast Accuracy metric]\n- [FILL IN: Link to Days of Supply metric]\n- [FILL IN: Link to Demand Forecast dataset]\n\n---\n\n## Base Query\n\nUse this query to produce the Fiscal Calendar shape while the gold `DimDate` table is unavailable.\n\n```sql\nSELECT [DateID] AS [TransactionDate]\n      ,[DateKey] AS [IntegerDate]\n      ,[MapicsDate] AS [MapicsDate]\n\t  ,[CalendarDayOfWeekName] AS [DayOfWeek]\n\t  ,[FiscalWeek] AS [FiscalWeekNum]\n\t  ,CONCAT('FW ', RIGHT(CONCAT('00',[FiscalWeek]),2)) AS [FWDesc]\n\t  ,[FiscalWeekYear] AS [FiscalYearWeekNum]\n\t  ,[FiscalMonth] AS [FiscalMonthNum]\n\t  ,CONCAT('FM ', RIGHT(CONCAT('00',[FiscalMonth]),2)) AS [FMDesc]\n\t  ,FORMAT(CONVERT(DATE,CONCAT([FiscalMonthYear],'01')), 'MMM') AS [FiscalMonthName]\n\t  ,[FiscalMonthYear] AS [FiscalYearMonthNum]\n\t  ,FORMAT(CONVERT(DATE,CONCAT([FiscalMonthYear],'01')), 'MMM yyyy') AS [FiscalMonthYearDesc]\n\t  --,CONVERT(DATE,CONCAT([FiscalMonthYear],'01')) AS [Fiscal Month (calendar start)]\n\t  ,[FiscalQuarter] AS [FiscalQuarterNum]\n\t  ,CONCAT('FQ ', RIGHT(CONCAT('00',[FiscalQuarter]),2)) AS [FQDesc]\n\t  ,[FiscalSemesterYear] AS [FiscalYearHalfNum]\n\t  ,[FiscalSemester] AS [FiscalHalfNum]  \n\t  ,CONCAT('FH ', RIGHT(CONCAT('00',[FiscalSemester]),2)) AS [FHDesc]\n\t  ,[FiscalYear] AS [FiscalYear]\n\t  ,CONCAT('FY ', [FiscalYear]) AS [FYDesc]\n\t  ,CONVERT(DATE,[FiscalWeekFirstDate]) AS [FiscalWeekStart]\n\t  ,CONVERT(DATE, [FiscalWeekLastDate]) AS [FiscalWeekEnd]\n\t  ,CONVERT(DATE,[FiscalMonthFirstDate]) AS [FiscalMonthStart]\n\t  ,CONVERT(DATE,[FiscalMonthLastDate]) AS [FiscalMonthEnd]\n\t  ,CONVERT(DATE,[FiscalYearFirstDate]) AS [FiscalYearStart]\n\t  ,CONVERT(DATE,[FiscalYearLastDate]) AS [FiscalYearEnd]\n\t  ,[HolidayIndicator] AS [HolidayIndicator]\n\t  ,[HolidayName] AS [HolidayName]\n\t  ,[WeekdayWeekend]\n\t  ,[FiscalDateIndicator] AS [FiscalDayIndicator]\n      ,[FiscalWeekIndicator] AS [FiscalWeekIndicator]\n      ,[FiscalMonthIndicator] AS [FiscalMonthIndicator]\n      ,[FiscalQuarterIndicator] AS [FiscalQuarterIndicator]\n      ,[FiscalYearIndicator] AS [FiscalYearIndicator]\n  FROM [Enterprise_DW].[DimDate_NonRetail]\n  WHERE [FiscalYearIndicator] BETWEEN -5 AND 5\n```\n", "datasets/queries/item_master": "## Purpose\n\nCentral product dimension for supply chain planning. Consolidates item master attributes from the ERP product master as the primary source, unified with planning details from `DimCurrentProductDetails`, vendor data, invoice history, and product knowledge extensions. Resolves divergent calculated columns across legacy semantic models into a governed set of source attributes and ETL-computed classification columns.\n\nAll gold fact tables join to `DimProduct`. Used in:\n\n- Demand and inventory planning\n- Lifecycle-stage filtering for forecast and planning reports\n- Product hierarchy and classification roll-ups\n- New product assessment and end-of-life tracking\n\n---\n\n## Grain\n\nEach row represents a unique **item SKU** (`ItemSKU`). Direct-ship-only supplier items are excluded from this table.\n\n---\n\n## Schema\n\n### Identity\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ItemSKU` | VARCHAR(15) | Primary key; item-level grain identifier used as FK in all gold fact tables |\n| `ItemDescription` | VARCHAR(30) | Full item name from product master |\n| `ItemSKUDesc` | VARCHAR(48) | ETL-computed: `ItemSKU + ' - ' + ItemDescription`; convenience label for visuals and slicers |\n| `ItemCode` | VARCHAR(25) | Secondary item code from source master; distinct from `ItemSKU` |\n\n### Series\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `SeriesNumber` | VARCHAR(5) | Series identifier for grouping related SKUs |\n| `SeriesName` | VARCHAR(100) | Human-readable series name |\n| `SeriesColor` | VARCHAR(60) | Color attribute at the series level |\n| `FrameNumber` | VARCHAR(16) | Frame number attribute |\n| `PlanningSeries` | VARCHAR(16) | ETL-computed: alias of `ItemExtSeriesNumber` using Logility naming convention |\n| `ItemExtSeriesNumber` | VARCHAR(16) | Extended/external series number from `DimCurrentProductDetails`; supplemental series identifier |\n| `ExtSeriesNumber` | VARCHAR(16) | Extended series number from item master |\n| `ExtSeriesDescription` | VARCHAR(119) | Description for the extended series number |\n| `SeriesDesc` | VARCHAR(108) | ETL-computed: `PlanningSeries + ' - ' + SeriesName`; replaces model-local Series Desc calculated columns |\n\n### Classification\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ItemClassCode` | CHAR(4) | Item classification code |\n| `ItemClassName` | VARCHAR(25) | Item classification description |\n| `CollectiveClass` | VARCHAR(100) | Collective class description |\n| `CollectiveClassGroup` | VARCHAR(100) | ETL-computed: custom grouping consolidating collective classes and item classes; applies special rules for components and kits |\n| `ProductLine` | VARCHAR(25) | Product line grouping |\n| `GeneralDescription` | VARCHAR(10) | General description label from GENDESC table |\n| `ItemGrouping` | VARCHAR(35) | Planning-level item grouping |\n| `MerchandisingCategory` | SMALLINT | Merchandising category for retail/display purposes |\n| `BusinessUnit` | VARCHAR(100) | Business unit from `DimCurrentProductDetails`; may be NULL for items not in that source |\n| `Colors` | VARCHAR(23) | Color attribute at the item level |\n| `PricePoint` | INT | Price point tier code |\n| `ItemPricePointRating` | VARCHAR(6) | Rating within price point tier |\n\n### Finance / Sales Hierarchy\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `AFIFinanceDivision` | VARCHAR(30) | Finance division |\n| `AFISalesDivision` | VARCHAR(25) | Sales division description |\n| `AFISalesCategory` | VARCHAR(25) | Sales category description |\n| `AlternateDivision` | VARCHAR(25) | ETL-computed: strips the `\"Signature \"` prefix from `AFISalesDivision` for Signature-branded divisions; used where the prefix creates grouping noise |\n\n### Geography / Sourcing\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ImportDomesticCode` | CHAR(1) | Import (I) or Domestic (D) sourcing indicator |\n| `CountryOfOrigin` | VARCHAR(30) | Country of manufacture |\n| `ResponsibleOffice` | VARCHAR(10) | Office responsible for sourcing and planning the item |\n| `ResponsibleOfficeName` | VARCHAR(10) | Description of the responsible office |\n| `CEXCode` | CHAR(3) | Default warehouse that the item balance record is created at |\n| `MakeBuyCode` | VARCHAR(10) | Make (manufactured internally) or Buy (purchased); pending ETL implementation |\n\n### Pricing / Physical Attributes\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `FOBArcPrice` | DECIMAL(15,3) | FOB unit price in USD indexed to Arcadia |\n| `Cubes` | DECIMAL(5,2) | Item cube in cubic feet |\n| `QtyInBox` | DECIMAL(4,0) | Units per carton; used in `MarketableConversionFactor` |\n| `UOM` | CHAR(2) | Unit of measure |\n| `ContainerVolume` | DECIMAL(10,7) | ETL-computed: `Cubes / 2400`; normalized container volume for purchase order estimation. Used in capacity planning: For a set of PO line items, sum of [Units] *[ContainerVolume] helps answer, \"How many containers is the vendor shipping this week? How many containers is the warehouse receiving this week?\" |\n| `CurrentUnitCost` | DECIMAL(19,3) | Average/list unit cost |\n\n### Vendor\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `PrimaryVendor` | VARCHAR(8) | Primary vendor number |\n| `PrimaryVendorName` | VARCHAR(23) | Primary vendor name |\n\n### Structure / Planning\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `MainPieceItem` | VARCHAR(5) | Item number of the main piece in a set maintained by sales teams |\n| `ItemForecastPlannerID` | VARCHAR(40) | Forecast planner ID; resolved via COALESCE priority from `Item_ENV` and `NonPkItems` |\n\n### Status / Lifecycle\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `AFIItemStatus` | CHAR(1) | Source lifecycle status code: N = New, D = Discontinued; empty string normalized to C (Current) by ETL; primary input to `LifecycleStage` |\n| `CurrentStatus` | CHAR(1) | Current item status from `DimCurrentProductDetails` |\n| `FutureStatus` | VARCHAR(40) | Planned future status: F = Phase-out, P = Planned drop; input to `LifecycleStage` and `PlanDropDecisionDate` |\n| `ManufacturingStatus` | VARCHAR(25) | Manufacturing status description |\n| `ManufacturingStatusChangeDate` | DATE | Date manufacturing status last changed |\n| `DiscontinuedDate` | DATE | Date item was discontinued |\n| `HoldBuyCode` | VARCHAR(40) | Purchasing hold code; resolved via COALESCE from `Item_ENV` and `NonPkItems` |\n\n### Market / Introduction Dates\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `MarketIntroducedAt` | VARCHAR(30) | Date item was introduced to market; kit item NULLs are corrected to the parent finished-good's date by ETL |\n| `MarketBeginDate` | DATE | Market availability begin date |\n| `MarketEndDate` | DATE | Market availability end date; NULL while the item is active |\n| `InitialInvoiceDate` | DATE | ETL-computed: date of first customer invoice from sales history; drives `Recent Launch` classification in `LifecycleStage` |\n| `InitialInvoiceQty` | DECIMAL(38,0) | Quantity on the first invoice |\n\n### Product Flags\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `SellableItemFlag` | CHAR(1) | Indicates item is directly sellable to end customers |\n| `ExpressShipFlag` | CHAR(1) | Express shipping eligibility flag |\n| `HSExclusiveFlag` | BIT | HomeStore exclusive product flag |\n| `HSCoreProductFlag` | BIT | HomeStore core product flag |\n| `HSProprietaryProductFlag` | BIT | HomeStore proprietary product flag |\n| `ConsumerChoiceFlag` | VARCHAR(5) | Consumer choice program flag |\n| `CommodityItem` | BIT | Commodity item classification |\n| `Showroom` | VARCHAR(87) | Showroom display attribute |\n\n### Image\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ItemImage` | VARCHAR(50) | Item image identifier |\n| `ImageURL` | VARCHAR(87) | ETL-computed: full image URL; NULL when `ItemImage` is NULL or empty |\n\n### ETL-Computed \u2014 Lifecycle & Planning\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `LifecycleStage` | VARCHAR(20) | ETL-computed: `Pre-Invoicing` \\| `Recent Launch` \\| `Current` \\| `End of Life`; single canonical lifecycle stage replacing divergent model-local calculated columns |\n| `LifecycleStageSortOrder` | INT | ETL-computed: numeric sort order for `LifecycleStage` (1\u20134); enables non-alphabetic sort in visuals |\n| `DiscontinuationHorizon` | VARCHAR(5) | ETL-computed: `12M` \\| `18M` \\| `24M` \\| NULL; buckets end-of-life items by expected drop timeline; pending implementation |\n| `PlanDropDecisionDate` | DATE | ETL-computed: date `FutureStatus` first changed to F or P; pending implementation |\n| `PartFlag` | VARCHAR(4) | ETL-computed: `PART` \\| `ITEM`; identifies component parts for filtering from customer-facing demand and inventory reports |\n| `KitFlag` | VARCHAR(3) | ETL-computed: kit/material type \u2014 `Bedding Kit` \\| `UPH Kit` \\| `Swatch` \\| `HIDES` \\| `VINYL`; replaces model-local kit-type variants; pending implementation |\n| `MarketableConversionFactor` | DECIMAL(10,6) | ETL-computed: `1.0` for standard marketable SKUs; `1/QtyInBox` for GDC-700 component items; enables demand aggregation at the parent SKU level; pending implementation |\n| `MarketableItemSKU` | VARCHAR(15) | ETL-computed: self for marketable items; parent finished-good `ItemSKU` for GDC-700 components; used in GROUPBY clauses to roll component demand up to the sellable SKU; pending implementation |\n\n---\n\n## Related\n\n- [FILL IN: Link to NewProductReview process]\n- [FILL IN: Link to ForecastRevision process]\n- [FILL IN: Link to Supplier entity]\n- [FILL IN: Link to LifecycleStage glossary term]\n\n## Base Query\n\nThis query produces the Product Master dataset shape while the gold table is unavailable.\n\n```sql\nSELECT\n      RTRIM([IM].[ItemSKU])                                                      AS [ItemSKU]\n    , [IM].[ItemDescription]\n    , RTRIM([IM].[ItemSKU]) + ' - ' + [IM].[ItemDescription]                    AS [ItemSKUDesc]\n    , [IM].[ItemCode]\n    , [IM].[SeriesNumber]\n    , [IM].[SeriesName]\n    , [IM].[SeriesColor]\n    , [CPD].[Item Ext Series Number]                                               AS [PlanningSeries]\n    , [CPD].[Item Ext Series Number]                                                AS [ItemExtSeriesNumber]\n    , [IM].[ExtSeriesNumber]\n    , RTRIM([CPD].[Item Ext Series Number]) + ' - ' + [IM].[SeriesDescription]     AS [SeriesDesc]\n    , [IM].[FrameNumber]\n    , [IM].[ItemClassCode]\n    , [IM].[ItemClassName]\n    , [IM].[CollectiveClass]\n    , CASE\n          WHEN [IM].[ItemClassCode] IN ('WVBC', 'WVHC', 'ZARP') THEN 'BEDDING COMPONENTS'\n          WHEN [IM].[ItemClassCode] = 'USKE' THEN 'BEDDING KT KITS'\n          WHEN [IM].[ItemClassCode] IN ('WVCD', 'WVUP', 'UESW', 'WVWB') THEN 'UPH COMPONENTS'\n          WHEN [IM].[ItemClassCode] IN ('WVCS', 'WVHD', 'WVCU') THEN 'CG COMPONENTS'\n          WHEN [IM].[ItemClassCode] = 'UTRK' THEN 'UPH KT KITS'\n          WHEN [IM].[CollectiveClass] IN ('ACCESSORIES', 'STATIONARY UPH', 'MOTION UPH')\n           AND RIGHT(RTRIM([IM].[ItemSKU]), 2) = 'UN' THEN 'UPH KITS'\n          WHEN [IM].[CollectiveClass] = 'BEDDING'\n           AND LEFT([IM].[ItemClassCode], 1) = 'Z'\n           AND RIGHT([IM].[ItemClassCode], 1) = 'K' THEN 'BEDDING KITS'\n          WHEN [IM].[ItemClassCode] IN ('WVVG', 'WVBF') THEN 'BEDDING KITS'\n          WHEN [IM].[CollectiveClass] IN ('ACCESSORIES', 'LAMPS', 'RUGS', 'THROWS & PILLOWS') THEN 'ACCENTS'\n          ELSE [IM].[CollectiveClass]\n      END                                                                        AS [CollectiveClassGroup]\n    , [IM].[ProductLine]\n    , [GDC].[GDICL]                                                             AS [GeneralDescription]\n    , [IM].[ItemGrouping]\n    , [IM].[Colors]\n    , [IM].[PricePoint]\n    , [IM].[ItemPricePointRating]\n    , [IM].[AFIFinanceDivision]\n    , [IM].[AFISalesDivision]\n    , [IM].[AFISalesCategory]\n    , CASE\n          WHEN [IM].[AFISalesDivision] LIKE 'Signature %'\n              THEN SUBSTRING([IM].[AFISalesDivision], 11, LEN([IM].[AFISalesDivision]))\n          ELSE [IM].[AFISalesDivision]\n      END                                                                        AS [AlternateDivision]\n    , [IM].[ImportDomesticCode]\n    , [IM].[CountryofOrigin]\n    , [IM].[ResponsibleOffice]\n    , [IM].[ResponsibleOfficeName]\n    , [IM].[CEXCode]\n    , ''                                                                         AS [MakeBuyCode]\n    , [IM].[FOBArcPrice]\n    , [IM].[Cubes]\n    , [IM].[QtyInBox]\n    , [IM].[UOM]\n    , CAST([IM].[Cubes] AS DEC(9, 5)) / 2400                                    AS [ContainerVolume]\n    , [IM].[CurrentUnitCost]\n    , [IM].[PrimaryVendor]\n    , [V].[VNAME]                                                                AS [PrimaryVendorName]\n    , [IM].[MainPieceItem]\n    , TRIM(COALESCE([IPK].[ienForecastPlannerID], [NPK].[npkForecastPlannerID])) AS [ItemForecastPlannerID]\n    , CASE WHEN [IM].[AFIItemStatus] = '' THEN 'C' ELSE [IM].[AFIItemStatus] END AS [AFIItemStatus]\n    , [CPD].[Current Status]                                                      AS [CurrentStatus]\n    , TRIM(COALESCE([IPK].[ienFutureStatus], [NPK].[npkFutureStatus]))           AS [FutureStatus]\n    , [IM].[ManufacturingStatus]\n    , [IM].[ManufacturingStatusChangeDate]\n    , [IM].[DiscontinuedDate]\n    , TRIM(COALESCE([IPK].[ienHoldBuyCode], [NPK].[npkHoldBuyCode]))             AS [HoldBuyCode]\n    , [IM].[MarketIntroducedAt]\n    , [IM].[MarketBeginDate]\n    , [IM].[MarketEndDate]\n    , [Inv].[InitialInvoiceDate]                                                 AS [InitialInvoiceDate]\n    , [IM].[InitialInvoiceQty]\n    , [IM].[SellableItemFlag]\n    , [IM].[ExpressShipFlag]\n    , [IM].[HSExclusiveFlag]\n    , [IM].[HSCoreProductFlag]\n    , [IM].[HSProprietaryProductFlag]\n    , [IM].[ConsumerChoiceFlag]\n    , [IM].[CommodityItem]\n    , [IM].[Showroom]\n    , [IM].[ItemImage]\n    , CASE [IM].[ItemImage]\n          WHEN '' THEN NULL\n          WHEN NULL THEN NULL\n          ELSE CONCAT('http://www.ashleydirect.com/graphics/', [IM].[ItemImage])\n      END                                                                        AS [ImageURL]\n    , CASE\n          WHEN RTRIM(COALESCE([IPK].[ienFutureStatus], [NPK].[npkFutureStatus])) IN ('F', 'P', 'L', 'E') THEN 'End of Life'\n          WHEN [IM].[AFIItemStatus] = 'N' THEN 'Pre-Invoicing'\n          WHEN [Inv].[InitialInvoiceDate] >= DATEADD(MONTH, -9, GETDATE()) THEN 'Recent Launch'\n          WHEN [IM].[AFIItemStatus] IN ('D', 'R') THEN 'End of Life'\n          ELSE 'Current'\n      END                                                                        AS [LifecycleStage]\n    , CASE\n          WHEN RTRIM(COALESCE([IPK].[ienFutureStatus], [NPK].[npkFutureStatus])) IN ('F', 'P', 'L', 'E') THEN 4\n          WHEN [IM].[AFIItemStatus] = 'N' THEN 1\n          WHEN [Inv].[InitialInvoiceDate] >= DATEADD(MONTH, -9, GETDATE()) THEN 2\n          WHEN [IM].[AFIItemStatus] IN ('D', 'R') THEN 4\n          ELSE 3 -- Current\n      END                                                                        AS [LifecycleStageSort]\n    , ''                                                                         AS [PlanDropDecisionDate]\n    , CASE\n          WHEN [EXT].[GDESCD] = '240' THEN 'PART'\n          WHEN [IM].[ItemClassCode] IN ('MATT', 'UBBC', 'UESW', 'USKE', 'UTRK', 'WVBC', 'WVCD',\n                                        'WVCS', 'WVCU', 'WVHC', 'WVHD', 'WVUP', 'WVVF', 'WVVG',\n                                        'WVWB', 'ZACK', 'ZAMK', 'ZARP', 'ZAWU', 'ZDCK', 'ZDLK',\n                                        'ZDMK', 'ZJBK', 'ZJFK', 'ZKBK', 'ZLSD', 'ZMCK', 'ZMLK',\n                                        'ZMMK', 'ZUCK', 'ZUMK', 'ZXCK', 'ZXLK', 'ZXMK') THEN 'PART'\n          ELSE 'ITEM'\n      END                                                                        AS [PartFlag]\n    , ''                                                                         AS [MarketableConversionFactor]\n    , ''                                                                         AS [MarketableItemSKU]\nFROM [Enterprise_DW].[DimItemMaster] AS IM\nLEFT JOIN [SupplyChain_DW].[DimCurrentProductDetails] AS CPD\n    ON [IM].[ItemSKU] = [CPD].[Item SKU]\nLEFT JOIN [Wholesale_Purchasing_AFI].[VENNAM] AS V\n    ON [IM].[PrimaryVendor] = [V].[VNDNR]\nLEFT JOIN (\n    SELECT\n          [ID].[ItemNumber]\n        , COALESCE(\n              MIN(CASE\n                      WHEN [ID].[Warehouse] IN ('1', '15', '17', '19', '28', '42', '70', '5', 'ECR')\n                      THEN [ID].[InvoiceDate]\n                  END),\n              MIN([ID].[InvoiceDate])\n          )                                                                      AS [InitialInvoiceDate]\n    FROM [Wholesale_SalesHistory_AFI].[InvoiceDetail] AS ID\n    WHERE [ID].[Warehouse] <> '55'\n    GROUP BY [ID].[ItemNumber]\n) AS Inv\n    ON [IM].[ItemSKU] = [Inv].[ItemNumber]\nLEFT JOIN [MasterData_ItemMaster_AFI].[ITMEXT] AS EXT\n    ON [IM].[ItemSKU] = [EXT].[ITNBR]\nLEFT JOIN [MasterData_ItemMaster_AFI].[GENDESC] AS GDC\n    ON [EXT].[GDESCD] = [GDC].[GDCODE]\nLEFT JOIN [MasterData_ProductKnowledge].[Item_ENV] AS IPK\n    ON [IM].[ItemSKU] = [IPK].[ienItemNumber]\n   AND [IPK].[ienEnvironmentCode] = 'AFI'\nLEFT JOIN [Wholesale_ProductSourcing].[NonPkItems] AS NPK\n    ON [IM].[ItemSKU] = [NPK].[npkItemNumber]\nWHERE [IM].[ItemSupplierDirectShipOnly] <> 'True';\n```\n", "datasets/queries/supply_plan_today": "## Purpose\n\nDaily extract of the Logility supply plan for operations. The table is fully overwritten each day with the current plan for semantic model efficiency. There is a similar table that keeps the snapshot history available. The Supply Plan is generate in the Logility application and projects 39 weeks forward from the snapshot date, showing how inventory is expected to evolve week by week at each item-warehouse combination, given current demand signals, open supply orders, planned orders, and safety stock targets.\n\nThe central output is [Shippable Inventory](/glossary/shippable_inventory.md) (`SIQty`) \u2014 the quantity projected to be available at the close of each planning week. Negative SI values identify supply gaps where planned outbound exceeds projected receipts. The Supply Plan solver's primary goal is to make Shippable Inventory match the Safety Stock Target.\n\nUsed in:\n\n- Exception-based supply plan review (SI negatives, safety stock gaps, fulfillment shortfalls)\n- Week-by-week visibility into firm vs. planned supply and demand\n- Safety stock gap analysis across the 39-week horizon\n\n---\n\n## Grain\n\nEach row represents one **item \u00d7 warehouse \u00d7 week-ending Saturday** combination in the current supply plan.\n\n`ItemSKU` \u00d7 `WarehouseID` \u00d7 `WeekEnding` is unique within the table. `SnapshotDate` is a metadata column that records when the daily extract was loaded; it does not vary within the table and should not be treated as part of the grain.\n\n---\n\n## Schema\n\n### Grain / Keys\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ItemSKU` | VARCHAR(20) | FK to [Product Master](/datasets/tables/DimProduct.md) (`DimProduct[ItemSKU]`) |\n| `WarehouseID` | VARCHAR(10) | FK to [Warehouse Master](/datasets/tables/DimWarehouse.md) (`DimWarehouse[Warehouse]`) |\n| `WeekEnding` | DATE | FK to [Fiscal Calendar](/datasets/tables/DimDate.md) (`DimDate[TransactionDate]`); always a Saturday; the last day of the projected planning week |\n\n### Demand\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `BeginningBalance` | INT | Actual on-hand balance as of [SnapshotDate] \u2014 NOT the projected beginning on-hand for each week. This value is identical across all [WeekEnding] dates. For projected inventory at week ending, use [SIQty]. |\n| `FirmDemand` | INT | Confirmed open customer order quantity for the week; see [Firm Demand](/glossary/firm_demand.md) |\n| `PromoLift` | INT | Manual promotional lift quantity entered by marketing and fed into Logility; independent of the statistical forecast |\n| `NetForecast` | INT | Statistical forecast quantity net of firm customer orders; floored at zero \u2014 when firm orders meet or exceed the forecast, this is 0; see [Net Forecast](/glossary/net_forecast.md) |\n\n### Transfers Out\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `TOutFirm` | INT | Quantity on a firm (committed) transfer-out order |\n| `TOutPlanned` | INT | Quantity on a transfer-out order Logility has planned but not yet committed (outside lead time) |\n\n### Production\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `ProdFirm` | INT | Quantity on a firm production order |\n| `ProdPlanned` | INT | Quantity on a production order Logility has planned but not yet committed (outside production lead time) |\n\n### Purchase Orders\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `POsFirm` | INT | Quantity on a firm purchase order |\n| `POsPlanned` | INT | Quantity on a purchase order Logility has planned but not yet committed (outside vendor manufacturing lead time) |\n\n### Transfers In\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `TInInTransit` | INT | Quantity on a transfer-in order currently in transit to this warehouse |\n| `TInOnOrder` | INT | Quantity on a firm transfer-in order not yet in transit |\n| `TInPlanned` | INT | Quantity on a transfer-in order Logility has planned but not yet committed (outside lead time) |\n\n### Inventory Position\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `SIQty` | INT | [Shippable Inventory](/glossary/shippable_inventory.md): projected available quantity at week-end; the primary supply plan output |\n| `SSQty` | INT | Safety stock target quantity for this item-warehouse |\n| `SI-SS` | INT | `SIQty \u2212 SSQty`; positive = above safety stock target; negative = below target |\n| `SINegative` | INT | `SIQty` when `SIQty < 0`; zero otherwise; isolates supply gap weeks |\n| `SIPositive` | INT | `SIQty` when `SIQty \u2265 0`; zero otherwise |\n| `SSGap` | INT | Quantity needed to reach safety stock target; zero when `SIQty \u2265 SSQty`; see [Safety Stock Gap](/metrics/safety_stock_gap.md) |\n\n### Aggregate Demand & Fulfillment\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `TotalDemand` | INT | `FirmDemand + Promo Lift + NetForecast`; total planned outbound demand for the week |\n| `ProjectedFulfillmentQty` | INT | Quantity of `TotalDemand` the plan projects can be fulfilled; see [Projected Fulfillment Rate](/metrics/projected_fulfillment_rate.md) |\n| `TotalOut` | INT | `FirmDemand + Promo Lift + NetForecast + TotalTO`; total quantity leaving this warehouse (demand + transfers out) |\n\n### Aggregate Supply\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `TotalTO` | INT | `TOutFirm + TOutPlanned`; total transfer-out |\n| `TotalProd` | INT | `ProdFirm + ProdPlanned`; total production |\n| `TotalPOs` | INT | `POsFirm + POsPlanned`; total purchase orders |\n| `TotalTI` | INT | `TInInTransit + TInOnOrder + TInPlanned`; total transfer-in |\n| `TotalReceipts` | INT | `TotalProd + TotalPOs + TotalTI`; all planned inbound supply |\n| `NetInventoryChange` | INT | `TotalReceipts \u2212 TotalOut`; net weekly inventory movement |\n\n### Metadata\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `SnapshotDate` | DATE | Date the daily Logility extract was loaded; equals today; constant across all rows in the table since the full plan is replaced each day |\n\n---\n\n## Planning Horizon & Temporal Notes\n\n- The plan covers **39 weeks forward** from `SnapshotDate`.\n- `WeekEnding` is always a **Saturday**, aligned to the fiscal week boundary in [Fiscal Calendar](/datasets/tables/DimDate.md).\n- All date joins to `DimDate` should use the `TransactionDate` column.\n- Because the table is a daily overwrite, there is no history of prior plan snapshots. To compare today's plan to a prior plan, a separate snapshot store would be required.\n\n---\n\n## Firm vs. Planned Supply\n\nSupply quantities appear in paired columns (e.g., `POsFirm` / `POsPlanned`). Understanding the distinction is critical for assessing supply reliability:\n\n- **Firm** \u2014 An order exists in the system. The quantity is committed and should be considered reliable for the near-term horizon.\n- **Planned** \u2014 Logility has computed that an order should be placed but it has not been issued yet. Planned quantities are projections and may not materialize if lead times or constraints change.\n\nWhen assessing short-term supply risk, weight firm supply more heavily than planned supply.\n\n---\n\n## Related\n\n- [Shippable Inventory](/glossary/shippable_inventory.md)\n- [Net Forecast](/glossary/net_forecast.md)\n- [Firm Demand](/glossary/firm_demand.md)\n- [Safety Stock Gap](/metrics/safety_stock_gap.md)\n- [Projected Fulfillment Rate](/metrics/projected_fulfillment_rate.md)\n- [Supply Plan Review](/playbooks/supply_plan_review.md)\n- [Product Master](/datasets/tables/DimProduct.md)\n- [Warehouse Master](/datasets/tables/DimWarehouse.md)\n- [Fiscal Calendar](/datasets/tables/DimDate.md)\n\n## Base Query\n\nThis query produces the Supply Plan Detail dataset shape while the gold table is unavailable.\n\n```sql\nSELECT [SPD].[spdItem] AS [ItemSKU]\n      ,[SPD].[spdWarehouse] AS [WarehouseID]\n      ,[SPD].[spdWeekEnding] AS [WeekEnding]\n      ,[SPD].[spdBeginingBalance] AS [BeginningBalance]\n      ,[SPD].[spdFirmDemands] AS [FirmDemand]\n      ,[SPD].[spdWeeklyPromotionalLift] AS [PromoLift]\n      ,[SPD].[spdNetForecast] AS [NetForecast]\n      ,[SPD].[spdFirmTransferOut] AS [TOutFirm]\n      ,[SPD].[spdPlannedTransferOut] AS [TOutPlanned]\n      ,[SPD].[spdFirmProduction] AS [ProdFirm]\n      ,[SPD].[spdPlannedProduction] AS [ProdPlanned]\n      ,[SPD].[spdFirmPurchaseOrders] AS [POsFirm]\n      ,[SPD].[spdPlannedPurchaseOrders] AS [POsPlanned]\n      ,[SPD].[spdInTransitTransferIn] AS [TInInTransit]\n      ,[SPD].[spdOnOrderTransferIn] AS [TInOnOrder]\n      ,[SPD].[spdPlannedTransferIn] AS [TInPlanned]\n      ,[SPD].[spdShippableInventory] AS [SIQty]\n      ,[SPD].[spdSafetyStock] AS [SSQty]\n      ,[SPD].[spdShippableInventory]-[SPD].[spdSafetyStock] AS [SI-SS]\n      ,CASE \n            WHEN [SPD].[spdShippableInventory] < 0 \n                THEN [SPD].[spdShippableInventory] \n            ELSE 0 \n        END AS [SINegative]\n      ,CASE \n            WHEN [SPD].[spdShippableInventory] > 0 \n                THEN [SPD].[spdShippableInventory] \n            ELSE 0 \n        END AS [SIPositive]\n      ,CASE \n            WHEN [SPD].[spdShippableInventory] < [SPD].[spdSafetyStock] \n                THEN  [SPD].[spdSafetyStock] - [SPD].[spdShippableInventory]\n            ELSE 0 \n        END AS [SSGap]\n\t  ,[SPD].[spdFirmDemands] + [SPD].[spdWeeklyPromotionalLift] + [SPD].[spdNetForecast] AS [TotalDemand]\n      ,[SPD].[spdDemandFulfillment] AS [ProjectedFulfillmentQty]\n\t  ,[SPD].[spdFirmDemands] + [SPD].[spdWeeklyPromotionalLift] + [SPD].[spdNetForecast] + [SPD].[spdFirmTransferOut] + [SPD].[spdPlannedTransferOut] AS [TotalOut]\n\t  ,[SPD].[spdFirmTransferOut] + [SPD].[spdPlannedTransferOut] AS [TotalTO]\n\t  ,[SPD].[spdFirmProduction] + [SPD].[spdPlannedProduction] AS [TotalProd]\n\t  ,[SPD].[spdFirmPurchaseOrders] + [SPD].[spdPlannedPurchaseOrders] AS [TotalPOs]\n\t  ,[SPD].[spdInTransitTransferIn] + [SPD].[spdOnOrderTransferIn] + [SPD].[spdPlannedTransferIn] AS [TotalTI]\n      ,[SPD].[spdTotalReceipts] AS [TotalReceipts]\n      ,[SPD].[spdTotalReceipts] - ([SPD].[spdFirmDemands] + [SPD].[spdWeeklyPromotionalLift] + [SPD].[spdNetForecast] + [SPD].[spdFirmTransferOut] + [SPD].[spdPlannedTransferOut]) AS [NetInventoryChange]\n\t  ,CONVERT(DATE, [SPD].[dtea]) AS [SnapshotDate]\n  FROM [Wholesale_DemandPlanning_AFI].[SupplyPlanDetail] AS SPD\n    WHERE CONVERT(date,[SPD].[dtea]) = (SELECT MAX(CONVERT(date,[dtea])) FROM [Wholesale_DemandPlanning_AFI].[SupplyPlanDetail])\n```\n", "datasets/queries/vendor_master": "## Purpose\n\nCentral vendor dimension for supply chain planning. Provides a single source of truth for vendor attributes \u2014 lead times, location, country of origin, and active status \u2014 used across procurement, supply planning, and on-time performance reporting.\n\nVendor-level aggregates such as open purchase orders and vendor ranking are not stored in this table; they are computed at report time in the measure layer.\n\n---\n\n## Grain\n\nEach row represents a unique **vendor** (`VendorNumber`). Both active and inactive vendors are included; use the `VendorActive` flag to filter to active vendors only when appropriate for the analysis.\n\n---\n\n## Schema\n\n### Identity\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `VendorNumber` | VARCHAR(8) | Primary key \u2014 vendor identifier; used as FK in `FactPSW`, `FactReceipts`, `FactOnTime`, and `FactProduction` |\n| `VendorName` | VARCHAR(40) | Vendor legal or trading name from `VENNAM` |\n| `VendorDesc` | VARCHAR(60) | ETL-computed: `CONCAT(RTRIM(VendorName), ' - ', RTRIM(VendorNumber))`; convenience label for visuals and slicers |\n\n### Attributes\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `VendorOffice` | VARCHAR(20) | Office or division designation; used for vendor office-level grouping in supply planning and sourcing reports |\n| `VendorOfficeLocation` | VARCHAR(40) | Country or region derived from the vendor office code |\n| `Country` | VARCHAR(50) | Country of origin or country of vendor's primary location; supports import vs. domestic segmentation |\n| `LeadTime` | INT | Standard lead time in days; sourced from vendor master for use in supply planning calculations |\n| `VendorActive` | VARCHAR(3) | Active status label (`Yes`/`No`); filters active vs. inactive vendors in reporting and gold fact loads |\n| `Vendor Import Domestic Flag` | VARCHAR(8) | Import/domestic classification derived from `EXTVNDR.ProductOrigin`; NULL and `I` values are treated as Import |\n\n---\n\n## Related\n\n- [Vendor](/entities/vendor.md) \u2014 Business definition, active status, and lead time context for the Vendor entity\n\n## Base Query\n\nUse this query to produce the Vendor Master shape while the gold `DimVendor` table is unavailable.\n\n```sql\nSELECT V.VendorNumber\n\t  ,V.VendorName\n\t  ,V.[VendorDesc]\n\t  ,V.[Office] AS [VendorOffice]\n      ,[VendorOfficeLocation] = \n\t\t\tCASE \n\t\t\t\tWHEN V.[Office] = 'ACROS' THEN 'CHINA'\n\t\t\t\tWHEN V.[Office] = 'AMLO' THEN 'MALAYSIA'\n\t\t\t\tWHEN V.[Office] = 'CINRO' THEN 'INDIA'\n\t\t\t\tWHEN V.[Office] = 'CVRO' THEN 'VIETNAM'\n\t\t\t\tWHEN V.[Office] = 'RKD' THEN 'USA'\n\t\t\t\tWHEN V.[Office] = 'WBOC' THEN 'CHINA'\n\t\t\t\tWHEN V.[Office] = 'ACLO' THEN 'CAMBODIA'\n\t\t\t\tWHEN V.[Office] = 'ABLO' THEN 'BANGLADESH'\n\t\t\t\tWHEN V.[Office] = 'THAI' THEN 'THAILAND'\n\t\t\t\tWHEN V.[Office] = 'MYAN' THEN 'MAYANMAR'\n\t\t\t\tWHEN V.[Office] = 'ATLO' THEN 'TAIWAN R.O.C'\n\t\t\t\tWHEN V.[Office] = 'CIRO' THEN 'INDONESIA'\n\t\t\t\tWHEN V.[Office] = 'CANA' THEN 'CANADA'\n\t\t\t\tWHEN V.[Office] = 'MARO' THEN 'MOROCCO'\n\t\t\t\tWHEN V.[Office] = 'MXCO' THEN 'MEXICO'\n\t\t\t\tWHEN V.[Office] = 'MILLE' THEN 'VIETNAM'\n\t\t\t\tWHEN V.[Office] = 'WANEK' THEN 'VIETNAM'\n\t\t\t\tWHEN V.[Office] = 'LAOS' THEN 'LAOS'\n\t\t\t\tWHEN V.[Office] = 'SGPR' THEN 'SINGAPORE'\n\t\t\t\tWHEN V.[Office] = 'SLKA' THEN 'SRI LANKA'\n\t\t\t\tWHEN V.[Office] = 'TRKY' THEN 'TURKEY'\n\n\t\t\t\tELSE 'N/A'\n\t\t\tEND\t\t\t\t\n\t  ,V.Country\n\t  -- Need for keeping existing name. Defaults to AFI Lead time, takes WVF lead time where unique to WVF\n\t  ,A.[LEAD_TIME] AS [LeadTime] \n\t  ,[VendorActive] = \n\t\t\tCASE\n\t\t\t\tWHEN [A].[Active] = '1'\n\t\t\t\t\tTHEN 'Yes'\n\t\t\t\tELSE 'No'\n\t\t\tEND\n\t  ,[Vendor Import Domestic Flag] = \n\t\t\tCASE \n\t\t\t\tWHEN [A].[ProductOrigin] = 'I' OR [A].[ProductOrigin] IS NULL THEN 'Import'\n\t\t\t\tWHEN [A].[ProductOrigin] = 'D' THEN 'Domestic'\n\t\t\t\tELSE 'N/A'\n\t\t\tEND\nFROM (\n\nSELECT RTRIM(V.[VNDNR]) AS [VendorNumber]\n\t\t,RTRIM(V.[VNAME]) AS [VendorName]\n\t\t,V.[VNAMA] AS [Office]\n\t\t,CONCAT(RTRIM(V.[VNAME]),' - ',RTRIM(V.[VNDNR])) AS [VendorDesc]\n\t\t,V.[VCNTR] AS [Country]\n\tFROM [Wholesale_Purchasing_AFI].[Vennam] AS V\n\tWHERE [VNAMA] IN ('ACROS','AMLO','CINRO','CVRO','RKD','WBOC','ACLO'\n                      ,'ABLO','THAI','MYAN', 'ATLO', 'CANA', 'CIRO','MARO','MXCO'\n\t\t\t\t\t  ,'MILLE', 'WANEK','LAOS','SLKA','SGPR','TRKY'\n\t\t\t\t\t  )\n\n\n\t) AS V\n\tLEFT JOIN [Wholesale_Purchasing_AFI].[EXTVNDR] AS A\n\t ON V.VendorNumber = A.[VEND_NUM]\n```\n", "datasets/queries/warehouse_master": "## Purpose\n\nCentral warehouse dimension for supply chain planning.\n\n---\n\n## Grain\n\nEach row represents a unique active **warehouse** (`WarehouseID`). Source values include physical codes (e.g., `1`, `15`, `ECR`) and virtual A-suffixed variants (e.g., `1A`, `15A`, `ECA`).\n\n---\n\n## Schema\n\n### Identity\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `WarehouseID` | VARCHAR(10) | Primary key \u2014 warehouse-level grain identifier used as FK in gold fact tables; raw warehouse codes from source system |\n| `WarehouseName` | VARCHAR(100) | ETL-computed: `WarehouseID + ' - ' + WarehouseLocation`; convenience label for visuals and slicers |\n| `WarehouseLocation` | VARCHAR(100) | Physical or logical warehouse location description from master |\n\n### Attributes\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `WarehouseOrderGroup` | VARCHAR(100) | Order grouping attribute for warehouse-level operational segmentation |\n| `IntransitWarehouse` | VARCHAR(100) | Intransit or consolidation warehouse designation |\n| `ContainerDirectWarehouse` | VARCHAR(100) | Container-direct receiving designation; supports direct-to-warehouse container shipments |\n| `ControlledWarehouse` | VARCHAR(100) | Controlled warehouse designation; governed inventory model indicator |\n| `AFIWarehousesKey` | VARCHAR(100) | Alternative key from source `DimAFIWarehouses` table |\n| `SiteID` | VARCHAR(50) | Site or location ID from `AshleyWarehouseMaster`; used in supply chain systems |\n\n### ETL-Computed\n\n| Column | Type | Meaning |\n| --- | --- | --- |\n| `WarehouseGroup` | VARCHAR(10) | Operational group assignment \u2014 `AFI`, `ASH`, `C.DIR`, `PROD`, `CXD`, or `SDS`; NULL for unmapped codes. Enables warehouse-level aggregation in reports. See [Warehouse](/entities/warehouse.md) for group definitions and member codes. |\n| `PlanningWarehouse` | VARCHAR(10) | Preferred attribute to be displayed in reporting. Shorthand for `<ID>-<Name>` (e.g., `1-RKD`, `15-LEE`, `ECR-ECR`). Collapses virtual A-suffixed codes onto their physical facility code. See [Warehouse](/entities/warehouse.md) for full mapping. |\n| `SortBy` | INT | Display sort order for consistent warehouse sequencing across all reporting views; no NULLs \u2014 unmapped codes receive sequential values above 51 |\n\n---\n\n## Related\n\n- [Warehouse](/entities/warehouse.md) \u2014 Business definition, warehouse group classification, and PlanningWarehouse facility mapping\n\n---\n\n## Base Query\n\nUse this query to produce the Warehouse Master shape while the gold `DimWarehouse` table is unavailable.\n\n```sql\nWITH UnmappedWarehouseCodes AS ( -- Use CTE to avoid SortBY errors\n    SELECT DISTINCT RTRIM([Warehouse Code]) AS WarehouseCode,\n           ROW_NUMBER() OVER (ORDER BY RTRIM([Warehouse Code])) + 55 AS SortBy\n    FROM [SupplyChain_DW].[DimAFIWarehouses]\n    WHERE RTRIM([Warehouse Code]) NOT IN ('1','15','16','17','19','28','42','5','70','ECR','335','C35','C','C99','CNW','AF','IOR','12','101','151','20','201','3','60','1A','15A','17A','19A','28A','42A','5A','ECA','55','213','215','242','49','50','52','10','109','14','18','2','21','232','6','7','8','9','P','R','W','','N/A')\n)\nSELECT RTRIM(S.[Warehouse Code]) AS [WarehouseID]\n      ,CONCAT(RTRIM(S.[Warehouse Code]),' - ', RTRIM(S.[Warehouse Location])) AS [WarehouseName]\n      ,S.[Warehouse Location] AS [WarehouseLocation]\n      ,S.[Warehouse Order Group] AS [WarehouseOrderGroup]\n      ,S.[Intransit Warehouse] AS [IntransitWarehouse]\n      ,S.[Container Direct Warehouse] AS [ContainerDirectWarehouse]\n      ,S.[Controlled Warehouse] AS [ControlledWarehouse]\n      ,S.[AFIWarehousesKey]\n      ,RTRIM([M].[wmaSiteId]) AS [SiteID]\n      ,CASE RTRIM(S.[Warehouse Code])\n           WHEN '1' THEN 'AFI'\n           WHEN '15' THEN 'AFI'\n           WHEN '16' THEN 'AFI'\n           WHEN '17' THEN 'AFI'\n           WHEN '28' THEN 'AFI'\n           WHEN '42' THEN 'AFI'\n           WHEN '5' THEN 'AFI'\n           WHEN '70' THEN 'AFI'\n           WHEN 'ECR' THEN 'AFI'\n           WHEN '335' THEN 'ASH'\n           WHEN 'C' THEN 'C.DIR'\n           WHEN 'CNW' THEN 'C.DIR'\n           WHEN 'C35' THEN 'C.DIR'\n           WHEN 'AF' THEN 'C.DIR'\n           WHEN 'C99' THEN 'C.DIR'\n           WHEN 'IOR' THEN 'C.DIR'\n           WHEN '12' THEN 'PROD'\n           WHEN '101' THEN 'PROD'\n           WHEN '151' THEN 'PROD'\n           WHEN '19' THEN 'PROD'\n           WHEN '201' THEN 'PROD'\n           WHEN '20' THEN 'PROD'\n           WHEN '3' THEN 'PROD'\n           WHEN '49' THEN 'CXD'\n           WHEN '55' THEN 'SDS'\n           WHEN '1A' THEN 'AFI'\n           WHEN '15A' THEN 'AFI'\n           WHEN '17A' THEN 'AFI'\n           WHEN '28A' THEN 'AFI'\n           WHEN '42A' THEN 'AFI'\n           WHEN '5A' THEN 'AFI'\n           WHEN 'ECA' THEN 'AFI'\n           WHEN '19A' THEN 'AFI'\n           ELSE NULL\n      END AS [WarehouseGroup]\n      ,CASE RTRIM(S.[Warehouse Code])\n           WHEN '1' THEN '1-RKD'      -- Arcadia\n           WHEN '15' THEN '15-LEE'    -- Leesport\n           WHEN '16' THEN '16-STV'    -- Statesville\n           WHEN '17' THEN '17-ADV'    -- Advance\n           WHEN '28' THEN '28-MES'    -- Mesquite\n           WHEN '42' THEN '42-SPW'    -- Spanaway\n           WHEN '5' THEN '5-RED'      -- Redlands\n           WHEN '70' THEN '70-ETN'    -- Etna\n           WHEN 'ECR' THEN 'ECR-ECR'  -- Ecru\n           WHEN '335' THEN '335-ASH'  -- Ashton\n           WHEN 'C' THEN 'C-ENT'      -- Container Direct Enterprise Contract\n           WHEN 'CNW' THEN 'CNW-CUS'  -- Container Direct Customer Contract\n           WHEN 'C35' THEN 'C35-ASH'  -- Container Direct through Ashton\n           WHEN 'AF' THEN 'AF-CND'    -- Container Direct AF\n           WHEN 'C99' THEN 'C99-CND'  -- Container Direct 99\n           WHEN 'IOR' THEN 'IOR-CND'  -- Container Direct Importer of Record\n           WHEN '12' THEN '12-RIP'    -- Ripley\n           WHEN '101' THEN '101-CHP'  -- Chippewa Falls\n           WHEN '151' THEN '151-POT'  -- Pottsville\n           WHEN '19' THEN '19-SLT'    -- Saltillo\n           WHEN '201' THEN '201-VRM'  -- Verona Mattress\n           WHEN '20' THEN '20-VRF'    -- Verona Foam\n           WHEN '3' THEN '3-WHT'      -- Whitehall\n           WHEN '49' THEN '49-COL'    -- Colton crossdox\n           WHEN '55' THEN '55-SDS'    -- Supplier Direct Ship\n           WHEN '1A' THEN '1-RKD'     -- Arcadia (Virtual Warehouse)\n           WHEN '15A' THEN '15-LEE'   -- Leesport (Virtual Warehouse)\n           WHEN '17A' THEN '17-ADV'   -- Advance (Virtual Warehouse)\n           WHEN '28A' THEN '28-MES'   -- Mesquite (Virtual Warehouse)\n           WHEN '42A' THEN '42-SPW'   -- Spanaway (Virtual Warehouse)\n           WHEN '5A' THEN '5-RED'     -- Redlands (Virtual Warehouse)\n           WHEN 'ECA' THEN 'ECR-ECR'  -- Ecru (Virtual Warehouse)\n           WHEN '19A' THEN '19-SLT'   -- Saltillo (Virtual Warehouse)\n           ELSE S.[Warehouse Code]\n      END AS [PlanningWarehouse]\n      ,CASE RTRIM(S.[Warehouse Code])\n           WHEN '1' THEN 1\n           WHEN '15' THEN 2\n           WHEN '16' THEN 3\n           WHEN '17' THEN 4\n           WHEN '19' THEN 5\n           WHEN '28' THEN 6\n           WHEN '42' THEN 7\n           WHEN '5' THEN 8\n           WHEN '70' THEN 9\n           WHEN 'ECR' THEN 10\n           WHEN '335' THEN 11\n           WHEN 'C35' THEN 12\n           WHEN 'C' THEN 13\n           WHEN 'C99' THEN 14\n           WHEN 'CNW' THEN 15\n           WHEN 'AF' THEN 16\n           WHEN 'IOR' THEN 17\n           WHEN '12' THEN 18\n           WHEN '101' THEN 19\n           WHEN '151' THEN 20\n           WHEN '20' THEN 21\n           WHEN '201' THEN 22\n           WHEN '3' THEN 23\n           WHEN '60' THEN 24\n           WHEN '1A' THEN 25\n           WHEN '15A' THEN 26\n           WHEN '17A' THEN 27\n           WHEN '19A' THEN 28\n           WHEN '28A' THEN 29\n           WHEN '42A' THEN 30\n           WHEN '5A' THEN 31\n           WHEN 'ECA' THEN 32\n           WHEN '55' THEN 33\n           WHEN '213' THEN 34\n           WHEN '215' THEN 35\n           WHEN '242' THEN 36\n           WHEN '49' THEN 37\n           WHEN '50' THEN 38\n           WHEN '52' THEN 39\n           WHEN '10' THEN 40\n           WHEN '109' THEN 41\n           WHEN '14' THEN 42\n           WHEN '18' THEN 43\n           WHEN '2' THEN 44\n           WHEN '21' THEN 45\n           WHEN '232' THEN 46\n           WHEN '6' THEN 47\n           WHEN '7' THEN 48\n           WHEN '8' THEN 49\n           WHEN '9' THEN 50\n           WHEN 'P' THEN 51\n           WHEN 'R' THEN 52\n           WHEN 'W' THEN 53\n           WHEN '' THEN 54\n           WHEN 'N/A' THEN 55\n           ELSE COALESCE(U.SortBy, 9999)\n      END AS [SortBy]\nFROM [SupplyChain_DW].[DimAFIWarehouses] AS S\nLEFT JOIN [Wholesale_Codis].[AshleyWarehouseMaster] AS M\n      ON S.[Warehouse Code] = M.[wmaWarehouse]\nLEFT JOIN UnmappedWarehouseCodes AS U\n      ON RTRIM(S.[Warehouse Code]) = U.WarehouseCode\nWHERE S.[Warehouse Code] NOT IN ('', '10','109','14','18','2','21','213','215','232','242','50','52','55','6','60','7','8','9','N/A','P','R','W')\n  Order BY [SortBy] ASC;\n```\n", "datasets/queries/weekly_current_forecast": "## Purpose\n\nUse this query to produce the [Current Forecast](/datasets/tables/FactCurrentForecast.md) weekly item-warehouse forecast shape while the gold-level `FactCurrentForecast` table is not deployed.\n\nThe source forecast quantities are monthly values from Logility SupplyForecast. The query expands each fiscal month to its fiscal week-ending dates through `DimDate_NonRetail`, then evenly distributes monthly forecast quantities across the number of fiscal weeks in the month.\n\n---\n\n## Output Grain\n\nEach row represents one **item x warehouse x fiscal week-ending** combination for a forecast snapshot.\n\n`ItemSKU` x `WarehouseID` x `WeekEnding` should be unique for a single `SnapshotDate`.\n\n---\n\n## Key Transformations\n\n- Trims item and warehouse identifiers from `FCST_1_ID` and `FCST_2_ID`.\n- Maps Logility fiscal month period `FCST_YR_PRD` to fiscal week-ending dates through `[Enterprise_DW].[DimDate_NonRetail]`.\n- Counts distinct fiscal week-ending dates in each fiscal month to derive `WeeksinMonth`.\n- Divides monthly `FCST_RSLT_QTY` and `PROMO_LIFT_QTY` by `WeeksinMonth`, rounds to whole units, and casts to integer.\n- Filters out fiscal periods that do not resolve to a fiscal week-ending date.\n\n---\n\n## SQL\n\n```sql\nSELECT RTRIM([SFC].[FCST_1_ID]          ) AS [ItemSKU]\n      ,RTRIM([SFC].[FCST_2_ID]    ) AS [WarehouseID]\n      ,[DD].[FiscalWeekLastDate] AS [WeekEnding]\n      ,CAST(ROUND([SFC].[FCST_RSLT_QTY]/[W].[WeeksinMonth],0) AS INT) AS [ResultantForecast]\n      ,CAST(ROUND([SFC].[PROMO_LIFT_QTY]/[W].[WeeksinMonth],0) AS INT) AS [PromoLift]\n      ,CAST(ROUND(([SFC].[FCST_RSLT_QTY] + [SFC].[PROMO_LIFT_QTY])/[W].[WeeksinMonth],0) AS INT) AS [TotalForecast]\n      ,CONVERT(DATE, [SFC].[dtea]) AS [SnapshotDate]\n  FROM [Wholesale_DemandPlanning_AFI].[SupplyForecast] AS SFC\n  LEFT JOIN (\nSELECT DISTINCT [FiscalMonthYear]\n      ,[FiscalWeekLastDate]\n  FROM [Enterprise_DW].[DimDate_NonRetail]\n  ) AS DD\n  ON [SFC].[FCST_YR_PRD] = [DD].[FiscalMonthYear]\n  \tLEFT JOIN (\nSELECT [FiscalMonthYear]\n      ,COUNT(DISTINCT [FiscalWeekLastDate]) AS [WeeksinMonth]\n  FROM [Enterprise_DW].[DimDate_NonRetail]\n  GROUP BY [FiscalMonthYear]\n\t) AS W\n\tON [SFC].[FCST_YR_PRD] = [W].[FiscalMonthYear]\n  WHERE [DD].[FiscalWeekLastDate] IS NOT NULL\n```\n
